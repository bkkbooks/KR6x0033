body:
  text: 第六章毗闍耶之來島萬伽國於萬伽之都昔有萬伽王羯陵伽王之王女為此王之妃一王由此妃得一王女占卜者等豫言此王女後日將與獸王同棲二王女容色特勝色情甚熾王妃亦恥厭三彼女唯獨出行任意求樂祕其身分與摩謁陀國往來之商隊交往四羅羅國之森林有雄獅子已襲商隊而來他者向他處逃去彼女則向獅子來方而去五獲得餌食之獅子將還其窟由遠見女以染心振尾垂耳接近六彼女見彼思嘗聞占卜者言無有怖事以著心摩撫獅子之體七為觸彼女獅子色情猛烈背乘彼女伴至己窟並於其處同棲八隨與彼同棲時滿彼王女産生男兒與女兒之雙生兒九男兒之手足類似彼獅子由彼而名為西哈巴夫獅子腕女兒則為西哈西瓦利一此男兒十六歲時向母問言不審事母親御身與我等之父何故如斯不相似耶一一彼女總告彼彼言何故不遁去耶彼女言汝等之父以石塞窟一二肩負塞大窟石彼男兒一日可往返五十由旬一三於獅子出而漁餌之時彼則右肩乘母左肩乘妹而由其處速行逃去一四彼等纏樹枝達邊鄙之村於此處此時有王女叔父之兒一五彼是萬伽王之軍帥偶爾駐於此邊村督勵業務而坐於尼拘律樹下一六彼等見問彼等答我等是住森林者因此彼軍帥給與彼等依服一七此等優美之衣服以樹葉而令與盛食物由彼等之善業此等成為黃金之器一八彼軍帥驚此而問曰汝等是誰耶彼王女則説明彼出生之姓氏一九彼軍帥伴伯父之此女兒還至萬伽之都令彼女營同樣之生活二獅子急行還窟然不見彼三人兒之憂惱不食且不飲二一彼探求此兒等已來邊鄙之村而入村來耶彼等一一歸於荒廢二二邊境之住民等行往告王言大王有獅子窘汝之國請抑止此二三不得抑彼獅子者而彼王積一千金於象背云捕獅子者取此而巡都二四同二千金又三千金人王懸賞母二回亦制彼獅子腕二五於第三回西哈巴夫欲屠己父而不告母受取三千金二六童子西哈巴夫謁王王告彼言汝若捕獅子即時以國與汝二七彼往彼窟之入口引獅子之兒愛由遠來見耶放出一矢二八矢中獅子之額彼由慈愛心而返落於王子足下之地上二九如斯及三度由彼獸王怒後放矢傷通彼身三與鬣共持獅子之首而彼赴都城但偶然萬伽王歿已經七日三一王歿無兒彼為悅西哈巴夫之所作彼聞王孫事又知母事三二集合大臣等謂西哈巴夫王子上於王位三三彼受王位與彼母之夫己伴妹西哈西瓦利往故鄉而去三四於其處構都此名為西哈布羅獅子之都拓展百由旬之森林使築村落三五於羅羅國此之都人王西哈巴夫行王事西哈西瓦利為第一妃三六彼第一妃後日二人二人生産雙生兒事及十六回長子名為毗闍耶三七第二子名為須蜜多羅計有三十二子時到王令毗闍耶就福王之位三八毗闍耶之行狀惡劣彼之同行人然彼等興作種種難忍之暴事三九大衆怒而報此事於王王誡彼等善教於兒四第二回亦與此同而第三回大衆怒言殺汝之兒四一於是王彼毗闍耶又與彼同行人七百名令剃為半禿頭四二投於船使放於海上彼等之妻亦同此彼等之兒等亦同四三此等之男女童子別別放逐離離著島而棲四四童子等所著之島知是那伽提波裸島妻女等所著之島知是摩信達提波伽大因陀羅島四五然毗闍耶先著於蘇波羅哥港於此處供連暴行可怖再行乘船四六彼毗闍耶名堅固慧童子於雙列沙羅樹間於如來入滅而臥之日上陸於楞伽島之銅掌國四七毗闍耶之來島畢善人之信心與感激而起作大王統史名毗闍耶之來島第六章畢

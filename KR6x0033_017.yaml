body:
  text: 第十七章舍利來島大賢者之大長老於雨安居畢於迦剌底迦月滿月之日行自恣以告王一人間之王我等大師久不謁正覺者我等無依怙而來住於此處我等無有應崇敬者二大德貴僧非曾向余言正覺者已入滅王言而回答謁舍利謁勝者三余應建立塔婆為大德之意思余知此余營建塔婆大德對舍利所配慮四長老向王言可與須末那相談王言彼沙彌舍利由何處得耶五如斯彼沙彌須末那喜悅告王人間之王莊嚴都城與道路與衆共守布薩戒乘王象六翳白傘伴樂人於黃昏時可赴大龍王園七王於彼處知舍利之分散可得佛之舍利八於是長老由王宮赴支提耶山言達善心境之須末那沙彌九汝賢者須末那來赴妙之布波普羅華氏城對汝祖父大王如斯傳我等之言一大王汝友天愛大王於佛教起信心欲建立塔婆一一能贈牟尼尊之舍利與師所用之鉢此於大王之處有此甚多之遺身舍利一二攜其滿鉢赴妙天宮向彼帝釋天王如斯傳我等之言一三應受三界供養佛之右齒舍利於御身之處天王右之鎖骨亦然一四御身唯供養佛齒師之鎖骨請與我等天王楞伽島之務勿怠慢一五諾大德斯言者彼通力者沙彌於其剎那來至正法阿育王之前一六於其處王之沙羅樹下置美麗大菩提樹見捧迦剌底迦祭之供養一七聞長老之語攜王所得舍利之滿鉢沙彌赴雪山一八置舍利與上妙之鉢於雪山而赴天王之前申述長老之言二九天主帝釋由周羅摩尼周提耶髻珠塔取出右鎖骨與沙彌二由此行者須末那取其舍利與舍利鉢來至支提耶山親手與長老二一於黃昏時前述鹵簿王立於王軍之先頭而赴大龍王園二二長老於其處之山安置所有舍利由此眉沙迦山為支提耶山二三長老置其舍利之鉢於支提耶山取鎖骨伴衆而赴固定之場所二四若此是牟尼尊之舍利者我天蓋自傾象當跪下此舍利函與舍利共來當止停我頭上王如斯思惟而依其所思惟二五二六大地之王者如灌甘露大為喜悅由頭上取置於象背上二七喜悅之象咆哮大地震動由此象返回伴長老軍隊由東門進入美麗之都中由此更由南門出二八二九赴於塔波園支提場所背後所建瑪黑夾夜叉堂地由菩提樹之處還來面東而立其時此塔婆之場所充滿迦曇婆花及阿陀利蔓草蔓延三三一於其間人王使清掃莊嚴為天人所護之此淨地三二舍利由象背降下時象不欲如此王問長老之意三三彼答彼望安置與己背等高之場所是故謂不欲降下舍利三四王直令由乾燥之阿婆耶池持來乾土塊積與彼象同高三五王於此奇妙場所莊嚴種種樣樣由象背降下舍利安置於其處三六立舍利之守護役置象於彼處王心急於建立舍利塔三七用多數之人人速造磚瓦熟慮供養舍利之儀式伴家臣入都三八大摩哂陀長老一行俱向美麗之摩訶眉伽林定住於彼處三九象於夜間往來彼舍利奉安之場所晝則負舍利立菩提樹處於堂內四大地之王者從長老之提案須數日於彼敷地上築造及膝高之塔四一於彼處來觸奉安之舍利大衆亦遍由處處來會四二於彼等之來會舍利由象背騰空見止於七多羅樹高之虛空中四三舍利令衆人感動於有瘤之菴羅樹下如佛之所為行驚奇之二種神通由其舍利出火炎又水流楞伽之地自然光輝為唯一色四四四五臥於般涅槃牀之五眼具有之勝者行五大決意四六大菩提樹之南枝阿育王之取此耶自斷插入花瓶四七所插之彼枝輝耀諸方由果實樹葉放六種美麗之光四八四九彼樹枝與可愛之金瓶俱上騰而不見七日間止於雪雲之胎中安置於塔波園中我右鎖骨上升於虛空行二種之神通五安置於楞伽島莊嚴之醯摩摩利伽祠中余無多那量之舍利五一具佛之相上騰立於虛空中行二種之神通而止五二如斯如來定五種之決意是故其時舍利行其神變五三由空而下其舍利止於王之頭上王大悅而奉安於靈祠中五四奉安其之舍利之靈祠耶其時有可驚愁悶大地震動五五如斯諸佛是不可思議諸佛之法是不可思議信不可思議者之果又是不可思議五六目擊此神變之人人對勝者起信心王弟之末多婆耶王子亦五七對聖王佛懷具信心乞求人王與一千人人共出家於佛教五八由且陀衛村又由多瓦羅曼陀羅更由衛哈羅比伽又由同一之伽羅伽比陀五九並由烏婆提莎村一一之五百人青年喜悅對如來起信心而出家六如斯其時由都之內外入勝者之教而出家者共三萬人之比丘六一大地之王者於塔波園營建妙塔常以多數之珠寶行供養六二王之後宮武士族家臣同都人士及所有地方民等各各供養六三於此處先塔婆而建立精舍此塔波園精舍為世所知六四世間導師雖入般涅槃尚以己遺身舍利由種種方法為人人行利益安樂況勝者之存於此世耶六五善人之信心與感激而起作大王統史名舍利來島之第十七章畢

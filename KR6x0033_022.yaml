body:
  text: 第二十二章伽摩尼王子誕生多達伽摩尼因耶羅羅王斃後而為王說明此事件乃次第之說話一天愛帝須王之第二弟名為摩訶那伽為兄王所愛二王之愚妃望欲得己王子位不絶懷有殺害副王之意圖三彼造名陀羅奢耶池一日於菴羅果塗毒置於菴羅果之上向彼送去四彼女之幼王子亦與副王同行開器耶與否食其菴羅果而死五彼副王伴妻女軍兵欲守己身向魯哈那去六在耶陀羅耶精舍彼懷胎之妃生産一男子彼與兄之名七由此彼赴魯哈那大分限者之主王族士於摩訶伽摩全行魯哈那之政治八彼因以己名營造那伽精舍以鬱多康多羅伽始建造多數之精舍九彼歿後王子耶陀羅耶伽提薩同頒行政治彼王子阿伽耶亦同一寇陀婆耶之王子所知為伽伽萬那提薩彼王族士於彼歿後於同處行王事一一此王有名義哈羅提伊王妃信心篤定為伽魯利耶尼王之王女有信心者一二在於伽魯利耶尼之人王名為提薩之王族士彼弟名阿伊耶宇提耶與妃通觸王之怒畏而逃往住他地以此故此地已名阿伊耶宇提耶一三一四彼王弟向著比丘服之男遣密書與妃彼行立於王宮之門一五常於王宮食事一與阿羅漢共行長老阿羅漢不知此事而入於王宮一六與長老同攝食王出行之時於妃目擊之所書狀落於地上一七由彼音而王回歸檢查知為書信對長老怒心邪之王一八為怒而殺長老與彼男投於海中以此海神怒一九以海水淹漲彼國彼王以純潔容姿美麗名提伊之王女二記王女坐於黃金釜中急由彼處放入海中二一由此女著近於楞伽精舍伽伽萬那王立為妃因語伊哈羅精舍故呼為伊哈羅二二伽伽萬那王又使營造提薩大精舍同喬陀羅山精舍伽密陀瓦利精舍庫他利精舍等二三衷心懷信於三寶彼常以四資具奉僧團二四彼時寇提山名作精舍持戒順行常行種種善業之沙彌二五於阿伽薩支提之廣場為安而上彼據三段之平石二六又行飲料之布施對僧團亦果於行務彼之身體常使疲勞彼罹大病二七有報恩心比丘等以乘彼伴行至提薩精舍之西羅婆薩耶僧房而為看護二八有自制心之彼伊哈羅提伊於善嚴飾之王宮對食前常於僧團施行大施二九食後攜香華醫藥衣服赴遊園表適宜恭敬之意三如此坐於彼女僧園長老之前時長老說法語彼言三一汝由善業獲此之大果報今尚行善業事不可大意三二如是云而彼女謂於此有何果報耶妾等無有一兒如是妾等之果報是空無三三六神通者大長老豫見得王子之事謂妃請看彼病沙彌三四彼女赴為頻死之沙彌言妾之欲望兒事我等有大果報三五知不卻其事行諸多供養美麗之華大賢者妃再乞此三六然如是尚不欲此者熟知方法之彼妃施與僧團醫藥衣服更願於彼三七彼望轉生於王家彼女於彼樣樣之莊嚴禮拜乘車而去三八由此死去之沙彌妃去之時生入彼女之胎彼女知彼而返三九彼傳報於王王與同再來彼等二人為沙彌營葬儀四以成靜之心為住彼同一房室之比丘衆常行大施四一此大善行者之妃起如是懷胎婦之欲念於己枕前造一長宇沙巴程度之蜜蜂之巢四二於美麗臥牀上左脅向下而臥施與一萬二千之比丘等餘之蜜願令嘗之又達彌羅人耶羅羅王之勇士中斷第一勇士之首級之洗劍水四四站立於首級之上欲飲之又由阿㝹羅城之蓮田四五取來不萎青蓮之鬘為裝飾妃以此語王王以此問卜者等四六卜者聞此謂妃之王子征服達彌羅人為一王國於教將有光輝四七王使見此蜜蜂巢王與如是之果報而使接觸四八一田舍人知寇陀海之岸邊潛伏一滿蜜之船王告若彼四九王以妃彼處最美裝飾之假堂依彼願望使之嘗蜜五大地之王者今為使遂彼女一之欲念彼名衛魯摩那勇士用以此五一彼赴阿㝹羅陀城與國王用馬之守衛相親常為彼之辨用五二知信賴彼守衛事彼早晨於加單婆河岸大膽而置青蓮華與劍五三引馬來乘之往取青蓮華與劍自報姓名馬急行而去五四王聞此為欲捕彼遣大戰士彼大戰士乘認知第二之馬追捕彼五五彼藏身叢林內安然坐於馬背拔劍由馬背降來刺彼大戰士五六馬速走斬斷戰士首級攜帶雙馬與首級日暮彼至於摩訶伽摩五七彼妃如其所思而享樂王對戰士表示適當之敬意五八此妃時至而生具福相最妙之男子此大王之家喜實大也五九由彼王子之福業威力彼同日種種之寶滿載於七隻船而由處處入來六由彼福業之威力象由六牙象族伴幼象而來置於此處而已去六一報姓名之康多羅漁夫立於有渡場湖水岸邊之叢林中見彼幼象立即以報王六二王送於象師伴彼來飼育彼以康多羅所發見作康多羅為所知六三金器以滿載其他之物船到此處人人告王王令攜來此等六四於王子命名之祝日王算招待比丘衆一萬二千六五如斯思惟我子若行政治於楞伽島全地正覺者之教當有光輝六六一千八人之比丘等可入場又彼等身帶皆開身帶之鉢及法衣六七先用右足入內取出與一王國有緣之水瓶六八名喬達摩之長老受取王子彼又授三歸五戒一切如此六九王見一切之徵候甚喜悅施僧團以乳粥為王子命名七於摩訶伽摩之主權與己父之名寇達阿婆耶之兩者為一體名伽摩尼阿婆耶七一入於摩訶伽摩由第九日與妃共交彼妃懷胎七二王時至誕生王子命名提薩而兩兒於大而華美之中成長七三為二兒行飯食之最初式時敬虔之王向五百人比丘施捨乳粥七四彼等食於施食之時王與妃共以黃金之器取小部分向彼等兩兒與言七五若汝兒等棄正覺者之教此入汝等之腹不可消化七六彼等兩王子覺言語之意義以喜心食此乳粥如同甘露七七彼等為十歲與十二歲時王欲試彼等施食同比丘等彼等所餘食物七八用鉢取來置二兒之前王以三分作如次言七九兒等我等家之守護天與比丘等不可違背如此思而食此分八更謂我等二人之兄弟思常不可互欺可食此分八一彼等兩兒共二部分如甘露之味更又謂不可與達彌羅人爭鬥方可食此八二如此言說而彼提薩以手投棄食物而伽摩尼則投食塊而入臥牀八三縮手足而橫臥於己牀妃行安慰伽摩尼而言此八四兒何故不伸四肢安樂而臥耶彼答河之彼方有達彌羅此方有寇達海八五如何得伸我四肢而臥耶如是而言王聞知彼意志而默然八六彼次第成長為十六歲具德名聲高而有勇氣有威光有膂力之精進者八七生類動搖雖無定趣由善業而如望生出善趣如是得知而知者積善根常應有大關心八八善人之信心與感激起作大王統史名伽摩尼王子誕生第二十二章畢

body:
  text: 第八章般多偉須提瓦之即位彼毘闍耶大王達最後年如斯思惟余年已老但余無兒艱難中克取國土亦余之死後則有潰亂為此國將呼余之弟須蜜多羅一二由此與諸大臣協議送書面於彼處送書面後不久而毘闍耶則昇天上三彼死而彼大臣等望王族士之來於烏婆提沙村善治國四由毘闍耶王沒而至王族士來之先一年之間此楞伽島無國王五於此獅子城西哈巴夫王之沒後其子為彼須蜜多羅王六彼由摩達王之王女而有三兒彼使臣等赴獅子城向王呈書七彼王得書呼三兒等吾兒等余既年老汝等中一人有種種美點可愛往余兄之所有楞伽於彼之死往彼處行善政八九最年少之王子般多偉須提瓦思考我去知此行有福利一得父王之許諾伴大臣之兒等三十二人乘船以遊行沙門之姿一一彼等於摩訶康達羅河之河口下船人人見此遊行沙門等飽表敬意一二於此處問都城彼等次第而行到天人守護之烏婆提沙村一三於大臣等之同意一人大臣向占卜者問王族士來島之事彼答此彼更答他事謂王族士由今第七日來島彼族之生者將樹立此國之佛教一四一五於七日見此等遊行沙門到此處而問彼諸大臣知此一六彼般多偉須提瓦所託楞伽之王事只因無王妃彼尚不行即位式一七阿蜜多達那釋種有名為般多釋種之子知釋族將滅彼伴彼人民他之口實下而去趣恒河之彼岸於其處築都建立王國得七人之兒一八有名造婆達伽闍那最末之女兒具一切善相好姿美而多人望二為此女兒七人之王以高價之聘物贈與此王彼則怖畏此等之諸王二一彼女旅有幸福知果為王妃與三十二人之婦女共乘船二二謂有能者取余女兒放入恒河彼王等不得捕船速去二三第二日著於溝那伽摩港出家人之姿者悉於此處上陸二四此處問都彼等次第近來到諸天守護之烏婆提沙村二五聞占卜者言於其處見彼等來一大臣問而知彼為王女導與王引證二六此等清淨智之諸大臣一切滿足心願令此般多偉須提瓦正式即王位二七尊姿之婆達伽闍那已坐於第一妃之地位與彼女同來之處女等則大地護者住於安穩二八善人之信心與感激起作大王統史名般多偉須提瓦之即位第八章畢

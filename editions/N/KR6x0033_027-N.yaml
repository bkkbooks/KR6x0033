body:
  text: 第二十七章青銅殿祭王由此而博聞思惟善聞之傳說曰大善根者常時善根者以智慧決定一令島光輝摩訶摩哂陀長老聞我祖父天愛帝須王如是云汝孫睹多伽摩尼王二為大智者喜悅黃金之華鬘建立百二十肘高之大塔三又以種種之寶珠莊嚴九層樓布薩堂即亦建立青銅殿四如斯思惟大地之王者探討如上之記置存在於王宮之函中五得黃金板於此使讀彼銘文經未來百四十年六伽伽圓那之子睹多伽摩尼人王此此如是造營以示如是七大地之王者聞而喜拍手而呼叫由此早晨赴優美之摩訶眉伽林八謂催比丘眾之集會余為御身等建立等同天宮之殿樓九遣使者於天上之宮殿余與彼圖面比丘眾派八人漏盡者於彼處一迦葉牟尼之時名阿索伽婆羅門配僧團八籌食一一向名巴羅尼之下婢言置之常施彼女終生忠實施此由此死後一二樂麗生於空中之天宮常以一千天女之圍繞一三彼女之寶珠宮殿高十二由旬周四十八由旬一四以一千之樓閣而莊嚴為九層具一千之室被彩色有四入口一五結付一千之貝殼有窗如目具檐付小鈴之羅網一六安巴羅提伽殿樓聳立中央由四方能見揭舉幢幡群立一七彼等長老赴三十三天見此等以朱畫圖面於布由彼一八帶返來示僧團僧團受取布圖送彼王之處一九王見彼精神愉快來至最妙之遊園企劃造營等同圖面之最勝青銅殿二工事開工之時為富有王於四門藏八十萬之黃金二一每門儲備千籠之衣類儲備糖丸油砂糖蜂蜜以滿多數之瓶二二宣言此處應非為無報酬業按所為之業對彼等支拂勞資二三其殿樓各面有百肘高亦與此相同有四入口二四其殊勝殿樓有九階每一階有百之樓閣二五所有樓閣以銀所作象眼此等珊瑚之擔以樣樣之寶所莊嚴二六於其蓮華又鏤以種種之寶而其又圍以一小列之銀鈴二七其處殿樓善取空間有一千之室以種種之寶所作象眼有窗之目二八彼聞毘沙門天之婦人運車之事擬此中央造假之寶堂二九以師子虎其他之形諸神之姿嚴由造寶之柱三假堂之內部徧圍以真珠之羅網珊瑚之檐亦如前述三一鏤七寶之假堂中央美麗之象牙之座榻有快樂水晶之臺三二此處象牙所造之憑板以黃金造之太陽以白銀造之月及以真珠造之星三三種種寶珠之蓮華處處適宜本生譚被配置此處黃金之蔓草間三四高價之褥付極美之座榻置樂而美麗象牙之團扇三五置其處水晶之足台珊瑚之覆白銀柄之白傘光輝於座榻之上三六此白傘上間有摩尼珠與真珠有七寶造之八瑞形與四足獸之列三七銀鈴之列吊於白傘之端殿樓白傘座榻假堂皆是無價三八適宜敷置無價之臥床與座榻同敷置高價之鋪物毛布三九於此處之煮物鍋杓子亦是黃金況殿樓之於其他之調度品耶四四周好地質之城壁莊嚴殿樓四櫓門光輝如三十三天之殿堂四一此殿樓以青銅甎所葺故知名為青銅殿四二青銅殿之工事完工彼王集僧團集僧團如摩利闍越提祭之時四三凡夫位之比丘等則止於第一階通三藏之比丘等於第二階而預流果以上之比丘等四四各各止於第三以上之諸階阿羅漢則止於頂上之四層四五王先以布施水灑僧團供養殿樓如前例行七日間大施四六殿樓祭高價之供養物除外此大地之王所行布施達於三億四七有善智慧無實質之積財不計度殊質之布施此心不執著以有情之利益為最第一之人如斯行豐滿之布施四八善人之信心與感激起作大王統史名作青銅殿祭第二十七章畢

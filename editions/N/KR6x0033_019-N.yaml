body:
  text: 第十九章菩提樹來島御者之主王為守護大菩提樹十八王族八家臣族八婆羅門族更又八庶民族牧牛者貴金屬工庫隣伽等之各族同又織匠及陶工各種之軍兵並龍夜叉一二三授榮譽之王與金銀瓶各八箇大地之王者於恒河上積大菩提樹於船四十一人之比丘尼伴僧伽蜜多長老尼乘船阿利陀之一行亦乘五彼王由都出而過賓陀之森林七日而到陀摩立提六天龍及人間等又由極大規模之供養而供養大菩提樹達於七日七彼王使大菩提樹著於大海之岸邊以大王之位更供養之八授與所欲之人王以大菩提樹即大王位由此末伽始羅月白分之第一日九為持上大菩提樹配於沙羅樹下此等善生之八族八族者等各自又於此處浸水至首捧菩提樹善積載於船一一彼大長老尼與諸長老尼共乘船後王向大臣大阿利陀告此語一二以我王位供養大菩提樹及三度我友王亦如是以王位供養此一三語此大王合掌立於岸邊見大菩提樹之出行而流淚一四如斯言十力佛之其大菩提樹彼實如太陽放光以赴一五為大菩提樹之別離達磨阿育法無憂王為有憂王悲泣而還於己都中一六載大菩提樹之船進出於海中於大海周一由旬之間波靜不立一七徧開五色之蓮華又於空中鳴響幾多之樂器一八多數之諸天行樣樣之供養龍又更欲奪取大菩提樹而變相一九神通力殊勝之僧加蜜多大長老尼化為金翅鳥姿威脅此等諸大龍二怖惧此等諸大龍乞求大長老尼捧來大菩提樹於龍宮以彼二一七日間龍王位之供養又以種種之方法恭敬彼等捧來安置於船二二大菩提樹此日至於此處羌普寇羅港樂利益世間天愛帝須王二三由前聞須末那沙彌來島自末伽始羅月之第一日以來常持敬意二四由北門飾至羌普羅大港止待大菩提樹之來到之王二五立於近海堂舍之所由大長老之通力見大菩提樹之來大海上二六於彼場所建堂紀念其不可思議此處名莎摩達婆桑那莎羅海濱堂二七其日王由大長老之神通力與彼長老等伴軍隊來至閻浮俱羅之港二八大菩提樹至時肢體巧妙王得喜悅感激之心述歡興之頌浸於水中至首二九十六之族眾捧大菩提樹於頭上而下置於岸邊美麗之假堂內三楞伽王以楞伽王位供養大菩提樹己之王事託付十六族眾三一人王自行門衛之任三日間於其處行樣樣之供養三二識別場所之人王第十日之樹王大菩提樹用美麗之車載運來置於東精舍之地位彼亦與僧團共給眾人早餐三三三四此處大麾哂陀長老已曾就十力佛之果而馴伏彼龍已無餘而語三五王聞長老世尊之坐臥用於他事之場所於此處彼處造紀念物三六王又以大菩提樹置於提提婆伽婆羅門村之入口又置於此處彼處之場所三七撒白沙滿種種之華揭幢幡飾花綵於路上三八晝夜無疲倦之大王供養大菩提樹於第十四日運往阿㝹羅陀城之附近三九日蔭濃之時由北門而向所莊嚴之都供養而入城四由南門出而常訪四佛入於摩訶眉伽林精舍四一由須末那之語善調度準備運往前菩提樹喜立之場所四二彼帶王之裝身具與十六族眾共植下大菩提樹而放牛四三由手離彼八十道場騰虛空而止放六色之美光四四其喜悅之光擴於全島至梵天界而停及日沒止四五一萬之人人起信心於神變觀念達阿羅漢果於此處而出家四六大菩提樹於日沒時由空而降當於羅虛尼星宿而立於大地大地震動四七彼根由瓶緣而上覆其瓶由地上而下四八參集一切之眾向立於地上之大菩提樹以香華等之供養物由四方行供養四九大雲降雨由雪雲胎濃密之冷氣來徧圍大菩提樹五大菩提樹七日間不見於彼處沒於雪雲胎中令眾起信心五一經過七日其雲皆晴大菩提樹亦現六色之光五二大摩哂陀長老與僧伽蜜多比丘尼與隨從之人人共來此處王亦伴從者來五三伽奢羅村之王族恙達那村之王族提婆迦婆羅門及島之住民等亦五四依天人之神力欲來崇大菩提樹大會眾驚嘆此神變時五五注視熟之果實東枝無瑕結出果實長老取其落者為植而與王五六混香充土置金瓶於大座牀之所而植之五七眾者之凝視間出八根之芽現高四肘幼菩提樹五八王見其菩提樹之幼木心驚以白傘供養又施灌頂之禮五九八株之內各一株菩提樹於恙普寇羅港由下船大菩提樹時安置於彼場所六於提婆迦婆羅門村同又塔波園伊莎羅沙蔓那精舍第一靈祠之廣場六一支提耶山精舍如是伽奢羅村並恙達那村亦種植六二餘由四果實生之三十二株菩提樹之幼枝於四方一由旬之處處植精舍六三由大菩提樹王等正覺者之威光為島住民之利益所植時六四彼阿㝹羅妃共伴於僧伽蜜多長老尼之前出家達阿羅漢果六五又彼阿利陀亦與五百之王族從者共於長老之前出家獲阿羅漢果六六八長老者種族民等大菩提樹運來此處以其故稱為菩提樹運搬種六七彼僧伽蜜多長老尼與僧團共住於彼處優婆夷精舍所知之比丘尼房六八開始三堂彼處建立十二堂其一之大堂安置與大菩提樹共來之船帆柱一堂安置櫂一堂安置舵此等諸堂依彼等品而知名六九七他日生一宗派之時此十二堂常由哈陀魯哈伽精舍之比丘尼等而使用七一王之常用其象如意徘徊止於都一方之涼爽洞窟中七二於迦曇婆華之叢林中求餌而停止知象愛其處於其處作杭七三然而一日彼象不攝一口之食彼王於島民起信心問長老其意七四大長老回答王謂象欲於迦曇婆華之叢林中建立塔七五常樂為眾利益之王容舍利於塔為塔速建立堂七六愛閑靜處彼僧伽蜜多大長老尼由彼所住僧房之混雜七七為教興隆與諸比丘尼之利益尋求其他比丘尼房而有分別長老尼七八赴彼閑靜快美之支提堂住居有鑑識眼之無垢之人於彼處為晝間之休息七九王欲拜長老尼而赴比丘尼房聞彼女往彼處往彼處拜會彼女八與彼女共會釋彼女來彼處之動機覺知彼之意向覺他人意向之賢者彼天愛帝須大王快營造塔堂周圍比丘尼房八一八二彼比丘尼房造近於哈陀魯哈伽象杭是故名為哈陀魯哈伽精舍八三彼大賢善友僧伽蜜多大長老尼住於彼愉快比丘尼房中八四如斯楞伽世界之利益與果教之興隆此大菩提樹王於楞伽島為快適摩訶眉伽林中具有多數之不可思議而為長時之對峙八五善人之信心與感激而起作大王統史名菩提樹來島第十九章畢

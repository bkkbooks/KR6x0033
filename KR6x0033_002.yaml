body:
  text: 第二章摩訶三摩多王統大牟尼世尊實由摩訶三摩多王之族出生於劫初有名摩訶三摩多王者一魯伽與瓦羅魯伽同二人之伽魯利耶尼烏波沙他與曼達他二人之洽羅伽烏婆洽羅二姊提耶與木洽羅摩訶木洽羅之名王木洽林達沙伽羅與沙伽羅提瓦名之王三哈羅陀安吉羅沙與魯奇與蘇魯奇亦共有二人波達波摩訶波達波與同二人之波那陀四須達沙那與內魯亦同有二人阿奇摩與此等諸王是彼摩訶三摩多王之子孫五此二十八王有不可測年數之壽命而住於拘舍婆城王舍城彌絺羅城六由此有一百王五十六與六十八萬四千由此更三十六人王七三十二與二十八由其他二十二十八十七十五十四八九七十二由此他二十五二十五十二與十二與九九摩佉提婆為最初八萬四千王伽羅羅伽那伽為最初八萬四千王一至懿摩止此等合有十六之子孫各次第於都而治國一一懿摩之長子有奧伽木伽名王尼布那奢提摩奢達木伽與西益柵伽耶一二益柵陀羅大王洽利與西哈瓦哈那西哈沙羅此等為彼懿摩之子孫一三西哈沙羅王之子孫王有八萬二千佳耶賽那為最後之王一四此等於迦毗羅衛知為釋迦王師子頰大王為佳耶賽那之子一五佳耶賽那之王女彼名為耶索多羅在提婆達洽城釋氏名提婆達洽之王一六安家那沙為伽洽那彼之二兒彼伽洽那之女為師子頰王之首妃一七彼耶索多羅女為安家那沙王之首妃在安家那沙王有二王女為摩耶與波闍波提一八又有二人之王子為釋氏丹達般尼與善覺於師子頰有五人之王子與二人之王女一九淨飯多陀達那斛飯沙庫達那釋飯須庫達那白飯阿米陀達那甘露飯阿米達波米達此五王子二王女二阿米陀為釋氏善覺之第一妃彼有巴達伽洽那與提婆達多之二兒二一摩耶與波闍波提為淨飯之妃吾等之勝者為淨飯大王與摩耶妃之子二二大牟尼尊如斯繁而未絶之摩訶三摩多王統為所有王族之長而出生二二彼巴達洽那之女而為悉達多王子即菩薩之第一妃羅睺羅為彼女之兒二四頻毗沙羅王與悉達多王子為朋友兩者之父彼等亦為朋友二五菩薩長頻毗沙羅王五歲年齡二十九歲時菩薩出家二六精勤六年年齡三十五歲而達菩提經次第會見頻毗沙羅王二七大功德者頻毗沙羅十五歲由父王自身之手行即位禮彼即王位至第十六年大師為之説法二八二九上而王司王事五十二年由會勝者先在王位十五年如來在世之間彼治國之事實三十七年二九下三頻毗沙羅王之不肖兒阿闍世殺害彼父王之意圖此大害親者見於王事三十二年三一阿闍世王之第八年牟尼尊入涅槃彼後尚彼在王位為二十四年三二到所有德之極已無執著於對境事之如來為無常之虜如是於此處起怖畏觀無常之人到達苦惱之彼岸三三善人之信心與感激而起作大王統史名摩訶三摩多王統第二章畢

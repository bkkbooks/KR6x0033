body:
  text: 第三章第一結集有五種之眼無比倫之勝者四十五年間立於世世間所有之事所有方法之成果一於拘尸那羅雙生之沙羅樹間殊勝之處於吠舍佉月滿月之日世彼燈明釋尊入於涅槃二集其處而來之比丘同剎帝利婆羅門吠舍首陀天子亦超越算術之道三此中七十萬得解脫之比丘而長老摩訶迦葉其時為大眾之上座四火葬供養等大師遺身舍利之處理後彼大長老願大師之法久住於世五且於十力世尊般涅槃後七日思晚年僧善賢放不穩之言六佛之施法服己又佛置己於平等之位思及牟尼尊垂慈悲為行正法之合誦得正等覺者之印可學持九分教所有有德分之行者以漏盡殊勝大比丘阿難長老故選出五百名少數一名七九其次由諸比丘求行合誦亦選阿難長老此無彼而不能行此事一善歌舞七日與舍利供養之七日如斯一切世間悲愍者之涅槃過半月而後一一吾等於王舍城入雨安居為正法結集他之比丘等不可住於其處如斯決議一二憂沈之大眾到處安慰此等諸長老遊行於閻浮洲一三於阿沙荼月之白分願久住白分正法長老等來四要具備之王舍城一四於此處入雨安居之摩訶迦葉為首具堅實之德熟知正覺者之意此等諸長老一五於雨安居之第一月語阿闍世王請行一切住院之修理一六住院修理畢彼等問王曰今吾等行正法之合誦十七應設於何彼等謂會所王問於何處彼速彼等之指定場所毘婆羅石山之中腹七葉窟之入口設天神之集會堂比樂之假堂一八一九王以所有方法裝飾彼於其處應比丘之數布敷高價之敷物二於其處倚南之部分面北方設殊勝高價之長老座二一於其假堂中央面東方則調適殊勝善逝尊所用法座二二王告諸長老曰予之事業畢彼長老等歡喜而告與阿難長老二三阿難明日應有集會汝有學之身不適行彼處之事然汝應精勤獲得己利二四如斯訓誡長老自精進離四種威儀達阿羅漢果二五於雨安居期之第二月第二日此長老等集會於好地點之假堂二六為阿難長老措適當之座席阿羅漢等依年齡順次而座二七彼長老為令知達阿羅漢果不與彼等共來何者阿難長老於何處二八潛入地中或行空中路阿難長老著於為己所留之座二九所有長老等於律令優波利長老而餘之法皆阿難長老為責任者三摩訶迦葉長老為己問律而優波利長老亦為答彼各各自行推薦三一彼大長老上於長老座問彼律彼優波利長老就法座而答此三二通達律第一人之回答隨順次而通方法此等之人人和誦一切三三多聞其他之第一人者大仙法藏之守護者阿難長老彼大迦葉長老自行推薦問法三四上於法座阿難長老同選自己回答彼法之問而無餘三五應彼之索智聖者阿難順次回答通此法意之比丘等和誦一切法三六如斯此正法之合誦依一切世間利益者為一切世間利益於七個月而畢三七善逝尊之此教由於摩訶迦葉長老之功至五千年間堪存於世三八如斯合誦已大地起歡喜心支彼至水際起六種震動於世又起種種之不可思議三九四上由長老等所行故此為長老系四下第一結集之果為世間行多利益此等諸長老壽命之限於生存而總入於涅槃四一以羅漢果之燈明除去黑闇此等諸長老雖退去世間之黑闇為大燈明但亦為孤獨死之大風所吹消由此念慮之人對生命亦應捨狂醉心四二善人之信心與感激而起作大王統史名第一結集第三章畢

body:
  text: 第十四章長老之入都彼天愛帝須王許都之住民遊水自行樂之獵一伴四萬人人徒步而行走至眉沙迦山二天神欲示諸長老於王為大鹿之姿居食於彼山之藪三王見此無心射彼而不宣立弦之音大鹿走入山間四王追其跡鹿走於長老之處王見長老消搔彼姿五長老見衆多恐為烈而只示自身見彼大地之主六客氣而立之長老言彼汝來帝須王由帝須之謂思彼成是夜叉七大王我等為法王之弟子沙門慈愍御身故由閻浮洲而來八長老如斯言聞此王脫怖畏思起友阿育王之書信斷此是沙門九投弓箭近彼仙士親與長老交換問好之言坐於彼傍一其時彼從者等來圍繞彼等二人其時大長老令見餘六人之伴等一一王見彼等言曰何時彼等來耶長老云與余俱王問此一二王言於閻浮洲如斯之行者尚有其他耶閻浮洲以袈裟衣輝耀而於彼處一三通三吠陀得神通力又具他心通有天耳通之多數佛弟子阿羅漢一四王曰依何而來耶長老云我等不依陸不依海而來覺彼由彼等之空而來一五彼大智者彼探索巧質問致王大地之主隨彼所問一一對彼質問之作答一六王此樹如何之名耶此之樹名菴羅除此有其他之菴羅樹耶有多數之菴羅樹一七此菴羅樹與除此等之菴羅樹有他之樹木耶有多數之樹木大德然彼等之樹木不是菴羅樹一八他之菴羅樹與除非菴羅樹之樹木尚有樹木耶大德彼是此菴羅樹賢者之人王一九御身有血緣者耶大王大德一門有多數有無血緣者耶大王彼等由血緣者亦多有此二除去此等血緣者與無血緣者尚有如何者耶只有我大德善哉御身是賢者人王二一知是賢者長老為大智者大地之主講小象跡喻經二二說法畢時彼王與彼之四萬人人共安立於三歸依二三黃昏之時為王取來食事彼時大地之主此等沙門今不攝食雖知而二四不用問問彼仙士等就食事答今不攝食王又問食事之時刻二五聞其時刻耶王言我等赴都長老御身等還去大王我等應留此處二六然者此童子可與我等同去此達不還果會得教者二七大王凡求出家者可住我等之處今此者欲出家大王御身可行矣二八曰明朝當遣車者諸大德可乘其入都拜諸長老伴行般多伽於一隅二九王問彼長老奉侍之法彼總以語王知長老王大喜悅思此我利益也三般多伽是在家人消去疑念之彼人王知彼等之人使此者出家三一長老於其村之境界內彼同行者為般多伽童子行得度授戒之式三二其剎那彼達阿羅漢果由此長老向彼須末那沙彌三三令須報汝聞法之時刻彼問我於幾何程之範圍可報此三四長老謂向金銅掌島報之依己之通力已使報知全楞伽島聞法之時刻三五彼王坐於那伽奢多伽之那伽自然池傍攝取食事聞其叫派遣彼諸大臣三六問非有變事耶謂無事故聽聞正覺者語之報告時刻三七地神聞沙彌之叫而舉歡聲此聲漸次傳及梵天界三八由於此之響聲集合甚多諸天之數長老於其會中說平等心經三九無數之諸天會得此法多數之龍金翅鳥安立於三歸依四恰如舍利弗長老已說此經時諸天來集摩哂陀長老之處四一翌朝王遣車彼馭者前往謂乘車往都四二我等不乘車汝行我等由汝之後行如斯言送馭者善良意念彼之通力者等升入空中降於都之東方第一塔波之位置四四長老等初降場所被建支提此故今尚稱為第一靈祠四五王後宮之婦女等由王聞長老之德欲謁長老故王四六於王宮內設美假堂以白布覆蓋莊嚴白華四七於長老之前聞及禁設高牀並疑長老是否著高座四八不久彼馭者見纏法衣立彼處諸長老而大驚動四九行往告王大地之主總聞信不坐於座牀五謂善調敷地上之敷物出迎諸長老殷勤敬禮五一由大摩哂陀長老之手取鉢依鄭重恭敬之形式招待長老於都五二見所設之座席占卜者等豫言地為此等人人所占有彼等為此島主五三人王供養彼諸長老而導入都內於此處彼等順次著於布覆座席五四王以硬又軟之食物供應彼等食事畢時自行近侍坐五五又弟副王之摩訶那伽之妃住於王宮內呼阿㝹羅五六彼阿㝹羅妃與五百之婦女共來供養敬禮諸長老而近於一方五七長老說餓鬼事天宮事相應尼柯耶之四諦部彼婦女等得初果五八由前日親眼見到之人人聞長老多數之德都人等欲見長老而來集五九於王宮之門大聲揚言大地之主聞此而問知念彼等之福利王六謂此處容於總數之人人過狹然勿使障害淨除王象之廄舍此等之都民等可謁長老於彼處六一淨除彼象舍以天蓋速莊嚴之令設適宜之席六二大長老與長老等共赴彼處而坐彼大說教者逑天使經六三彼等參集之都民聞此起信心彼等中一千人得初果六四領導等於世尊於世無雙彼長老在楞伽島之二處以島之語言說法於楞伽島如是島之燈明為正法之相續六五善人之信心與感激起作大王統史名長老之入都第十四章畢

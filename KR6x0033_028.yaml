body:
  text: 第二十八章得大塔建造之資材由此彼王用十萬之黃金行勝好大裝置供養大菩提樹一不久王入都城立大塔之地位見據有石柱歡欣思起古昔之言使我建立大塔登上宮殿之上階以攝夜食臥而如下思二三當余征服達彌羅人等若使此國人人受苦更不能徵稅然此稅於外者四建立大塔如何能獲得正甎彼思如斯思惟五白傘下之天人得知由此歡呼之聲起諸天之間知此聲而帝釋天向毘首羯磨言六伽摩尼王提案塔之甎事汝距阿㝹羅陀府一由旬往彼康毘羅河畔七於彼處造甎如斯受帝釋天之命毘首羯磨來此楞伽島於其處造甎八翌日早晨一獵夫伴犬入其處之森林地居天子為大蜥蜴之形現於獵夫之前九獵夫行追發見甎而大蜥蜴之姿沒彼於其處如斯思一傳聞我等之王將建立大塔此為奉王之物行報彼王一一彼聞此愛語喜利民之王以滿悅心向彼表示大敬意一二都之東北成三由旬處一地方名阿奢羅義提村面積四六加利沙之地面一三降下黃金之粒塊雨其大小有種種大者有一搩手量小者一指量一四其村之住民等見其地黃金充滿攜金鉢前往報王一五都之東方七由旬處有大河之對岸名丹巴毘陀村雨降銅之粒塊一六村民等以鉢盛攜其銅塊赴王之前申訴其事一七由都之東南四由旬之地名須蔓那瓦毘村雨降夥摩尼珠一八村民等混以青玉紅玉入鉢攜往報王一九都南之方角八由旬名安婆陀寇羅村之洞窟產銀二都城有一商人攜多數之車輛為由摩羅耶持來生薑薑黃其他之物而往摩羅耶二一置車輛於洞窟之傍得造刺棒之材彼登其山二二瓶之大小而熟波那沙果其熟之重量而枝橈又坐於石上見二三以刃物斷其柄以思善之部分奉施僧伽由信心報以食時到應此無漏之士四人來二四彼喜恭敬禮拜彼等使著座以刃物切其質四周之支皮二五受取果物中充滿汁以注入鉢彼汁充其等四個鉢以施彼等二六彼等受之而去彼再報食時他四人漏盡長老等來至其處二七彼受取四人之鉢充施巴那沙果之種子其中三人離去一人不去二八為示彼商人銀之所在彼長老由此而下坐於洞窟之入口食其種子二九所餘種子商人亦飽食所餘與商品共攜帶隨行長老之跡三彼往會長老行奉仕之務長老為彼向洞窟之入口設道三一禮拜長老彼依其路而行見洞窟立於窟之口彼亦見銀三二以刃物打之知其是銀取一箇銀塊赴車之附近三三棄車攜銀塊急赴阿㝹羅陀城彼善商人三四示銀塊於王報告此緣由三五上由都西方五由旬之處於烏魯衛羅港之街有大阿摩勒果大之真珠參交於珊瑚中共由海中止於陸上三五下三六漁夫等見此置藏於一處與真珠共盛珊瑚於鉢持來往王之處報告此緣由三七三八上由都北方七由旬之處通過培利瓦毘伽村之儲水池於洞門細砂上生四箇殊勝摩尼珠三八下三九大如磨石色似溫摩花之美見此獵夫引犬往王之處四報言余見如斯如斯之摩尼珠大功德之主大志之王此日為建立大塔聞此等甎及其他所生物彼以信心以此等呈奉適宜之敬意彼等為保護者持來都四一四二生身耐勞而不意為勞苦如斯以信心而積善業持安樂完成幾百事然則以如斯信心行善業四三善人之信心與感激起作大王統史名得大塔建設之資材第二十八章畢

body:
  text: 第三十二章上生兜率宮大塔之繖蓋工事塗堊工事未完之時王已罹近死之疾一彼王由提伽瓦毗村令呼其弟提沙來言大塔未完終其工事二以兄王罹重病故彼令縫工以淨白布造覆布令掩其塔三令塗工於其處作水滿瓶之列以描擴五指掌之列使做完成欄杆四同令傘工以竹製之傘以伽拉波陀木造欄杆頭部日月形五以樂庫桑夫蘭之塗料樣樣巧塗此塔以報告王塔應為之事完了六王臥於駕籠來至此所坐於駕籠右繞禮塔七近於敷南門地上之臥牀上彼以右脅下而臥拜此殊勝之大塔八以左脅下而臥拜此殊勝青銅殿見比丘衆心喜九為問王之疾病處處集來比丘有九億六千萬數一比丘等依羣列而行集團讀誦王於此不見提羅弗陀阿婆耶長老一一言行二十八回無敗北之大戰爭未曾退卻大戰士住余之處一二今余臨死之戰而見敗彼提羅弗陀阿婆耶長老不來余之處一三如斯王已思惟彼長老住於伽林達河源之般加耶利山知彼王之所念一四伴漏盡比丘五百人依神通力由虛空來侍王而立一五王見而得淨信心使坐彼面前云余曾得汝等十人之大勇士而戰而今唯開始一人與死戰不能克服死敵一六一七長老答曰大王勿恐怖人間之君主不克煩惱敵者非可克死敵一八入於諸行中者必將毀滅一切行是無常如斯大師宣説一九雖然脫去羞恥怖畏之諸佛亦成無常如是思一切行是無常苦無我二於前之第二世汝之法欲大由天上世界來汝捨天上之安樂二一來此處汝行樣樣諸多之善業汝亦為興隆一國之佛教二二大善業者汝至今日止皆行福業思起一切如斯汝之安樂立即而來二三聞長老之語王歡喜曰於死之戰汝亦守護我汝言此二四爾時王喜令持來善業帳向書記官讀之彼讀其帳薄二五由大王所建之大精舍九十九摩利質耶瓦提精舍以一億九千萬金二六殊勝之青銅殿以三億金所建築大塔高價之物總造二十二七善覺者王令設大塔及其他之物大王大塔總價有百億金二八更又在名難坡之地方食阿佳樹果之飢饉時受取兩個貴價之耳環二九對五人漏盡大長老以淨信心施與美味稷之酢團子三於秋蘭哥尼耶之戰戰敗而逃竄向由空而來之漏盡行者告以食時到不顧自己自身施以金器之食如斯言之大地之主言三二精舍之祭七日青銅殿之祭同七日大塔工事之初七日同舍利奉安亦七日三三對由四方來兩大僧團余起貴價無餘之大施三四此毗舍佉月之大供養亦行三十四次對國中僧園令三度施捨三衣三五七七日之間余以喜悅之心此國之王位五度奉於佛之教三六常於二十箇處余添燈心淨酥油供養善逝尊點一千之燈心三七於十八處所醫調和病者用之食物藥料令常與病者三八於四十四個所善煮蜜粥於同數之箇所以胡麻油及摶食三九與此同數之箇所熟酪付大形綱目之餅常令供養同等參於飯四在月月之布薩會日供獻楞伽島之八精舍燈火用之油四一聞法施較物施功德大於青銅殿之下余為比丘衆説吉祥經雖然著席感比丘衆之壓而不能説四三由此以來於楞伽島內處處之精舍令施行説法對説教師表尊敬之意四四一人於説教師施與熟酥粗糖一那利斤量又砂糖四指量四五甘草各一握衣裳各施二枚然此之施事悉於君主位事余之心不喜此四六余之貧不期生又何有所行施悉余心喜四七聞此彼阿婆耶長老為令王心喜只以二種施事樣樣讚説四八此等五人長老中受取稷酢團子摩利耶提婆大長老於須摩那峰上四九此自食亦施九百之比丘然大地護持者丹摩具陀長老五於伽利耶尼精舍為五百數比丘等分施此食物自亦受用五一住於達蘭伽精舍而由毗揚具島出身者丹摩顛那長老施島中一萬比丘等自己亦受用五二住曼伽那有大通力之屈達提沙長老施啓羅莎精舍六萬人自己亦受用五三摩訶義伽長老於鬱伽那精舍施七千人自身亦受用五四受金器之食長老在毗揚具島施食一萬二千人自己亦食阿婆耶長老使王心喜者王得淨信心向長老申述五六二十四年間余為僧團之利益者此身亦是僧團之利益者五七所得大塔之禮拜於僧團之羯磨道場尊等僧團之奴余之遺身附之荼毗五八喚弟提沙王子言汝提沙於大塔未終一切之工作用汝意善令終此五九早晚以華奉大塔三度行供養之大塔六余對善逝之教奉仕勤慎一切無有廢事弟汝行此六一弟僧團之務一切不可惰如斯誡彼弟大地之主沈默六二其剎那比丘衆為一會讀經天人等牽六天人持六臺之車來六三此等諸天立於車上各別請言王汝來我等心樂之天界六四王聽彼等之言由手振動而遮此余聽法終了之間汝等之待六五比丘等見此王斷一會讀經思之而中止讀經王問其中止之理由六六彼等言等待與合示王言大德等此非左六七聞此某人人考慮此王恐怖死之言思之為除彼等之疑念六八彼阿婆耶長老對王如斯言王為汝持來天車如何示知六九賢明之王令向空中一一投擲華鬘其等如挂物挂於轅七見挂於空中等物大衆拂去疑念彼王以此長老語七一大德何之天界快樂長老言王兜率天為宮快樂善人等所思之處七二待佛之時機大名聲之彌勒菩薩今住兜率宮七三聞長老之語大智之大王仰見大塔坐而閉眼七四其剎那沉沒王生於兜率天由此立持來之車仰於天身七五示自作福業之果善嚴飾己身為示大衆七六立於車上不動王三度右繞行禮大塔禮塔與比丘衆而去兜率天七七於舞妓來脫冠處於此設脫冠堂七八王之遺身堆積火葬上而大衆叫喚於此設堂名為叫喚場七九王之遺身附荼毗界外之道場以此此處稱為王道場八彼睹多伽摩尼大王為偉人而適王之名為彌勒世尊之第一弟子八一王之父是彼彌勒世尊之父母又應為母弟沙達提沙應為第二之上弟子八二此王之兒彼沙利王子應稱為彌勒世尊之兒八三最要如斯之福業蔽多數不定惡業而行善業人趣於天界如還己家如是有智慧之人常喜善業八四善人之信心與感激而起作大王統史名上生兜率宮第三十二畢

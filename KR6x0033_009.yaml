body:
  text: 第九章阿婆耶之即位第一妃波達伽闍那産十人男兒一人女兒最長子名為阿婆耶末女則名奢陀一見此女子通吠陀神咒之婆羅門言彼女之兒以王位故殺叔父等二決議殺末女長兄阿婆耶制此經時使彼女住一根柱上之小屋三彼入口造向王寢室之樣內配一人之婢女外配一百人之男子四唯一見彼女而令人人為彼容色所狂故彼女名令得人狂奢陀之形容語五聞婆達伽闍那妃赴楞伽島事王子等強母止留一人來往楞伽島六彼等來此處會楞伽王般多瓦須提瓦亦可會彼妹婆達伽闍那與彼女共泣七由王十分歡待得王之許諾漫遊楞伽島規定隨意居住八喇嘛住所被稱喇嘛構那烏魯威拉阿㝹羅陀之住所各各呼彼名九同威吉陀提伽友魯哈那之住所則稱為威吉陀村提伽友村魯哈那村一彼造阿㝹羅陀蓄水池由彼之南構王城決定住居於其處一一經過般多瓦須提瓦大王時使己長子阿婆耶即副王之位一二提伽友王子之子提伽哥摩尼彼聞人狂奢及之事起戀慕之情一三彼赴烏婆提沙村見人間之主王與彼副王之位共授王近侍之職一四見面窗之處立之哥摩尼彼女奢陀抱染著之心問婢女一五彼誰人耶由此聞叔父之子於是命婢女與彼結關係一六夜以鉤梯子安置於窗登彼破窗而入一七與彼女共同過時翌朝未明而出去如斯常住其處因已無穴隙已無他所知一八彼女由彼而懷胎由此胎熟婢女語王女之母母問王女一九告王報王呼王子等言彼為吾等可養者以彼女嫁彼二若生男子令彼殺之彼女與彼産期將近耶彼女入於産室二一以衛卒疑闍陀與奴僕伽羅衛羅有關此事此等伽摩尼之家臣等二二彼王子等不與誓言唯殺害彼二人然二人成為夜叉護胎中之童子二三彼女令婢他之産期近使女查察彼奢陀産生男兒而彼婦人産女兒二四奢陀以一千金與彼女與己男兒而持來彼女兒近己臥室二五聞舉女兒而王子喜悅母與母之母二人皆對新生之王子二六以祖父之名字般多瓦須提瓦與長叔父阿婆耶之彼合為一名為般多伽婆耶二七楞伽島之護者般多須提瓦司王事三十年而於般多伽婆耶王子生時歿去二八彼人間之王者死去人王之子等悉集舉行彼施無畏者阿婆耶王子大規模之即位式二九善人之信心與感激而起作大王統史名阿婆耶之即位第九章畢

body:
  text: 第十章般多伽婆耶之即位由於溫摩達奢陀之指圖婢女伴童兒投入籠中往多瓦羅曼達羅伽村而去一然王子等往頓巴魯窟赴獵而見婢女問曰汝往何處去彼何物耶二婢女回答妾赴多瓦羅曼達羅伽村此為妾女之糖菓王子等令彼女卸下彼三奢陀與伽羅衛羅為守護彼童兒而出來彼剎那使彼等見化作大野豬四彼等追逐彼之野豬而彼女伴彼童兒得達彼之村童兒與一千金竊與受託之人五偶偶其日彼妻舉一男兒彼云余之妻產雙生男兒以養育彼六彼七歲時伯父等又發見彼遊男兒等遊玩於他雇人人殺害七立水中樹木空洞所隱潛入由穴至穴而久止八由此同出來彼童已近他之童兒等彼等問以偽欺之九王子等派遣人人來時彼男兒著衣服下水中立於穴中一彼等計算衣服殺害所餘之男兒等而去而報告男兒皆殺一一彼等已去時彼出赴己養父家慰彼而令住已經十二歲一二再聞童子尚生存彼伯父等令其處飼牛等皆殺戮之一三飼牛等其日偶偶捕護一頭四足獸為持火來派遣往彼童子之村落一四彼赴己家我傷足汝可持火至飼牛等之處汝於彼處得食烤肉言派遣彼養父之子一五一六上彼養父之子聞彼言持火赴飼牛等之處於其剎那派遣者等包圍彼等一切飼牛而殺之以報告伯父等一六下一七其後十六歲時伯父等再見出彼母與養父一千金並已指示彼之保護法一八養父以實母之便皆傳於彼以一奴僕與一千金送至般多羅婆羅門之處一九稱般多羅婆羅門為富有精通吠陀住於南部地方般多羅村二童子赴於彼處謁般多羅婆羅門問曰友御身非般多伽婆耶乎答曰然二一婆羅門恭敬彼云御身為國王正司七十年間之王事友汝習學藝令習學藝而彼子恙多又令彼迅速成就學藝二二二三彼為募兵給與十萬金集合五百人之軍兵時彼婆羅門二四汝有手取木葉化為黃金之女彼為御身之妃又愚息恙多為王師二五語而與財由此處令繰出彼軍兵彼善德具有者名乘高揚由彼處出二六得伽沙山麓都民七百人之郎黨與一切糧食二七由此王子率此等一千二百之士卒向吉利康達山之方前進二八名吉利康達西瓦般多伽婆耶之伯父而使用般多瓦須提瓦贈與之土地二九此王族子於其時偶偶廣百伽利沙之田地刈取有所成熟之稻彼王女名波利具有容色之王族子之女性三而彼女連眾多之伴乘美麗之車與父並持刈手等之食而行三一王族子般多伽婆耶之郎黨於彼處見此王族女告王族子彼速往赴三二彼女伴黨分裂為二彼從者與共車進彼女之傍問彼女云將赴何處耶三三彼女語一切事情心深為彼女所動王族子於彼女欲配分求己之食物三四彼之王族女立即下車以黃金之鉢於榕樹下薦食王族子三五餘之人人應饗食摘榕樹葉時剎那而彼等之葉成為黃金器三六彼王子見此等思再生者之語悅而云得足為我妃之乙女三七彼女一切給彼等食彼食無盡於其處常唯如見取去一人分三八如斯具有善業功德此華奢之王女由此之後名為黃金波利三九王族子般多伽婆耶攜彼王女乘車圍繞數多之軍兵無所怖而進四聞此彼女之父遣彼一切郎黨彼等行大聲彼般多伽婆耶之郎黨所威而歸來四一後此處名為卡羅哈那伽羅大聲城設一村落聞此彼女之兄弟五人為戰鬥而出來四二總為般多羅之息恙達所屠殺彼戰場名為魯西達瓦哈康達血車團四三由其處彼般多伽婆耶率大軍兵赴河之對岸多羅跋波陀四四住其處四年伯父等聞彼於其處留置王為與彼戰而來四五於多摩羅伽山之麓張大陣營彼等與彼甥交戰而甥則追跡伯父等四六追入河之此岸而還彼駐彼等陣營中二年四七彼伯父等赴烏婆提沙村報告王此事彼之王密書送交王子四八曰汝可領有河之對岸彼勿來至此方聞此彼九人兄弟等對王發怒四九而言汝久為彼之支持者而今則與彼國土若然吾等殺汝五王以王事託付彼等彼等總呼為一和提沙兄弟為王國之統率者五一此之施無畏者阿婆耶王同此一烏婆提沙村司王事二十年間五二住於多摩羅伽山名為奢提耶之女夜叉化牝馬之姿而徘徊於頓波利揚伽那之湖畔五三一人之男見全身純白而赤脚可愛此牝馬報告王子謂有如是之牝馬五四王子攜索捕彼女而靠近然彼女見彼由背後而來恐彼之威光而五五去王子不消彼女之姿而追走彼女週彼湖水走七回五六跳入摩訶甘伽河再行上來由此周多摩羅伽山七回五七再行周彼湖水三回由此更由卡奢卡渡躍入河中而在此處彼五八捕彼女之尾拾漂水之多羅葉而由彼福業威力彼為大劍五九振劍不振言彼女余不殺汝彼女語彼云奉取王國之王子主君勿殺妾六彼攫彼女之首以劍光突刺鼻以索而縛彼女已從順六一大力彼王子騎彼女而赴彼多摩羅伽山於此處住多摩羅伽山四年六二由此去與軍兵共來阿利達山以待戰爭之時機於此處住七年六三留住阿婆耶與吉利康達西瓦二人之伯父餘八人之伯父等調整戰備來至此阿利達山於都外設陣營附軍帥於四方包圍阿利達山六四六五王子與夜叉女議順彼女之語以國王之用品為贈物而添與武具六六謂總受此等之物余寬恕汝等王子先送軍兵六七謂入來將捉彼等之信心寬大之時彼跨夜叉牝馬率大軍兵六八為戰而入於內而彼夜叉女大聲鳴叫內外兩軍大為歡呼六九王子之軍勢殺敵兵而無餘八人伯父等亦殺彼等築髑髏之山七彼軍帥遁入矮樹叢此叢為此而名為軍帥叢七一彼王子於髑髏山之頂見伯父之首上云成如瓢矣由此出羅布村瓢村七二如斯克戰彼般多伽婆耶由彼處來至己大祖父阿㝹羅陀之住所七三彼大祖父以己之王舍與彼而自住於他處彼又住其舍七四星相學者又問地相學者於彼村令設殊勝都七五大臣阿㝹羅陀妃之兄阿㝹羅陀此兩阿㝹羅陀之住處故由阿㝹羅陀星之連合所建故由此為阿㝹羅陀都七六持來伯父等之傘蓋洗此處自然成之湖水以翳彼湖水之水七七彼般多伽婆耶行己之即位式立彼妃黃金波利為第一妃之位七八於恙達青年授與適當王師之職對他之家臣等亦與隨宜之官職七九彼母而又己之利益者故彼最年長之伯父阿婆耶王不與殺八與彼以夜間之政權時起都之守護如此以來於都中置有都護者八一義父為吉利康達西瓦亦不與殺彼與此伯父吉利康達地方八二彼堀蓄水池令多量之水戰勝時由此取水故故名此為伽耶瓦皮戰勝池八三伽羅衛羅夜叉住都之東方奢陀羅伽夜叉住於阿婆耶池之下邊八四前世恩人彼婢女今出生於夜叉族知恩之人彼般多伽婆耶王住於都之南門八五有牝馬顏夜叉女令住於王邸內無論此等他者等年年之供物八六使供給於祭祀時彼王與奇陀羅伽共同坐座天舞人舞八七王樂興踊快戲於四都門外之村落並作阿婆耶池八八大墓地死刑拷問之場所同設於西之羅吉尼宮為毘沙門天已值尼拘律樹為獵天已植之多羅樹八九彼與其共同地所及別別之家此等之物均設於近西門方面九五百之旃陀羅人都市之清掃夫二百之旃陀羅人為除糞夫九一一百五十之旃陀羅人為死屍搬出夫與彼雇入同數之墓守之旃陀羅九二彼等之村設墓所於西北方彼等照王之令行此等之事務九三於彼旃陀羅村之西北方設旃陀羅人之墓地名為尼奢須沙那伽賤民墓地九四此墓地之北方於波沙那山中獵夫等之長屋亦設於此時九五彼為北方地方至伽摩尼王池止有設各種苦行者之修道院九六其墓地之東方王為周提耶尼乾陀所構住屋九七同其地方名吉利為尼乾陀所住諸種外道沙門所住九八同王為昆班達尼乾陀所構之天祠為彼而冠以彼名九九由此西方部於獵夫長屋之東住五百邪見外道之家族一周提耶尼乾陀住屋之彼方伽摩尼池之此方彼王思建遊行出家之精舍一一設立活命外道之家與婆羅門之住宅與駕籠療病所之處處一二般多伽婆耶國王即位十年而設定全楞伽島內各村之境界一三為夜叉鬼之友彼王目見與伽羅衛羅奢陀共享受榮華一四般多伽婆耶王與阿婆耶王之中間已空位十七年一五為賢明之彼般多伽婆耶王三十七歲即大地王者之位於豐樂之阿㝹羅陀都中於此處滿七十年之間行王事一六善人之信心與感激而起作大王統史名般多伽婆耶王之即位第十章畢

body:
  text: 第三十六章十三王章老那伽王之歿後彼子巴提伽提沙伽見楞伽之政二十四年一使大精舍之周造柵彼王築造伽瓦羅提沙精舍二施此精舍有摩訶伽瑪尼伽儲水池築造名巴提耶提沙精舍三設愈快塔波園之布薩堂王於此國使堀他之一儲水池四彼對生類有柔心對僧團有強敬意大地護持者對兩僧團行大布施五巴提伽提沙之歿後其弟提沙伽於楞伽島行二十八年間王事六此王信普陀園精舍之摩訶那伽長老於阿巴耶吉利精舍令建精嚴之寶珠殿七於阿巴耶吉利建柵與大房舍於名為瑪尼蘇瑪精舍築大房舍八其同處塔之家雖在安波達羅同為塔之家而那伽島之塔家加以修理九此所撤消大精舍之結界境王則丹念營造庫庫達達吉利精舍之房舍列一人間之主於大精舍令建立十二美快方形之大殿一一於達基那伊哈拉塔建造掩被塔撒摩訶眉伽林精舍之境界建立食堂一二彼一方撒大精舍之柵造通達基那精舍之道路一三普達園精舍與拉瑪構那伽精舍與同那那提沙精舍亦設遊園一四於東方之河並阿努羅提沙山精舍尼野羅提沙山園精舍毗羅毗提精舍羅奢大精舍此人間之主營造之尚此王設立三處之布薩堂一五一六即名伽魯利耶尼伽精舍曼達羅山精舍多巴羅瓦毗提沙精舍為此等之諸精舍一七伽尼陀提沙王之歿後其子僅見王事二年知為秋羅那伽一八秋羅那伽之弟庫達那伽殺兄王行楞伽國之政一年一九此王於一那利伽飢饉之際摩訶巴利精舍住五百之比丘衆無中斷供養二庫達那伽王妃之兄西利那伽軍帥此時為王位之窺窬者二一率軍力來近都城與王軍戰庫達那伽王二二彼走而獲勝利於阿㝹羅陀殊勝都十九年間行楞伽國之政二三王勝作大塔之傘蓋施美快之金工二四改青銅殿造為五階更於大菩提樹園之四門設置段階二五設奢陀殿於其祝日行布施令慈愛第一之王國中家家免稅二六西利那伽之死後正巧裁判其子提沙行王事二十二年二七彼於此都建立脫害之裁判法所謂被名握哈羅伽提沙王裁判帝須王二八彼於康布村住之提婆長老前聽法修理五箇住院二九信仰住阿努羅園摩訶提沙長老於木且羅之港街行連續布施三彼提沙王於兩大精舍建立假堂與大菩提樹家之青銅像三一彼建安隱住之七葉大殿月月一千金布施大精舍三二於阿巴耶吉利精舍於名為達基那姆羅精舍於瑪利洽瓦提精舍於稱為庫羅提沙精舍三三於瑪喜陽伽那精舍於名摩訶伽瑪那伽精舍那伽島稱為庫羅提沙精舍同稱為伽魯利耶尼伽精舍三四如斯於八處王行繖蓋工事姆伽那伽軍帥在達基那精舍同行此三五瑪利洽瓦提精舍同稱普陀巴伽精舍稱為伊沙羅沙瑪那精舍名那伽島之提沙精舍此等六個精舍四周設柵設布薩堂稱為阿努羅園精舍三七彼王由正法恭敬之念連續行布施於楞伽全島之聖系譜之所談三八愛教人間之主布施三十萬金救濟有負債之負債比丘衆三九彼又為島民等行吠舍佉之大供養對所有比丘等施三衣四以伽毗羅大臣碎不平等部壓姦邪如斯光輝聖教四一此王之弟知為阿巴耶那伽與彼妃親密被發見而怖己兄四二與從者共遁往巴羅之渡裝如叔父切斷之手足四三為分割王國彼留叔父於此處示大譬喻伴極柔順者四四於彼處上船自往對岸而去叔父蘇巴提婆來王之處四五彼裝親密割王國為知此阿巴耶在此處派遣使者四六王見此使者取檳榔樹之周以槍柄巡回踏之根弱四七追誹以腕倒彼使者知之以報阿巴耶王此由四八阿巴耶知此由此與多之達彌羅人相從為與兄提沙戰而來近於都四九王知此遁乘馬與妃共往瑪羅耶地方其弟追此而行五刺提沙王於瑪羅耶伴妃而還為王於都行政事為八年五一王對大菩提樹之周構右欄杆構築青銅殿庭之假堂五二以二十萬金買取種種之布片彼對國中之比丘衆行衣服之布施五三阿巴耶王歿後彼兄提沙實子西利那伽行楞伽之王事二年五四修理菩提樹之周之柵大菩提樹家之砂利上彼五五於姆且羅樹之彼方精美之漢薩瓦陀精舍令設大假堂五六西利那伽王子名威伽耶王子父之歿後行王為一年五七於瑪喜央伽那有出蘭巴康那族之友三人桑伽提沙桑伽普提第三構達伽婆耶五八提沙池之堤防居一人明敏之盲人彼等為伺侯王而來之足音而知之言曰五九地運此等三人之大地主由後來聞此之阿巴耶來問彼盲人再答六續何者之系統耶彼再問彼答謂為最後者聞此彼與他二人共行六一三人入都受王愛寵王對誠勤而棲於王之處六二於王宮內二人為一殺威伽耶王軍帥桑伽提沙即王位六三於是此桑伽提沙於阿㝹羅陀之優都即位為政四年六四大塔之傘蓋施鍍金工事有一一十萬金之價大摩尼珠四箇六五王令嵌四個太陽之中央同塔之頭上嵌以無價之金剛石之頭裝六六彼人間之主為供養傘蓋祭施四萬僧團六枚之衣服六七住於達瑪伽羅伽之摩訶提婆長老說諸蘊品中聞經明粥供養之功德六八王對僧得淨信心於都之四門恭而且行適當之施粥六九彼時時為食熟閻浮果伴大臣伴後宮來巴奇那提巴伽七住巴奇那島之人人惱王之再來對王食閻浮樹果實塗置毒品七一食此等閻浮熟果彼立死其處阿巴耶以軍帥桑伽普提即王位七二王持五戒知為聖桑伽普提於阿㝹羅陀都行政二年七三設大精舍美麗籌食堂時彼知島中人人之凶作所禍七四以慈悲哀憐之心自臥於大塔之庭內地上如斯決意七五天降大雨無浮水餘之上余假令死此處不立七六王之斯臥耶天立即降雨全楞伽島使大地喜七七雖然如斯彼尚為不水所浮不為立上諸大臣由塞流路七八水續浮正義之王立上如斯由慈悲心王除島中凶作之難七九盜賊其處此處聞起王令伴來之盜賊竊逃八彼更持來竊死者之尸投火如斯除盜賊之難八一一人之夜叉來此處已被知赤眼而赤處處人人之眼八二人人互相見語對方眼赤由此而死者此夜叉無疑食此人人八三王聞彼等之災禍心震戰一人於布薩堂護持八齊戒者八四臥而言不見此夜叉余不起立彼夜叉依彼法之威力來至王之傍八五王問汝是誰答曰彼為余王言何故汝食余之人人以後勿為食八六彼言一部地方之人民與余王言不可彼次第言減與一人八七王言余不能與他之人人食余彼夜叉言不可請村村之供物八八言可大地之主於全島報村之入口施與彼供物八九如斯慈悲所有有情此之大薩埵由島之燈火雖然生大病難可滅去九名為庫達巴耶彼主藏大臣由都之北方進入篡奪王位者九一彼王不好傷他攜漉水布唯一人由南門遁逃九二一人之旅人攜食盛籠而行薦食於王為再三九三慈愛心豐富之王只漉水為食彼為授恩惠如斯言此九四余是桑伽普提王汝攜余頭示與庫達巴耶彼給汝多財九五彼不欲若然此事地主為彼坐著不動而死彼攜王之首九六示與庫達巴耶彼庫達巴耶心驚與彼財向桑伽普提王表十分敬意九七如斯此庫達巴耶亦知於每伽灣那巴耶視楞伽之政十三年九八令構大境地於境地之入口造飾假堂彼由僧團招比丘九九日日使坐一千八名以粥堅食軟食與種種之甘果一衣服之類設大施二十一日間如斯續行此一一於大精舍建優石之假堂於青銅殿四周令建石柱一二大菩提樹之石欄杆建北入口之門於四隅雕輪相令建石柱一三於三入口設三石像南方則令石造之座榻據其上一四大精舍之後設正勤地修理島中之一切古住院一五於塔波園塔之家雖然提蘭巴陀羅伽園同名瑪尼蘇瑪園亦為修理一六塔波園瑪尼蘇瑪園瑪利洽瓦提伽精舍名達基那精舍而營造布薩堂一七建梅伽萬那波耶新精舍為供養精舍之祭禮集島內住比丘三萬施六枚法衣吠舍佉大供養亦如斯於彼時行之一八一九逐年以六衣施僧團邪惡之比丘破門彼淨化教一一勝者教之障礙住於阿巴耶吉利精舍衛多羅部所屬之比丘六十人被捕一一一彼等破門使投棄於對岸而投棄其處長老之依屬有出周羅國之比丘一一二其名僧伽密多通鬼類之學於大精舍比丘等有包含來此處一一三此之無自制心比丘入於塔波園之集中彼於此處呼原本庫達巴耶王之名退彼住叔父房舍之長老桑伽波羅之言一一四一一五彼為王宮出入者王信仰彼長子之闍達提沙與弟之摩訶賽那一一六託此比丘彼比丘寵愛第二子闍達提沙王對此比丘已構敵意一一七父王之歿後彼闍達提沙為王對父之遺骸表敬意不欲出行一一八為排除惡大臣王自先為弟出行父之遺骸於其次一一九由此使諸大臣行之自成為主人與弟出父遺骸之門立即一二閉門殺惡大臣等串刺於父之火葬堆四周一二一由此行為有添名暴王彼比丘僧伽密多恐此王一二二其即位之共與摩訶闍那談續期望彼即位由此往去對岸國一二三彼尊重父之未竣工事有一千萬金價造青銅殿七階樓一二四有六百萬金價獻彼摩尼珠闍達提沙構造彼摩尼殿一二五高價之摩尼二箇施與大塔為大菩提寺建立三門一二六此大地之主設波基那提沙山精舍施舍五個住院於僧團一二七彼闍達提沙王見昔天愛帝須王於塔波園中所建優美石製之大像一二八由塔波園持來彼安置於波基那山精舍一二九將伽羅瑪提伽池施與支提耶山精舍精舍與殿樓之祭吠舍佉大祭亦一三彼闍達提沙所行向三萬比丘等各施六衣使堀阿蘭波伽瑪池一三一如斯此王建殿等行種種善業坐王位十年間一三二如斯人間之主行多種善業之因多種惡業之因如蜜與毒相參之食物有善人之心者斷然無親此事一三三善人之信心與感激而起作大王統史名十三王章第三十六章畢

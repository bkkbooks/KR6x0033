body:
  text: 第二十一章六王章鬱提耶王之歿後其弟為善人之僕摩訶西瓦十年之間行王事一彼歸依婆達莎羅長老於都之東方造營佳美精舍那伽蘭伽那二摩訶西瓦之歿後彼弟為敬虔善業之須羅提莎十年間行王事三彼於南部地方那伽蘭伽那精舍東部地方哈提康達象背公那吉利之兩精舍四在萬具達羅山名為東山精舍同羅貨羅伽山之附近庫蘭婆婆羅加精舍五於阿利陀山麓蘭伽精舍東方之阿奢伽羅伽精舍城北方吉利內羅波那康陀精舍六敬三寶大地之王執政之前與後六十年間如是以五百之美麗精舍始為楞伽國康伽之此岸彼岸與處處隨法而設七八彼執政以前名蘇曼那頻達提薩由即王位名為蘇羅提薩九巧於乘馬乘船之二達彌羅國青年塞那及古陀伽以大軍捉彼大地守護者蘇羅提薩一二十二年之間行正王事目達西瓦之子為同腹兄弟中第九人之弟為阿塞羅捉彼等十年之間於阿䨲羅陀都行王事一一一二乘名耶羅羅方直之質達彌羅人為奪取王位由喬羅國來此國捉阿塞羅王一三坐四十四年間之王位於裁判之際無論原告被告皆公平一四為求判決者為欲令鳴彼於臥床之枕邊結一長索使吊至鐘一五此王有一王子與一王女此大地護者之子一日行車赴提沙池一六與幼犢之牝牛共橫倒路上不識而挂於車輪之轢而殺一七牝牛怒以心行打鳴彼鐘然王以彼同一車輪碎王子之頭一八一隻蛇於多羅樹上食小鳥彼小鳥之母鳥行打鳴鐘一九王令捉來其蛇割其腹放小鳥蛇則吊於多羅樹上二雖不知最上寶者佛三寶其德性此王已守教法二一曾赴支提耶山為比丘衆招待自恣之供養乘車還來以車之一端二二破毀勝者塔婆之一部於是乎諸臣向王云大王吾等之塔婆因王所損毀二三無心為事此王由車降下言以車輪碎我頭已臥於路上二四而家臣等謂大王害他之事為世尊所不欲繕修塔婆以懺悔二五於此處倒下五十之石而築彼王與彼等五萬加哈波那二六一人之媼為使乾米以日曝此天降不時雨而米濡二七彼女攜米而行鳴彼鐘王聞不時之雨事使彼婦還二八行國王法得適時季之雨為得其判決王守持戒二九受供物之天子為王威力所壓赴四大天王之前語此三彼等伴彼天子往報帝釋天帝釋天語雨神波尊那命令降適季節雨三一受供物之天子以此告王由此以來彼之王國無日中降雨每七日於夜間中夜降雨到處雖小窪地亦充滿水三三即不捨邪見之此王亦只求避過而行不可行之處如是逢不思議有佛智淨見之人如何不捨行此不可行行之過耶三四善人之信心與感激而起作大王統史名六王章第二十一章畢

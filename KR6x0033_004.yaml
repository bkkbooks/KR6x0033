body:
  text: 第四章第二結集阿闍世王之子弒逆者鬱陀耶跋陀羅弒彼父王在王位十六年一鬱陀耶跋陀羅之子阿㝹樓陀弒彼名聞荼阿㝹樓陀王之子弒彼雖然為心愚之弒逆者彼等亦上王位此兩者在位之間共過八年二三聞荼王之子逆徒那伽陀娑迦弒父即承二十四年間之王位四此弒逆之王統令怒都民等由此集退那伽陀娑迦王五而所知之修修那迦受大臣尊敬由一切人之好意而登王位六在此王位十八年彼子迦羅阿育又在位二十八年七如是由迦羅阿育王之即位十年而正等覺者般涅槃已過一百年八時於毗舍離城有多數跋耆子比丘等一蓄角鹽二日陰移正午不過二指間取食三又入村落內更食四於大住院內處處行布薩會五於一部衆中行僧伽事後求他承諾之事六行反習慣之律七喫不攪拌牛乳八伽羅吉酒飲未熟如鳩足色九使用無緣之尼師壇十手取金銀無恥之徒已為此十個條為淨九一一一上聞此而於跋耆比丘之間遊行中之耶舍長老迦乾陀婆羅門之子得六種神通力之長老制此努力共赴其處之大林一一下一二彼等於布薩堂內據置盛水之金鉢向信士等言對比丘衆施伽洽婆那金貨等一三此對比丘不適勿施與此長老遮止之彼等遮耶舍長老已行不至白衣家羯磨一四彼求隨伴者與彼共入都於已言告都民適之法一五聞隨伴者之語為擯斥而來之比丘等圍立於長老之家一六長老飛上空中而行降立於憍賞彌於波婆阿槃提之比丘等處速遣使者己則赴阿普康迦山語其一切於麻布衣者參浮多長老一七一八住波婆之長老六十名住阿槃提之長老八十名一切之大漏盡者共降阿普康伽山一九由處處集來其處之比丘等其數九萬此得自由之人人亦相語多聞漏盡之須離人離婆多長老乃知為當時之第一人者欲見彼而赴二二一彼長老聞此之談妥而赴毗舍離城欲安樂之旅由此剎那立即出旅二二追此大人之後者等彼朝出之而夕達於其處於娑呵邪提漸與彼相會二三二四於此處耶舍長老由參浮多長老之勸向於聽聞正法優秀之士彼離婆多長老就十箇條而問長老非認此聞諍事言吾等制止此二五惡比丘等亦欲引自黨相會彼離婆多長老彼等夥調沙門之資具二六乘船速行達近娑呵邪提到食時行配分食物二七住於娑呵邪提漏盡長老娑羅冥思波婆之比丘等知語正法二八大梵天來此長老之所言依住於正法彼亦語己常依住於正法二九彼等持資具會見離婆多長老長老自不為彼黨追放為彼黨之弟子三彼等赴毗舍離城更赴至普巴普羅華氏城無恥之輩語迦羅阿育王三一吾等為護吾等大師世尊之香室住彼跋耆之地大林精舍中三二住村落之比丘等若專有精舍若來者大王制此彼等邪引王入自黨向毗舍離城去三三三四上於其處有娑呵邪提集離婆多長老之下比丘百十九萬人令鎮服其諍事三四下三五滅諍事為本之比丘鎮此非長老所好於是此等長老比丘悉赴毗舍離城三六被邪引入彼王於其處遣大臣彼等迷於天人之威力而赴他所三七派遣彼等彼大地之護者王同夜已夢見自投入銅壺地獄三八甚為可怖彼妹無漏之長老尼難由虛空來此慰彼三九王為自由事應向正義尊者等謝罪彼等之成黨乃為圖王教之利如斯王將有幸言已而去四四一上地之主王於次朝往毗舍離城而行出四一下往赴大林彼令集比丘衆聞雙方之語認是正義黨四二大地之主一切向此等正義比丘謝罪語已正義黨者又言汝等隨好所圖教之利益加保護彼等己向都而去四三四四為決此等十事比丘衆其時集會其處於衆中起論議不果四五於是加於衆中彼離婆多長老咨衆由委員決鎮諍事四六波夷那國者四名波婆邑者四名為鎮比丘等之諍事選出為委員四七名薩婆迦眉娑羅級闍蘇毗多長老婆娑伽摩迦與此等波夷那國之長老四八離婆多麻布衣之參浮多迦乾陀之子耶舍與須麻那此等四人為波婆邑之長老四九為鎮此十事此等八名漏盡之長老等無騷音無混雜赴婆利迦園五欲知大牟尼尊之意此諸大長老於其處著年青之阿耆多所設之善座五一就此等箇條之一一普巧於尋問之大長老離婆多順序追問薩婆迦眉長老五二薩婆迦眉大長老直答彼問云此等之箇條一切不適應於經藏五三於是彼等次第排除此紛諍於比丘衆之間亦同行此問答五四說十非事而制住此等一萬之惡比丘是此諸大長老五五薩婆迦眉此時是地上大衆之長老其時法臘為一百二十歲五六薩婆迦眉與薩羅離婆多級闍蘇毗多迦乾陀婆羅門之子耶舍與麻布衣之參浮多五七此等六人之長老是阿難長老之弟子婆裟伽摩迦與須摩那五八此兩長老乃阿㝹樓陀長老之弟子八大長老共嘗禮事如來為宿善之人五九此時集來比丘一百二十萬人一切比丘之長老是離婆多長老六時彼離婆多長老為正法久住行法之合誦由一切比丘會集之中六一具與法等分四無礙智精通三歲之阿羅漢比丘中選出七百人六二此等一切於迦羅阿育王之保護婆利迦園集合以離婆多長老為上首行法結集六三亦於嘗行通過之後法是佛所說此第二合誦為八個月而畢六四如斯此等名聲大而無失誤之長老等相繼入涅槃六五如斯有最上之智慧達於應達之法行三界之利益由世尊之胸出生之人人思及死事精勤無餘悟得有為諸法之無質六六善人之信心與感激而起欲作大王統史名第二結集之第四章畢

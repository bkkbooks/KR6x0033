body:
  text: 第二十九章大塔建造之初如斯準備完畢睹多伽摩尼王吠舍佉月滿月之日吠舍佉星現時為大塔建立之始一取去彼處之石柱國土之主樣樣令堅固大塔之箇所堀下及七肘二令兵士等持來圓石由此以鎚碎為小石三判知利益與不利益之王為堅固其地用大象蓋皮之腳踏之四空河水之落處常住濕氣於此處四方三十由旬之間土壤柔順五以其柔故此稱為酥土漏盡之沙彌等由其處運來此土六於其處王敷土於碎小石之上於土之上敷甎七於其上塗粗漆其上以庫魯銀達石其上以鐵網其上播摩倫巴砂八沙彌等由雪山持來香玻璃大地之主令敷其上九敷玻璃之上令敷石一切所用之土稱為酥土一於石上混伽毗陀樹之液汁及椰子樹之液汁使堅固厚張八指量之銅鍱一一其上以摩樓尸羅石浸胡麻油以固七指量之銀鍱車乘之主令張之一二大地之主如斯立大塔於箇處完豫備之業以淨信心一三於阿沙荼月白分之十四日催比丘衆集會如下云一四諸大德余明日令建立大支提大塔拮據吉祥甎總集此處我等之比丘衆一五為供養佛陀之法願大衆之利益者有意受大衆八齋戒者取香花等一六明日請來大塔建立之處又為永久嚴餘支提之土地對大臣等亦下命令一七人主之命令下以牟尼尊由喜敬心用種種之方法莊嚴彼處一八以都會全部此大精舍來之道路生類之主王由種種法飾之一九早晨於都城之四門使配置浴人沐人同諸多理髮人二以衣服香鬘及甘味食物喜大衆之利益大地之主為大衆二一令準備此等之物隨意調配己都人田舍人亦來見大塔之處所二二以附飾於地位應乎地位善飾而多數之大臣等所守大地之主二三調善飾如天女圍繞多數之舞妓自善裝飾二四周邊有四萬之人人令鳴打樣樣之樂器有天王之光榮二五而有眼之睹多伽摩尼王辨知理非理歡喜大衆其日之午後來至大塔建立之處所二六彼王於中央準備一千零八包之衣服由此而又於其四隅積多數種種之衣服為祝而提供蜜醍醐糖丸及其他之物二七二八由各國來集此處衆多之比丘等住此國之比丘衆來此處且不要言二九群衆之導師音達庫陀長老由王舍城之四周伴八萬之比丘來三丹摩賽那大長老由婆羅捺斯之仙人墮處伴比丘二萬人來支提之處三一毗達西大長老由祇陀園精舍帶六萬比丘來此處三二大弗達羅吉陀長老由毗舍離大林精舍率一萬八千比丘來三三由憍賞彌之瞿史羅精舍長老大丹摩羅吉陀伴三萬比丘來至此處三四在鬱禪尼由達吉那義利之大丹摩羅吉陀長老伴行者四萬人來三五隨比丘等十六萬人由普婆弗羅華氏城之阿育園名蜜提印耶長老來三六帶二十八萬比丘之阿努天那長老由伽濕彌羅國三七大智者大天帶四十六萬之比丘由婆羅瓦領來三八彼長老摩訶達姆摩羅吉陀伴三萬之比丘由臾那國之阿荔散來三九鬱陀羅長老由彼棲處之賓陀林道伴六萬比丘來四奢多屈多大長老由普提蔓達精舍隨三萬比丘來此處四一恙達屈達大長老由瓦那瓦沙地方率八萬行者來此處四二須利耶屈達大長老由啓羅沙精舍伴九萬六千比丘來四三住此島之比丘來會者總計幾何耶彼數量古人亦不記四四集來此集會之比丘中至盡諸漏者謂唯九億六千四五此等之比丘各各順其能回巡大支提之處中央為王之位留立空位四六王由此處入來見比丘衆如斯立以淨信心禮拜以喜悅心供養香鬘三度行右繞禮具備禮儀則近中央充據水瓶之處四七四八起清喜力之王挂置金軸以銀作清遊行之杖四九念生類福祉之王素性善著飾身一切皆可喜可賀為大臣圍繞五以極大塔圓周決意之王始準備調配箇所巡回五一然其名為有大神通之西達陀有遠見力大長老以遮王之如斯五二謂此王如斯始建立大塔塔之建立未成王將崩五三為作大塔修理困難如斯彼未來之見遮其為大事五四由比丘衆之承認且由恭敬長老等之意雖欲造宏大之塔而王接受西達陀長老之言五五基於彼長老之指示王以塔之周圍使造中型甎塔五六致全力建塔之王令據置中央金與銀共八箇之瓶其周圍五七令據置千八箇滿水之新瓶以及令據置八箇優善之甎一一處為異於其周圍使置有百八箇銀甎與百八領之衣服五八五九衆人所敬飾著種種之一大臣抽出其中認為有種種吉瑞之一甎於東之方角第一吉瑞之甎五九下六據置於恭敬美事香泥之上而於其處獻素馨花時大地震動他七箇為置七大臣以行祝祭六一六二如斯為阿沙荼月之穩白分十五日據置甎於布薩式之日六三其王順次大喜供養禮拜其處立四方漏盡之諸長老六四赴東北方敬禮漏盡大長老毗耶達西而立於傍六五此處王高唱吉祥經彼長老為王説法長老之説法此之人人而有利益六六有四萬人法之領會者有四萬人之預流果者六七有一千之一來者又有同數之不還者其處又有一千人在家人之阿羅漢六八而一萬八千之比丘與一萬四千之比丘尼共住阿羅漢果六九如斯對三寶有清淨念專注於布施心為利益人人者成世間之利益者知第一結信心等種種之德七善人之信心與感激起作大王統史名大塔建造之初第二十九章畢

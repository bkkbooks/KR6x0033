body:
  text: 第二十五章睹多伽摩尼之勝利由此睹多伽摩尼王徵募人民附舍利於槍尖率戰車軍兵馬車一赴提沙大精舍禮拜僧團言為我教之光輝願赴河之彼方二與我等共行可尊敬諸比丘與我等能見此諸比丘乃我等之吉瑞又為守護者三謂為贖罪僧團與五百人之行者大地之王者伴此比丘眾離此而去四於摩羅耶地方來此令淨掃中途乘康睹羅象伴戰士等五與大軍兵共戰鬥而出行彼軍兵已至具陀哈羅伽而尚續至於摩訶伽摩六來至摩喜楊伽那捕達彌羅人奢陀於彼處斃他之達彌羅人於河與濠之安婆渡來七征討達彌羅人提坦婆與精銳之大軍戰及四個月八以見母親依其誘惑捕提坦婆由此王以下流七人強勢之達彌羅等九於一日中捕之大威力者行和睦與軍隊財物乃至被稱為凱摩羅摩和睦精舍一於安他羅索婆以摩訶寇陀於睹那捕伽瓦羅於哈拉寇羅捕伊薩利耶於那利蘇巴捕那利伽一一於提第伽哈耶伽羅伽又捕提伽婆耶在伽奢之渡口要四個月逮捕伽毘西沙一二又於寇陀城捕寇陀順於哈羅瓦哈那伽於瓦喜多達彌羅人瓦喜多更於伽摩尼一三又於群婆村難提村捕難提伽於伽奴村捕伽奴尚又在丹婆溫那摩伽叔父與甥名為丹婆與溫那摩瑪伽二人更捕恙普如各各之村呼各各之名一四一五王聞如是言不知自己之軍隊倒斃自己之眾王於此處誓言一六我為此之努力絕不為王位之安泰我此之努力乃為樹立正覺者之教一七由此真實語我軍隊之纏甲冑可為火炎之色其時為如是一八於河岸之戰時討漏之達彌羅人為避難皆入於維吉陀城一九王則快開其地設置陣營峰之由康達瓦羅毘提陣營名而知二人王為占取維吉陀城於試驗中見難提密陀之行放康多羅象二一難提密陀來捕此象用兩手押兩牙蹲踞而使坐二二彼難提密陀於此處與象鬥於此地造村呼為哈提波羅二三王試兩者之力赴維吉陀城戰士等於南門凄涼交戰二四又乘馬彼耶魯斯那於東門擊斃數阿僧祇之達彌羅人二五達彌羅人等閉門王遣戰士等於康多羅難提密陀並於蘇羅尼彌羅南門二六同時彼摩訶索那構陀與提羅普陀三人活躍於他之三門二七有三濠護高城壁有鐵製之門扉實難破敵之城二八此象以膝立用牙食石漆喰並崩瓦迫鐵門二九達彌羅人由城門投下種種武器熱鐵塊及溶化金屬液體三康多羅象脊背被投下熱鐵溶化之金屬續發煙痛楚不堪赴水邊躍入其中三一寇大因婆羅云此非為汝之勝酒破壞鐵門乃汝之勝酒去以破門三二生誇最勝之象心咆哮由水上升立於地上三三同時象醫拭塗以西雷沙之藥王乘此象以掌摸撫顳顬三四汝康多羅於全楞伽島之王權言慰汝與上妙之食物三五卷付布善使武裝於皮膚上縛付折七重水牛皮三六於其上浸油與皮以放之彼則如雷咆哮堪危難而堪進三七以牙製造門縫以足攤打門閾彼門與門柱一同起音而倒三八城門上之物塊崩掛於象脊背上難提密陀以腕推拂三九康多羅象見彼之所作心喜捨棄最初押下戰士之牙怨四為乘己背入城為最勝之象康多羅引返見其處之戰士四一戰士思惟不可由我象作路入城以腕打城壁四二其倒及高十八肘長八宇沙巴象則見下蘇羅尼密羅而彼又不欲取其路四三以馬飛越城壁下於城內庫達與蘇那破各各門扉而入城四四象取車輪米羅取車臺庫達取椰子樹尼密羅取最上之劍四五摩訶蘇那取多羅樹提羅普陀攜大棍棒各各別別赴街粉碎各處之達彌羅人四六王族士剛摩尼要四個月破義質陀城由此赴義利羅伽擊斃達彌羅人義利耶四七由此赴摩貨羅城然有三大濠徧被蔓草包圍而花開之加單婆四八有一門而入困難大地之護者止其處四個月以戰略捕摩貨羅王四九由此王赴阿㝹羅陀城於加沙山之對面張野營五於逝瑟吒月在其處造池塘行水之祭其處之村被稱為波索那城五一大地之護者耶羅羅聞彼多達伽摩尼王為戰而來此招集家臣等五二聞彼王自為戰士彼有數多之戰士家臣等應作如何耶彼等將對我等作何等耶如是思之如是云已五三提伽恙睹始耶羅羅王之戰士等如是決意我等明日將戰五四睹他伽摩尼王亦與母共謀由彼女之案築三十二之城塞五五於其處置持王傘者與王之人形王自留於塞中五六武裝之耶羅羅王乘摩訶婆巴達象由戰車軍兵馬象所伴來於其此五七戰爭開始有大力凄涼提伽恙睹取劍與楯續戰鬥五八跳上空中十八肘以劍毀王之人形破第一之城塞五九如是大力者提伽恙睹殘餘之城塞亦皆被破而伽摩尼王之所護城塞已被迫六大力戰士彼蘇羅尼密羅對王續行使自舉姓名而駡彼六一一人惱怒騰入空中斃彼一人向降來者差出楯牌六二彼思以諸楯斬殺此者以劍打楯又一人放下彼之楯六三而擊打大力者打提伽恙睹所放之楯而落於其處蘇羅尼密羅起以劍誅殺落者六四一度吹起普提瓦貝達彌羅人之軍隊崩潰耶羅羅王亦一度退卻如是多數之達彌羅人被屠殺六五其處之池之水已為所打濁污多人之血其故池由庫蘭多瓦毘一族終焉之池博知其名六六大地之王者睹達伽摩尼在此處打大鼓除余他之者不可殺耶羅羅王如是巡迴宣告六七自行武裝之王身著武具乘康多羅象追耶羅羅王至南門六八於城之南門兩王相戰耶羅羅王投槍伽摩尼避彼六九使己象以其牙刺彼象並向耶羅羅投槍使彼與象共倒於其處七戰勝之王伴以戰車軍兵馬象使楞伽島統一於一王傘之下而入都七一於都巡迴打大鼓集四方一由旬之眾為行供養耶羅羅王七二彼身體所倒之箇所構柩舍終於荼毘又於其處造靈祠表示恭敬之意七三楞伽王等今尚近赴彼地為表恭敬彼而鳴樂器七四如是彼睹達伽摩尼捕三十二人之達彌羅王於一王傘中統制楞伽島之王位七五義質多城之被破彼戰士提伽恙睹加以甥之戰士事告耶羅羅七六彼名拔魯伽之甥申告來此處之事拔魯伽聞彼之言七七耶羅羅荼毘日之第七日同六萬人之眾於此處上陸七八上陸後彼聞彼王之斃事心恥言我戰鬥由大渡海場來此處七九於寇蘭巴哈羅加村設置陣營王聞彼來而出戰八以全身武具著鎧乘康多羅象象馬車戰士並步兵無所缺八一以十種之武具著鎧之溫摩達普沙提婆乃為島中第一之弓手其餘之戰士亦從彼而行八二騷動之戰起武裝之拔魯伽向其處接近王象王康多羅八三彼勢弱而次第退卻軍隊亦與彼共次第退卻八四彼王問此過去二十八次之戰未曾一次退卻普沙提婆此何故耶八五王無雙之勝利在於我等此象見勝利之地而退卻勝利之場所可立止於彼八六由此彼象退卻為大精舍之境地都神之傍固踏而止立八七於象王之彼處立時達彌羅人拔魯伽其處向王而來己嘲王曰八八王以劍覆己之口而駡彼放一箭射射王之口八九箭打劍刃而落於地上拔魯伽思於口中揚起歡聲九坐王背後之大力者彼普沙提婆彼射彼拔魯伽之口箭掠過王之耳環九一對彼拔魯伽以足向王倒去彼拔魯伽放第二箭貫彼之膝九二用手之輕妙如拔魯伽而頭向王倒去彼之倒去頗昇起一時之勝鬨九三普沙提婆於自告白己之過失自切耳朵示王以一掌量之血九四王見此而問何事彼向大地之王者答云臣自行王刑九五問曰汝之罪過者何答射大王之耳飾兄弟以無罪而解為罪何為如是之事耶九六有報恩心之大王更謂汝之名譽可與箭大相應九七達彌羅人之倒斃得一切勝利之王由此上昇高台著師子座九八於舞妓家臣等之中普沙提婆持來彼箭以箭羽垂直使立於地上九九由上再由上伽哈波那金貨被注其箭於其座與普沙提婆一人王其時有莊嚴點妙香之燈火和種種之好香參於舞人以天女飾於人王之高臺上被敷延無價柔妙之臥榻一一一二以橫張展曾顧己光輝之大成果回憶殺戮阿寇喜尼數之生類乃不得幸福一三美央具島之阿羅漢等知彼之此之思為慰其主派遣八阿羅漢一四彼等而於中夜來降王宮之門報而行空昇於高臺上一五大王拜彼等使著座表樣樣之敬意問來訪之理由一六答人間之主我等由美央具島之僧為慰御身受遣而來王再言彼等一七諸大德如何安慰我耶我為行阿寇喜尼數大軍之殺戮一八因彼業無障御身上天之道人王於此處唯殺一人半之人一九一立於三歸依者一人立於五戒者他是邪見並惡行之徒而思等於獸類一一御身又種種之法光輝佛之教如是人王御身拂去心之憂慮一一一如是彼等安慰大王得如是安堵之思拜送彼等出己臥而又思一一二余之幼時父母於食時誓無論如何之時不與僧團共食一一三不與比丘眾而有食耶如是顧慮於早上之食莢一黑胡椒無意識供養僧團見此事又因此余思應謝罪一一四一一五於此善人思念害此等幾俱胝之人眾此應思惟此乃為諸欲總傾喜此應思惟此是患難如斯應善思惟世之無常善人不久而苦惱之解脫或達善趣一一六善人之信心與感激起作大王統史名睹多伽摩尼之勝利第二十五章畢

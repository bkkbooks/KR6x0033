body:
  text: 第五章第三結集於初摩訶迦葉等諸大長老所行正法之合誦稱為上座部之合誦一最初一百年間上座部説為唯一由此以來生起他之阿闍梨説二行第二之合誦會此諸長老為抑壓此等一萬惡比丘遂生起名大衆部阿闍梨説由此生雞胤部亦生一説部三四由雞胤部而亦生説假部多聞部制多部為此之兩部間所生此等合根本大衆部為六部五其次又由上座部而化地比丘與犢子比丘生此之二部衆六如斯而法上部賢胄部比丘六城部正量部之四是犢子部比丘也七説一切有部比丘與法藏部比丘此二者共由化地部比丘中生八由説一切有部而生迦葉遺部由此生説轉部而又生經量部比丘九此等與根本上座部共為十二部與前述之六部斯合為十八部一如斯佛滅後第二百年間生十七部他之阿闍梨説乃由此以後而生一一雪山部王山部同義成部與東山部比丘同西山部一二合計金剛部六部於閻浮洲所分法喜部海部之二於楞伽島所分一三阿闍梨家分裂畢迦羅阿育王之兒兄弟共十人彼等行政二十二年之間一四由此次第追逐九人之難陀兄弟而為王司政為二十二年間一五激怒者闍那迦婆羅門弒第九之陀那難陀王生孔雀王家之統具有威光知旃陀羅崛多者即全閻浮洲之王位一六一七此之旃陀羅崛多在王位二十四年彼之兒頻頭娑羅在位二十八年一八頻頭娑羅之兒知為百一人而其中之阿育王子有善根威光體力神育力殺戮異母兄弟九十九人即全閻浮洲唯一之王位一九二勝者涅槃之後此王即位前為二百十八年如是當知二一大名聲之王四年而統全閻浮洲為一王國於波吒梨子城自登王位二二彼即位同時於空中同於地下法令常由旬由旬而擴行二三諸天由阿耨達池日日運來八擔之水然王亦分此與人民二四諸天又由雪山地方齎運那伽蔓樹之數有百千金價之楊杖木二五由此又齎運阿伽陀果阿摩勒果相同阿伽陀之阿梨勒果熟之菴羅果色香味亦優二六諸天又齎運五色之衣裳與拭手之黃色布巾與更由六牙池持來天人之飲料水二七龍神由龍宮之塗香塗眼膏有素馨花模樣而無緣之布與天上之青蓮華與三而鸚鵡以日由六牙池附近齎來九萬車量之籾米三一有鼠去此籾米之殼去粳無損於米於王宮以此為飯三二蜜蜂常為王造蜜熊同於鐵工店打下鎚三三形美而聲如蜜之迦陵頻伽鳥來為王發蜜音三四登於王位此阿育王立其弟名帝須王子為太子三五法阿育王即位畢彼父供養大梵黨六萬之婆羅門而彼亦供養彼等及三年三六配食之時見彼等狂躁之樣阿育王命諸大臣選拔上施物而施三七多智之王呼出諸派之外道等別別調查放於食堂令取食三八曾王宮之近窗而行來宮庭攝心之道士見此尼拘律沙門彼起淨信心三九彼尼拘律童子乃頻頭娑羅之諸王子中最長兄須摩那王子之兒四頻頭娑羅之疾病耶彼阿育王子父棄鬱禪尼而來華氏城四一逢父之死耶己無都城殺長兄於彼優秀之都握王權四二須摩那王子之妃同呼為須摩那而身已重由此東門外出四三至旋陀羅村其處有尼拘律樹之神呼彼女之名與構家屋四四於其日彼女産優秀之兒彼兒名尼拘律順天之恩惠四五長大旋陀羅見彼女思如己之主歸七年間善奉侍四六其時成阿羅漢之摩訶婆樓那長老見此王子有阿羅漢之根機請求其母使之出家四七彼於剃髮堂達阿羅漢果由此欲見母妃而出行四八由南門入都尋往彼村之路偶爾過於王庭而行四九由彼肅然之威儀使彼大地主信彼於前世共棲而亦對彼生起愛情五傳言昔有兄弟三人之蜜商一人賣蜜二人採蜜來五一一人是辟支佛而惱於腫物之病今一人之辟支佛為此而欲蜜五二以行托鉢之形彼於時入都城欲得水赴河邊見此一人婢女五三問而知欲得蜜以手指之而語彼尊者彼是賣蜜店請向彼處行五四辟支佛赴往彼處信心甚深之彼商人由瓶口注出充鉢施蜜五五見充滿蜜之鉢與盛上而溢於地上彼起信心於其時祈誓云由此布施而吾於閻浮洲得統一之王位法令空中一由旨之間及地下又一由旬之間五六五七於兩兄來云如是人施蜜汝等隨喜此此是汝等之蜜五八彼長兄不喜言彼是旋陀羅而此旋羅常被黃色衣故五九已言仲兄彼辟支佛投入大海之彼岸聞彼之回向之語二人亦又隨喜六指示蜜賣之店之彼女為彼之妃不見關節祈得極美之姿六一阿育王是蜜之施者阿僧提蜜達妃是婢女謂旋陀羅是尼拘律帝須則云向海之彼岸者是彼六二彼尼拘律云是旋陀羅故在旋陀羅村求解脫七歲而得解脫六三彼王對彼沙彌得愛戀之心由此而慌令呼喚彼彼坐作穩定入來六四大王言兄弟汝適著座彼不見他比丘近於師子座六五彼接近王座而王如斯思今日此沙彌將成吾家之主六六王之手縋彼登上王座坐於白傘下之王座六七見彼坐其處彼阿育大王敬其德時大喜六八以為所調之硬軟食物令彼飽以正覺者所説之法問此沙彌六九此沙彌為彼王説不放逸品彼地護王聞此向彼言勝者之教得信心七兄弟將施汝以八人分之常住食彼又言大王以彼奉余之和尚七一其次施八人食耶彼以此奉彼和尚其次又施與八人食耶以供養比丘衆七二其次施與八人食耶覺者尼拘律沙彌諾此伴三十二比丘於第二日赴於王宮七三由王親手供養為護地者王説法大民衆亦皆受三歸五戒七四尼拘律沙彌會見畢由此王起信心日日倍加漸次增及六萬數之比丘七五王追放六萬之外道常為供養六萬比丘於王宮七六供養六萬之比丘王急欲調理價貴硬軟之食物七七令飾於都行招比丘衆迎於王宮而供養夥施沙門之要品七八若問師佛所説之法為幾何目犍連子帝須長老其時為王説七九聞有八萬四千之法蘊彼地主王謂余對此等之法蘊行奉施一一精舍八其時王於地上八萬四千之都布施九億六千財八一此處彼處王命開始建造精舍自開始建造阿育王園八二於此教三寶與尼拘律沙彌與病者彼於三者之一一彼日日行百千之施八三以施佛之財有供養諸種之塔波於諸多之精舍常行種種之供養八四以財施於法人人為護持正法之比丘等常齎來四種優良之資具八五若干擔之阿耨達水中以四擔施與比丘衆向六十名三藏長老日日供養一擔八六一擔則奉施阿僧提密陀天而王自受用二擔八七日日布施楊枝於六萬之比丘一萬六千之婦女布施名那伽夢樹之楊枝八八於時一日王曾見四人之正覺者壽命為一劫有大威神力之龍王聞摩訶迦羅之事八九彼為導來送黃金之鎖導來於白傘之下九結跏趺坐一萬六千之婦女所侍供養以種種花言九一汝轉正法輪示余一切智無邊智之大仙姿九二具三十二相以美八十隨好圍一尋量之光光輝光明之花環九三彼龍王化作出樂佛之御姿九四此物化作之姿如是如來之真御姿如何充滿悅喜之念九五供養眼球為普知之彼大祭大神通力之大王七日間中無斷而行九六阿育王之轉教畢大地主阿育王有如是大威力更篤信心目犍連子長老亦同彼等兩者已曾為自在者與羅漢之相會九七於第二次之結集彼長老等瞭望未來於此王之時佛之教已識有邪魔之事九八彼等瞭望於全世界可除去此邪魔識帝須梵天之生存不長九九彼等往此大慧者之處於人間出生中可請除此邪魔事一使興教之念彼向彼等約束彼之長老等歸還向幼年之道士悉伽和栴陀跋闍言一一過一百十八年後於教生邪魔吾等不及此生一二比丘等汝等不與此諍事故有杖罰之價然此為汝等之杖罰一三為興教大慧者帝須梵天託胎於目犍連婆羅門之家一四若時至汝等之中一人為彼童子而令出家一人令善學正覺者之語一五優波利長老之弟子馱索迦長老須那迦是彼之弟子而此二人之長老為須那迦之弟子一六昔於毗舍離城名馱索迦之婆羅門彼為三百人之弟子之長住於阿闍梨之處一七彼齡十二歲達吠陀之極意與弟子等共同遊行於第一結集畢住婆梨迦園會優波利長老坐於其傍問吠陀中難解箇所彼長老又答此一八一九青年有一之法追隨一切之法一切之法終止於一之法何者為彼之一法一一如是長老就其名目問而彼青年為不知所問此為何之神咒耶言是佛之神咒一一一言授與豫彼答吾授著吾之衣服者青年向其師問神咒之意同樣向母與父問一一二彼馱索迦青年與三百之青年等共於長老之處出家時到受大戒一一三彼優波利長老令馱索迦為長此一千漏盡者無餘説三藏一一四在長老之處學習聖典他之聖者凡夫不可以測計一一五迦尸國有名為須那迦商主之子彼父母共為商用而赴王舍城一一六十五歲之小童赴竹林園五十五人之青年伴彼而行一一七此處見出馱索迦長老伴弟子之群而起信心求出家而彼言請汝之師一一八彼須那迦童子未攝食事三次如是向父母承認來出家一一九此童子等共至馱索迦長老之前得度受戒且學三藏一二彼須那迦道士為長老之弟子群通三藏之漏盡者為一千人之長一二一名為波吒梨之都有稱為悉伽婆之有智慧大臣之子於三時季善適住於三宮殿大臣之子伴己友栴陀跋闍引具五百人人赴屈屈吒精舍往見須那迦長老一二二一二四入禪定攝受諸根而坐彼知是須那迦長老雖禮拜而無談話問彼大衆之理由一二五彼等回答入於禪定者而無與人談話如言如何由禪定起比丘等回答由師所呼喚由大衆之呼喚規定入定期間之畢又由壽命之盡事情而出定見彼等有羅漢果之根機向長老傳播大衆之語長老出定而赴彼處一二六八彼童子問尊師何故不為談話樂與可樂者亦令吾等享樂一二九言如吾等能得享樂由此彼悉伽和童子由父母之承諾與栴陀跋闍彼五百人人又於須那迦長老之前出家受大戒一三一三一此二人於和尚之前學二藏由努力而又達六神通一三二知帝須之託胎由此以後七年間彼悉伽和長老已通於其家而於七年之間只言去亦無所得第八年只在其家得彼言去一三三一三四目犍連婆羅門由外入家見彼之去問曰於我等之家得何物耶長老答言然一三五還家而問其次日長老為托鉢來家以虛言詰之一三六聞長老之語彼再生起信心為己故而調理常施食於彼一三七住於家者等亦無餘次第信彼再生者常留停彼在家攝食一三八如斯次第經時彼帝須童子其齡十六歲時已達三吠陀海之彼岸一三九悉伽和長老謂談話之最初應如是於彼之家除青年之座席如不見他之座席一四由梵天界來故彼喜好清淨因此彼其座席常懸置薰香一四一不見他之座席得見長老之所立耶家中人人以童子之座席為長老所設一四二由阿闍梨之前還來見長老坐於其處青年怒而發粗暴言一四三長老問彼言青年汝知如何之神咒青年則反問長老此問一四四長老言自證余知彼則問長老吠陀中難解之箇所長老説明此一四五彼長老為在家者時已達吠陀之奧義今四無礙智之長者奈何不能為彼説明一四六人人心已起而未滅彼之心滅然而不起或又人之心由此滅然不起之時彼之心已起而未滅一四七自若長老於心雙論中發此問此對彼如黑暗彼青年告長老言一四八比丘此為何之神咒彼言成佛之神咒云授給余耶答如著吾等之服裝者授此一四九彼為神咒而得父母之許諾而出家長老宜隨令出家而授業處一五專心想念大慧者不久而達預流果長老如實知彼學習經律兩藏送往栴陀跋闍之處彼於其處為學此一五一一五二彼見悉伽和道士時授彼大戒學律更學習其他之二藏一五三由此彼帝須少年開始修習觀法獲六神通次第升至長老之位一五四彼如月如日著顯於世世人以彼之言思如正覺者之言一五五目犍連子帝須長老之出世畢彼副王一日赴狩於森林見鹿之娛見此而彼心思忖為以草餌之鹿尚於森林如是之娛得美食而生比丘等何故不娛耶一五六一五七彼歸家以己之所思語王彼王令解彼七日間託彼王位一五八汝王子七日間坐此王位其後豫殺汝大地之主如是言一五九七日過時王言汝何故憔悴耶答曰死之可怖王再告彼言曰一六七日之後豫當死去汝不娛弟常想死此等道士奈何有娛耶一六一如是得兄之言彼副王信佛之教彼一日赴狩而坐於善攝漏盡之摩訶曇無勒棄多長老所坐之樹下見以象之沙羅樹枝為扇一六二一六三如此長老吾亦於勝者之教出家何時住於森林中耶賢者帝須如是思考一六四長老令起信心升於空中赴阿育園立止於蓮池水上一六五彼置殊勝衣服於空中入於蓮池手足注於水中一六六彼副王見此神通而大喜智慧者副王已決心今日吾出家一六七敬虔之彼近於王請求許可出家大地之主不能制止伴彼一六八隨衆多之供養自赴精舍彼副王於摩訶曇無勒棄多長老之處出家一六九與彼共四十萬人人亦均出家更隨而出家者其數已不可計算一七人王阿育之甥普知謂阿吉布羅夫摩為王女僧伽蜜多之夫一七一彼女及彼子亦之名為須末那彼阿吉布羅夫摩則請王而與副王共出家一七二此副王之出家而為阿育王之第四年此興大衆之福利一七三具機根之彼副王於此處受大戒後精進具六通為阿羅漢一七四於所有都府起工事此等一切是地點善好之精舍三年而善竣工事一七五由於工事監督者之蔭達古達長老之神通威力稱為阿育園精舍迅速成就一七六又勝者佛陀之往來箇所王則於各處令建立美麗之靈祠一七七由四方八萬四千之都府同一日完成精舍等來報告一七八聞報具大威光神通勇氣之大王所有精舍之大祭只行一時者一七九向市中巡回繫打大鼓由今第七日起於所有地方同時行所有精舍之大祭一八國中每由旬由旬行大施村之精舍與道路應為裝飾一八一於一切之精舍對比丘衆用一切方法隨時應力起大施一八二以燈鬘華鬘瓔珞於處處又以所有樂器之樣樣行供養一八三保持布薩日之八齋戒人皆可聽法其日亦可行種種變之供養一八四如天界之衆樂人人由一切之所有之方法王之命令之或調理增加更大之供養物一八五其日大王以所有裝飾著身隨後宮伴諸大臣取圍衆多之軍勢一八六大地如裂而來精舍禮拜立於比丘衆中之最長者一八七於此集會有八億之比丘於此中有十萬漏盡之行者一八八又有九百萬人之比丘尼於其中有一千人之比丘尼既盡諸漏一八九彼等呼世界開顯行神通為此法阿育王興信心一九以前知為忿怒惡邪行之阿育今後則知為正善行之法阿育一九一彼見閻浮洲至四方海際止又見所有精舍之樣樣供養物而嚴飾一九二見此彼王大喜坐而問比丘衆言諸師於善逝之教何人之奉捨為大耶一九三彼長老目犍連子帝須答王之問言雖然善逝尊在世之時亦無等於王之奉捨者一九四聞此言王則愈益歡喜向彼問佛教之嗣續者為如余者耶一九五王子摩哂陀與同王女僧伽蜜多之根機觀察之長老一九六觀見佛教之興隆與其之原因者負教之荷彼長老答王一九七雖然如王之大奉捨者非教之嗣續者人王如王只稱為資具之奉捨者一九八然如若人男兒或女兒於此教令出家彼為教之嗣續者又為吾等之施者一九九由此大地之主欲為教之嗣續者問立於其處之摩哂陀與僧伽蜜多言二兒等欲出家耶如何想出家為大功德事聞父之語兩者回答父大王王若望者吾等今日當出家於出家吾等對王亦有利益二一二二彼摩哂陀由副王之出家時之此方法彼女僧伽蜜多亦由阿吉布羅夫摩出家時之此方法皆有共出家之決心二三大地之主欲授副王位亦無受此之意對彼增益彼女冀望於出家二四以具智慧容貌力量優良之愛兒摩哂陀與王女僧伽蜜多具供養之禮令之出家二五王之喜彼摩哂陀其時為二十歲王女僧伽蜜多有十八歲二六彼之得度與受具戒於彼同日行之又彼女得度與受六學處亦於同一日二七王子之和尚為目犍連令得度者是摩訶提婆長老末田地長老是羯磨戒師彼摩哂陀於此授戒之道場與四無礙辨共達阿羅漢果二八二九僧伽蜜多之和尚知為丹摩般羅尼阿闍利是阿優波利而彼女亦時到為無漏人二一兩者為教之燈明為楞伽島之恩惠者於法阿育王即位之第六年出家二一一添教之光大摩哂陀三年於和尚摩伽利長老之處學習三藏二一二彼女比丘尼是新月摩哂陀比丘是太陽彼等於其時常照正覺者教之空二一三傳言昔有森林行者由波吒梨子城出巡回於森林與緊那羅女昆提同棲二一四隨與彼之同棲彼女與彼之間設生兩男兒長兒為帝須幼兒其名為須蜜陀二一五兩兒時到共往摩訶婆樓那長老之處出家成阿羅漢果與六神通之德二一六兄之足觸蟲之毒覺痛問於其弟答良藥是少量之酥二一七彼長老胃病而向王報告彼事求給食罹病者事為醍醐味之食後拒行於諸所二一八如斯帝須長老向優秀之須蜜陀言汝赴托鉢若得醍醐味即持還二一九彼須蜜陀托鉢雖已往來少量之酥亦無所得如斯中之病雖以百壺之醍醐味亦不能愈二二為此病正近於命終長老由於精勤之教而教比丘等決意令入涅槃二二一為入火之大定彼坐空中如思集念肉身般涅槃二二二由肉身發火焰肉灰亦至無餘止而長老之全身燒盡但骨不燒二二三聞此帝須長老之入涅槃大地主為多數之衆所包圍而來精舍二二四乘象背之王令遷他此等之骨行舍利供養向比丘衆問彼之病二二五聞此王動於痛心於都之四門掘塗漆喰之空池充藥品於其中二二六而謂比丘衆已不難得藥日日比丘衆往取藥品二二七須蜜陀長老不斷經行於經行處入涅槃然大衆對教起強烈之歸依心二二八昆提之子為利益世間此二人之長老於阿育王之第八年入滅二二九由此以後精舍之利得甚為增大此後入於日信者亦大起利得之故二三利得恭敬共減之外道等為利得而自取黃色衣與比丘等共住二三一彼等依己説謂佛説己之行雖非佛行如意行故二三二由此堅實之德崇彼目犍連子長老見令生此性惡癌腫之教上二三三遠見之人觀察鎮此之時對摩哂陀長老授己之大比丘群二三四唯自一人溯恆河往阿普康迦山中獨住專心過七年間二三五外道等之數為多不忍從比丘等依法不能制止彼等之事二三六由此理由而於閻浮洲比丘等七個年間不得行布薩亦自恣二三七聞此而名聲大之法阿育大王派遣一人之大臣往優良之阿育精舍曰往行鎮此之紛擾於余汝精舍使比丘衆行此布薩式二三八二三九彼愚者往行集比丘衆謂行布薩式令聞王之教敕二四吾等外道等不行布薩式比丘衆向彼心愚大臣申訴吾等與外道等不共行布薩式二四一彼大臣謂余令彼等行布薩式以刀次第切斷若干數長老之首二四二王弟帝須長老目擊此行為彼疾行就座席於彼大臣之傍二四三彼大臣見長老而行一切知報王大地之主聞此而生熱惱二四四心亂而速行問比丘衆云如斯而作業此為何人之罪二四五彼等之中不賢者或謂此為王之罪或謂兩者之罪賢者謂此非王之罪二四六聞此大王問除余之疑有堪護教之比丘耶二四七車乘之主有目犍連之子彼帝須長老比丘衆如此向王回答王於其處滿恭敬之念二四八各各以一千之比丘圍繞四人長老與隨同一千人人之四人大臣王即日以己之命招來長老而差遣然雖如斯命而彼已不來二四九二五聞此王再已遣長老與大臣共八人各各已附遣一千之人人彼與前同樣不來二五一王問曰如何者長老來耶比丘等語此長老來之理由大德應為支教之柱如斯言之大王彼長老應來二五二二五三復次又王與諸長老與諸大臣十六人各各隨侍一千之人人如彼等言附而遣二五四如斯言長老雖老年不可乘騎乘物然長老應伴恆河之船而來二五五彼等行如上之言長老聞彼而立上彼等以船伴長老來王則出迎於彼處二五六王浸水至膝差延右手而恭迎長老下船二五七彼有應供之德慈悲心深之長老縋王之右手而下船二五八王伴長老來至羅提瓦達那苑洗長老之足塗油而坐大地之主欲驗長老之智能而言大德余欲見神變事二五九二六問曰何事耶答曰為大地震動彼長老再以語彼王見所欲者彼全地之震動耶抑一地方之震動耶二六一問曰何者難耶聞一地方之震動難申旨願將見此二六二長老以車馬人與滿水鉢使置於一由旬限界之中四方與彼等一部分共令一由旬之地震動由於神通力令坐其處之王亦示此二六三二六四彼大臣由殺害比丘等事而王自身有罪耶抑或無耶大地之主問於長老二六五長老言無汗之心則無絡業長老語鷓鴣本生談令王得悟二六六長老其處樂住王苑而七日令大地守護者學習佛之善教二六七於彼七日間大地主派遣兩個夜叉而於地上集來比丘等二六八於第七日王赴己所樂之精舍無餘令集比丘衆二六九與長老共同坐於帷帳中之一隅王懷邪義之比丘等一一呼出至傍大德善逝尊何説者耶大地之主問彼等各各隨己見答覆常見説等者王對此之邪見家等令無餘還俗如斯令還俗者為六萬人二七七二問正法之比丘等言善逝尊何説者耶彼等答分別説者如此説王以此而問長老二七三彼王大德正覺者分別説耶長老然聞此而王於彼時心滿足二七四如斯王向長老語比丘衆被淨掃故如是大德比丘衆可行布薩會二七五施行保護僧伽入於美麗之都僧伽相和合其時可行布薩式二七六長老為行正法之會誦於數阿僧祗之比丘衆中信心堅固得六神通通達三藏具有無礙辨之比丘選一千人由彼等於阿育精舍施行正法會誦二七七二七八摩訶迦葉長老與耶舍長老此等如行正法會誦帝須長老亦同行此二七九碎破他説名論事而論帝須長老於此會誦之道場説二八如斯由一千人之比丘由阿育王之保護此正法會誦九箇月而畢二八一王之即位第十七年彼仙士年七十二歲於大自恣日會誦畢二八二於教之住立如與稱讚會誦告終時大地震動二八三棄優良美麗之大梵天宮彼帝須為教故來此可厭人間世界此務已果人果於教之熱勤他之何人於教之熱勤為懈怠者耶二八四第三結集畢善人之信心與感激而起作大王統史名第三結集第五章畢

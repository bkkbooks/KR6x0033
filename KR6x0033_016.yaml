body:
  text: 第十六章受納支提耶山精舍為行乞長老遊行城內攝取人民於王宮內食事而攝取國王一二十六日之間住於摩訶眉伽林中而於阿沙荼月之白分十三日二於王宮內取食後大賢者為大王説大不放逸經由此彼三於彼處之支提耶山建成精舍由東門出而赴支提耶山四聞長老之赴彼處大地王者乘車伴二人之妃追行長老之迹五諸長老於那伽奢茲伽池水浴為欲登山而作列六其時王由車降而會釋諸長老彼謂王何故苦於暑熱而來此耶七曰為挂念御身等之出發而來也言此處過雨期而來八健度通達之長老為王講述入安居犍度章王甥大阿利陀大臣共五十五人之兄弟同立於王側而聞此九一一同向王請即日出家於長老之處此一切大賢者等於剃髮堂達阿羅漢果一一同日彼等於康達伽支提之位地邊開始六十八窟院之工事一二回歸於都彼諸長老仍住於彼處此等之慈愍者於適宜之時刻入都行乞一三窟院之竣工於阿沙荼月滿月之日王赴諸長老處行精舍之布施一四超結界之人長老與三十二道場為此精舍設定結界一五此日為一切第一之開始彼於頓巴魯道場之境內凡願出家之彼等為其一切行受戒一六此等六十二人之阿羅漢皆於此支提耶山入雨安居以攝受王一七天上人間之衆負德廣之譽有弟子衆彼大摩哂陀長老與其弟子衆接近禮讚越增大積福業一八善人之信心與感激而起作大王統史名支提山精舍受納第十六章畢

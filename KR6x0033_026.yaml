body:
  text: 第二十六章摩利闍越提精舍之祭大名聲彼王統一楞伽島於一王傘下為戰士等隨能而定地位一戰士提羅普陀阿婆耶以其與而不欲問何故答有戰二更又問為一王國戰者何耶對煩惱賊難勝以行戰三如是言王再三遮彼彼再三重乞得王之許而出家四出家之後時到達阿羅漢果已有五百之漏盡比丘所圍繞五越怖畏彼阿婆耶無畏王以盛儀即位踐祚祝典過七日時六飾遊戲之儀為祝儲水池行即位而為守王之例格赴提沙池七王所有之被覆及數百贈物均置於摩利闍越提精舍之處八持槍之王臣於其處塔之場所與舍利共立真直之勝槍九大王與後宮共日中於水中戲至日暮如是云我等將行汝等攜槍來一當役者等不能動者集合王之兵等以香鬘供養一一王見此大不可思議而心喜於其處設警護由此而入都一二槍之周圍於其處建立靈祠又塔之周圍建立精舍一三其精舍三年竣工彼人王以精舍祭之故集合僧團一四其時集合十萬之比丘與九萬之比丘尼一五在彼集合中大地之王者告僧團云大德忘記僧團食里胡椒一六此為我應贖罪應營造靈祠共甚快美摩利闍越提黑胡椒精舍一七僧團應受納此彼向比丘衆倒供養之水樂快獻精舍一八此精舍中其周圍造大美之假堂於其處僧團行為大施一九假堂是為浸腳阿婆耶池水而造況其他之地上者耶二人王七日之間施飲食物及其他之物總施沙門所要高價之資具二一彼資具價一萬金為最高一千金之價者為最低僧團皆得此二二戰並施有勇且賢有信三寶心不污染願光輝教二三知恩之王為供養三寶此處結果無價之散財除餘他者始建立塔雖唯精舍之祭終亦須一億九千萬金二五具特殊智慧之人人所得之富雖有五種過污有五種之德捉布施之精如是智者努力捉此精二六善人之信心與感激起作大王統史名摩利闍越提精舍之祭造第二十六章畢

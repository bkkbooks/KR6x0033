body:
  text: 第三十三章十王章於睹多伽摩尼王之治世中人民富榮沙利王子為彼一人兒所善知一彼至王子為幸運之人常喜善業而容貌極美旃陀羅女所執著二由前生之因緣絡此旃陀羅女阿蘇伽摩羅提乞為容姿而愛慕彼不欲即王位三睹多伽摩尼之弟沙陀提沙於彼之死後即位行王事正及十八年四彼由信心而得名為大塔覆蓋工作塗堊工作亦調象形所付之四方障壁五極好壯美之青銅殿由為燈火之所燒彼更構七階之青銅殿六此青銅殿其時價九百萬兩達吉那義利南山精舍伽羅伽雷那精舍同七具倫巴羅精舍同貝丹伽瓦利伽精舍衛蘭伽義提伽多巴羅瓦毗提沙伽與八多羅提沙瓦毗等之各精舍同為母所建精舍由阿㝹羅陀府至於提伽瓦毗於一由旬一由旬建一精舍九於提伽瓦毗精舍添建靈祠其祠鏤造種種之珍寶一於此又繼目每一繼目造懸車輪大之美麗黃金之華鬘一一王對八萬四千之法蘊行八萬四千之供養一二如斯大地之主行種種善業身壞後上生而兜率天人中一三沙達提沙大王之尚住於提伽瓦毗時長子羅質提沙建立稱為吉利羣比羅之質優良精舍其小弟陀羅他那亦造立呼為康多羅之精舍一四一五陀羅他那父往兄之處時彼與父皆為來供養己精舍比丘衆之食一六沙陀提沙王沒集諸大臣等不餘比丘衆集於塔波園為護國由比丘衆之承認令陀羅達那王子即承王位而羅吉提沙伽聞此一七一八來此處捕彼王自行王事陀羅達那王在位一箇月及十日間一九羅吉提沙三年之間對僧團不表恭敬之意言此比丘等不知依年次而蔑視彼等二後向僧團懺謝王為贖罪向大塔喜捨三十萬金二一以石令造三花之戴臺次大地之主以十萬金平均大塔塔波園間之地面二二二三上於塔波園為塔排開石之善掩被塔塔之前面令建石塔為比丘衆亦令建羅吉伽座席堂二三下二四更以十萬金布施名支提耶精舍造塔周圍以石掩被塔二五名吉利羣比羅精舍之祭彼王對六萬比丘一一行布施三衣二六與阿利達陀精舍同令建康多羅西那伽精舍於村里之比丘等施與藥品二七向比丘尼等施捨奇密奢伽欲何米殼如是彼於此處司王事九年半月二八羅吉伽提沙王沒後其弟名為造伽羅陀那伽在王位六年二九此王為美飾青銅殿於青銅殿之伴已構建三十二極美麗之殿樓三美麗繁摩摩利大塔周圍令造播砂庭及周圍之壁三一此王又令建庫倫達婆沙伽精舍並作他之善業三二此大地之主伽羅陀那伽王以名為摩訶羅達伽捕將軍於都中三三王弟名瓦達伽摩尼殺此姦惡之將軍自己升於王位三四彼以己兄伽羅陀那伽王之兒名為摩訶秋利伽據己兒之地位三五又其母阿努羅妃已為第一妃彼坐於父地位之故人呼彼為父王三六如斯彼由即王位第五個月於羅哈那那庫羅之都城名提耶之一人愚者婆羅門奴聞婆羅門之語窺竄王位又得多勢之部下三七三八與一行七名之達彌羅人共下於大渡海場時此婆羅門提耶與此等七名達彌羅人三九為奪王位送書於王之處有道士之王送回音與婆羅門四言王位今乃汝物汝須捕七人達彌羅人彼言諾而與達彌羅人戰鬥彼被彼等所捕四一由此彼達彌羅人等與王戰鬥之始而寇蘭巴羅伽附近之戰王取敗四二乘車通外道寺院之門而遁此外道寺院曩為般多伽婆耶王之所建四三以來二十一王之間常繁榮見彼遁去名義利之尼乾陀四四大聲叫謂形大色黑之一新哈羅人遁走聞此大王余心所願成就者四五余將建立此所之精舍其時心如斯思惟為保護懷胎中阿努羅妃亦伴之四六摩訶秋羅摩訶那伽兩王子亦以保護而伴之為車輕王於蘇摩提衛之承認下與彼美麗王冠寶珠由車而下當赴戰場王子與二人之妃四七四八伴行憂懼之餘而戰敗不能得彼勝者用之鉢四九彼王遁隱於吠舍山林中具提屈羅摩訶提沙長老於其處得見彼五自先以味托鉢食獻王由此王心喜書寫留於啓陀奇花之葉五一施其精舍以受用僧伽物由此而行棲於西羅搜巴康多伽由此五二前行赴近摩多耶蘭伽之沙摩伽羅於其處王曾見長老長老又曾見王五三彼王善命其侍者達那西瓦於其處於彼侍者達那西瓦之處五四受彼之隨侍與彼共住達於十二年七人達彌羅人中之一人戀慕蘇摩提衛妃五五欲愛所引捕彼女速去對岸一人存於阿㝹羅陀都攜十力佛之鉢五六滿足而急去對岸達彌爾人之普魯哈陀以名婆虛耶之達彌羅人為軍師行三年之政而婆虛耶捕此普魯哈陀行二年間之五七五八政又彼軍將巴那耶摩羅捕彼婆虛耶為王五九行政事為七年而彼軍將毗羅耶摩羅捕巴那耶摩羅為王六彼王毗羅耶摩羅行政七個月間彼軍將達提耶捕毗羅耶摩羅而彼達彌羅人達提耶六一於阿㝹羅陀都執政事二年如斯此等五人之達彌羅王之在位年數十四年加七個月為得阿努羅妃之食物而赴摩羅耶地方六二六三達那西瓦之妻以足蹴籠彼女怒泣來王之處六四彼達那西瓦聞此取弓外出聞妃之語王亦先彼達那西瓦而出伴二王子與妃出來用番弓而來近摩訶西瓦大安泰者射通達那西瓦六五六六王舉姓名安撫人民得偉大勇士之名得八人之大臣六七守護隨侍王者亦增大大名聲士王見昆比羅伽摩訶提沙長老六八於阿奢伽羅精舍行奉佛供養大臣伽毗西沙為淨除境地上阿伽沙支提之臺地將下來時王與妃同登上中途已見伽毗西沙之坐六九七謂彼不俯而生怒屠伽毗西沙其他七人大臣等亦嫌惡王七一遁王之處任意而去中途為盜賊所劫掠到達翰普伽羅伽精舍七二於此會博學之長老提沙彼長老通四尼柯耶得衣服粗糖油米同客食隨施之彼等之感激時長老問彼等將赴何處七三七四彼等明其素性以其事由報告長老彼等更由長老問及勝者教之保護與達彌羅人王由何者得實現耶答以由王如斯使彼等滿意七五七六庫提屈羅摩訶提莎翰普伽羅伽摩訶提莎兩長老由此伴彼等往王之處令互為謝罪七七王與彼等諸大臣請長老等如斯言事如此吾等遣人者汝等可來吾等之處七八彼長老等與約束而各歸己之處大名聲之王又來阿㝹羅陀之都七九殺達彌羅人達提耶自行政治由此王令倒尼乾陀寺院八於此令建有十二房舍之精舍由大精舍之創建二百十七年加十個月更過十日後恭順心之八一八二彼大地主建阿巴耶吉利精舍招請彼二人長老於其中受利益之八三以其精舍贈獻摩訶提莎長老原來此寺院為外道僧吉利所有故為懷敬意彼阿巴耶王以此精舍名為阿巴耶吉利彼王已呼蘇摩提支來與於原來之地位八四八五為彼女而以彼名構精舍稱為蘇摩精舍此貴女曾下車隱於伽丹巴花之叢用一沙彌之手覆於便道見為用便有得信心八六八七王聞彼女之語於其處建精舍此王實於大塔之北方構築名尸羅須巴康達伽臺地之高塔八八八九上此七人之勇士中名鬱提耶於阿㝹羅陀都之南方建名為達其那精舍於其同處名穆羅大臣又建一精舍之故冠其名為穆羅奧伽沙精舍名沙利耶大臣創建沙利耶精舍八九下九九一稱為扳巴陀大臣造扳巴陀精舍提沙大臣起鬱陀羅提沙精舍九二喜樂精舍工成之時彼等到提莎長老之處言為敬愛尊師吾等建精舍奉獻於尊師而奉獻長老對此等彼等比丘隨宜使住於各處九三九四諸大臣以適於沙門種種之物施捨僧團王住於己精舍比丘等以要品奉仕不使缺乏由此比丘等成數多常有在家人混入長老摩訶提沙所知九五九六混入是在家人之過僧團排斥彼於團外於其弟子示知婆哈羅瑪須提長老九七憤而去阿巴耶吉利設黨住於其處由此以來此比丘等不入大精舍九八如斯此阿巴耶吉利離上座部達其那精舍之行者等離阿巴耶吉利而分裂九九如斯上座部分裂為二種比丘此等住本島之摩訶阿巴耶比丘為增大一彼瓦陀伽摩尼王讓渡租稅於彼等於一列設計精舍房舍一一如斯思為容易修理三藏之本文或其注釋書一二曩昔由大智比丘等口誦所縛見衆生之退墮其時集比丘等一三為法久住於世此令録於書冊彼瓦陀伽摩尼阿巴耶王初五個月後行十二年間之政一四如斯有智者握主權實行他利與自利貪財無智之徒雖得莫大之財不為兩者之利一五善人之信心與感激而起作大王統史名十王章第三十三章畢

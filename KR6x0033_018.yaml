body:
  text: 第十八章受納大菩提樹大地之王者能伴來大菩提樹與長老尼思起長老之言於雨季之一日於己宮廷內坐於長老之前與諸臣共同協議自思欲託己甥名阿利陀任大臣此事務呼彼作如次語一二三愛者汝赴正法阿育王之處能伴大菩提樹與僧伽蜜多長老尼來此處耶四王吾能由彼處伴此兩者來此處授譽之人吾歸於此處若可得出家者五王言此可有遣彼於彼處彼並承長老王之命而禮拜六彼熱意之士於阿濕縛庾闍月白分之第二日而出發由羌普寇羅港乘船七而渡大海依長老決意之力出發之當日明麗到華氏之都八其時彼阿菟羅妃與五百之女並五百之後宮婦女等俱九持十戒清淨纏袈裟衣願志願出家為有學待望長老尼之來島一於都之王一面令造美麗比丘尼房慎深妃可定居於彼處一一此比丘尼房彼由優婆夷等住者以此之故於楞伽島知為優婆夷婆精舍一二王甥大阿利陀向正法阿育王傳王之消息及言奏長老之傳言一三王中之龍象汝友天愛帝須王之王弟妃欲出家常自制營生活一四為欲令彼女出家能遣去僧伽蜜多比丘尼與彼女同遣去大菩提樹之南枝一五以長老之語事由傳於長老尼彼長老尼赴父王之前語長老之意向一六如王言吾姬不見汝如何得拂去我子與孫之別離所生悲憂耶一七彼女答言我兄之言重大大王又出家者有多數因此妾應赴彼處一八大菩提樹以刃傷之不適如何而取枝耶王思惟之一九由名摩訶提婆之大臣之考案彼王招比丘衆供養問言二諸大德大菩提樹可送楞伽島耶彼目犍連子長老言應遣二一五眼者佛之五大決意為王而語聞此大地之王喜悅二二彼赴大菩提樹之處七由旬之道路丹念令清潔樣樣莊嚴二三為造瓶令持來黃金毗首羯磨天為寶玉商之姿而來二四瓶為如何之尺寸而造此耶向彼問而云汝自知尺寸而造二五取黃金以手碎之其剎那造瓶而去二六周九肘深五肘直徑三肘厚八指之美二七口緣有幼象之鼻大如朝初升太陽光輝王使取此二八長七由旬幅三由旬之四兵軍隊並與大比丘衆俱二九施以樣樣之莊嚴飾種種之珍寶附雜色之幢幡撒樣樣之華吹奏種種之樂器而近大菩提樹以軍隊圍繞以天幕圍蓋以一千大長老為首及大衆羣由王千餘人灌頂畢善圍己與大菩提樹自身合掌看大菩提樹三三三彼南枝四肘程度處之枝存幹而消失三四見此神變而大地之王者大歡喜宣稱我以王位可供養大菩提樹三五大地之王者以大菩提樹即大王位華以其他供養大菩提樹三六行右繞之禮於八箇所合掌禮拜以雕黃金飾以珠寶之座榻三七枝之高為易登者據其黃金之花瓶可捉妙枝而自升三八以黃金之筆把握砒石附印於枝為誓三九若此枝由此大菩提樹可赴楞伽島我又不背佛之教四則美麗大菩提樹之此南枝自斷立此黃金之花瓶四一彼之大菩提樹於印之處自斷止住滿香泥之花瓶上四二人王於最下位之印上三指每三指總計印十枝砒石印四三開始由印大之根其他由小根各各印出十如網形而下四四王見其神變甚喜悅於其處揚呼喚之聲四方之衆亦如是四五比丘衆以悅喜心揚喚聲振作著衣者四方及數千四六如斯此大菩提樹以百根之根立其處之香泥上大衆起信心四七其幹長為十肘而可喜五根之枝各各有四肘一一飾五個果實四八此等之枝又千根之小枝如斯此大菩提樹美麗之姿具有福德四九大菩提樹立於瓶中之剎那大地震動有樣樣之奇瑞五於人天之間諸種之樂器自奏樂音與天衆梵天衆呼喚之聲五一雲雷鳥獸夜叉其他之叫聲由大地震動之響成唯一之喧騷五二由菩提樹之樹葉果實出美麗六色之光而遍輝於鐵圍山五三大菩提樹由其花瓶上升空中七日間止於雪雲胎中而不見五四王由座榻下來其七日間止於其處常於樣樣供養大菩提樹五五其七日間過去雪雲所有其光與共又入於大菩提樹五六立其花瓶美麗之大菩提樹清淨於空中為所有大衆見之五七行種種神變大菩提樹下降於地上人人驚懼五八為此等數數之神變而歡喜彼大王更以大王之位供養大菩提樹五九大菩提樹即大王之位由種種之供養而尊崇更七日間王住於其處六阿濕縛庾闍月之白分十五日之布薩日得大菩提樹由此經二七日六一阿濕縛庾闍月之黑分十四日之布薩日車駕之王者以美麗之車載大菩提樹六二行供養同日運來己宮中設樣樣莊嚴美麗之假堂六三迦剌底迦月白分之第一日置大菩提樹於其都之東方美麗大沙羅樹下六四行數數之供養由得大菩提樹之第十七日一時得生其新芽由此人王喜悅再以王位供養大菩提樹六五六六大地之王者以大菩提樹即大王位以樣樣之方法行供養大菩提樹六七如此如為華氏城池上之太陽立雜多美麗之幢廣大而心地善妙供養菩提樹是人天之心喜悅六八善人之信心與感激而起作之大王統史名大菩提樹受納第十八章畢

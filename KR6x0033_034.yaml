body:
  text: 第三十四章十一王章彼瓦陀伽摩尼王歿後摩訶秋利摩訶提沙正當且平等行政事為十四年一彼聞以己手作施有大果報第一年行於假裝之下二造稻田由此得錢財國土之主向摩訶遜摩長老施捨團食三其次此王於蘇那吉利三年之間動糖丸之機械由此得糖丸之工資四持來此等之糖丸國土之王赴都對比丘衆行大施五以被服施三萬之比丘等一萬二千比丘尼等亦同施六國土之護者構造堅固之精舍對六萬之比丘等施三衣七彼對三萬數之比丘尼亦施三衣曼達瓦毗精舍同阿巴耶伽羅伽精舍八萬伽瓦達加伽羅精舍提伽巴夫伽羅伽精舍瓦羅伽摩精舍等為王所建九此王以如斯信心行種種善業十四年終於上天界一瓦陀伽摩尼王子知為山賊於摩訶秋羅在位之間即盜賊橫行一一摩訶秋羅歿來阿㝹羅陀都行王事不與宿己盜賊時代一二打倒彼等十八精舍無智山賊居於王位及十二年一三歿後此惡人生於世界中間之地獄彼之歿摩訶秋羅王之王子為政三年知為提沙王山賊王之妃阿努羅己姦惡而對將軍懷愛執心與毒殺姦惡山賊執著彼將軍之彼阿努羅一四一六亦毒殺提沙王授彼將軍王位名西瓦此將軍於彼都為衛士長一七彼以阿努羅為第一妃於阿㝹羅陀都行一年加二個月間之政阿努羅妃執心名瓦睹伽之達彌羅人又以毒殺彼西瓦授王位與瓦睹伽此達彌羅人瓦睹伽原是都之木工一八一九彼以阿努羅為第一妃一年加二個月間於都行政治而阿努羅來其處二見搬柴夫彼女戀慕此以毒殺睹伽給王位於彼二一彼搬柴夫提沙以阿努羅為妃一年一個月之間行政於都二二於摩訶眉伽園內急堀蓮池彼之阿努羅戀著補臣婆羅門名尼利耶之達彌羅人與彼同棲與毒殺彼搬柴夫二三二四授與尼利耶王位彼尼利耶婆羅門亦以彼女為妃常得隨侍彼女二五於此阿㝹羅陀都行政及六個月妃與三十二人之將軍隨意之欲念以恣情二六以毒殺彼尼利耶彼阿努羅妃四個月之間自行執政二七然摩訶秋利伽王之第二王子名伽羅伽尼提沙深恐阿努羅妃二八遁而出家經時得腕力來此處殺彼邪心之阿努羅二九人間之主執政二十二年於支提耶山建大布薩堂三於其堂之前建石造之塔其同支提耶山使植菩提樹之此王三一於河畔建培羅伽摩精舍同所設名灣那伽大水路三二掘安貝多伽大儲水池巴約魯波羅池都之周圍作高七肘之柵掘堀三三於大殿內以無節操阿努羅妃荼毗少離之處建設大殿三四以波多茲薩羅林園作都中彼母洗齒後於佛教出家三五王家所屬之邸內為母設比丘尼之住院由此此院住知為齒院三六彼歿其子名巴提伽巴耶行王者政事及二十八年三七此國土之主摩訶多提伽王之兄於此國知為巴提伽王為正義之王三八彼於此處加以修理青銅殿大塔二之欄杆於名為塔波精舍設布薩堂三九擲棄己之租稅於都周圍一由旬之地種植蘇曼那花與鬱秋伽花四人間之主由欄杆礎至頂之覆蓋大塔塗四指厚之香花善著花質塔比華鬘之球四一四二其次以二指厚之瑪瑙西拉石塗支提耶同其花堆四三次由楷段至頂之覆蓋撒花於大塔以花堆覆彼四四由阿巴雅儲水池以機械揚水水注於塔行水供養四五以信心由百車量之真珠令混堊土施大塔堊土工事四六造珊瑚之網令投彼支提繼目以車輪大之金蓮華四七使懸由彼真珠列至下方止吊列蓮華行供養大塔四八彼王坐於舍利室聞此等羅漢之一齊讀誦聲決意不見此余不起四九於東方石柱下斷食而坐諸長老設舍利室之入口王案內五彼國土之主見室內之莊嚴出來則以等彼模型供養五一蜜製之等品香味水瓶安闍那青膏同又以瑪瑙西羅石五二於瑪瑙西羅石如雨降落於支提耶庭立者沒入踵並青蓮華五三以一切香泥滿塔庭以彩色敷物上之洞差以青蓮華五四遮水之行路於彼滿酥油以樣樣之燈心以作燈心之火冠五五同瑪多伽油同胡麻油同燈心以夥火冠五六如以上述之物王七回別別行供養大塔五七行年年定行最勝之堊土祭菩提樹乳浴供養同大菩提樹五八於大吠舍佉月行大規模供養二十八日間規模雖不大亦行八萬四千供養五九種種之舞伎樣樣之器樂音樂起信心而立大塔之音聲一日三回為奉仕佛陀而來二回供養花彼必行之六六一祭禮之布施與自恣之布施必以胡麻油粗糖衣服及其他沙門適需品六二夥施僧團附支提耶之田地亦為修理王到處而施六三於支提耶山精舍之一千比丘等彼王常籌呈施飯食六四彼王以名質多瑪尼慕羅造三大宮殿同扳陀麻宮與美麗之質多殿六五於此等五地方專心研究聖曲之比丘等施與食物常敬法之王以生活必需品仕彼等六六古來王之規定有關佛教之善業如何種種之物巴提伽王一切行此六七此巴提伽王之歿後彼弟名為摩訶那伽行種種善業為第一念摩訶達提王十二年間行王事敷大塔以輕質伽石六八六九廣素馨花之園作塔庭島中所有精舍令獻說法座七王又築安巴陀羅大塔此塔尚未據礎石時王憶牟尼尊之德七一捨己命自臥其處置礎石令築了其塔七二於四門工人美麗之巧作種種寶珠光輝令著四個之寶環七三於支提令建附種種寶珠掩被塔令附彼黃金泡形與真珠之垂物七四以飾支提耶山之周圍大街道一由旬之間結付四方之門七五於街道之兩側擴展店鋪以幢環門飾以處處七六諸方作列燈火亦演出舞妓之舞踊唱歌音樂七七由伽丹巴河至支提耶山止為得洗足而行事以敷物敷於道路七八於此無踊音樂共以唱歌行祭於都四門行大施七九舉全島之燈火連續為列海之四方亦同於一由旬之水上八於支提耶山之祭禮彼所行優美之供養於此國稱為吉利般達之供養八一於此之供養之集為集比丘等王於八處供施物八二其處存打八個金鼓起二萬八千之大施八三施六枚之衣服亦行解放被縛者於四門使理髮人不絶行業務八四先王之積同兄王之積善業王行一切無損八五自己王妃兩兒象並王乘用之馬為僧團所辭退王尚施於彼等八六彼以六十萬金價之其物對比丘衆以六十萬金價之其物亦施比丘尼之羣八七詳規律之王施種種適宜之物品己與他者由僧團請受八八此人間之主於伽羅耶那地方建造名為瑪尼那伽山精舍名為伽蘭達精舍八九於具普般達河畔之建造沙姆達精舍富瓦瓦地方名建秋羅那伽山精舍九建波沙那提波伽精舍王沙彌自持來之水九一傍坐於四方八由旬之地為其精舍僧團之受用而施九二於般大瓦毗精舍王喜沙彌之所為施精舍同彼僧團所要物九三如斯極淨信之士遠離陶醉與放逸捨愛欲與執著不為人之卑樂善得巨大之財行廣大種類多之善業九四善人之信心與感激起作大王統史名十一王章第三十四章畢

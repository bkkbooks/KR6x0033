body:
  text: 第十一章天愛帝須之即位般多伽婆耶王歿後其子木達西瓦知為黃金波利妃之子為無事即承王位一此王構築稱為摩訶眉伽大雲林苑具適名美點有果樹花樹之林苑二然林苑之敷地決定時於非時起大雲降大雨故名此苑為摩訶眉伽林三木達西瓦王於楞伽國美顏優良阿㝹羅陀都六十年間施行王政四其王子有十人互相輔益二人之相等美王女亦已有適於王家五為天愛帝須所知王之第二子此等一切兄弟中優於善根與智慧六彼天愛須帝於父之歿後為王彼即位共表現諸多之吉瑞七於全楞伽島中埋藏物並於地中所存之寶珠上升出現於地面八於楞伽島之近海難破船所積之寶珠與此海中所生寶珠共上陸地九生於闍多山麓之三根竹其大者等於車之刺棒一其中之一為蔓竹有銀色之光見此金色美麗可愛此等之蔓草一一其一為花竹其現種種之色見彼等種種之花於其中有開花者一二其一為鳥竹其有多數多種多色之鳥獸見如活生生一三馬真珠車象真珠車阿摩勒果腕環指環迦屈婆果自然真珠此等八種一四真珠由海出岸邊積如銀製有梁之酒壺此一切是天愛帝須善根之所生一五青玉琉璃紅玉摩尼此等之寶珠此等之真珠竹與此等一六唯七日之間持來於王前見此彼王喜如斯思惟一七此等高價之寶珠是吾友正法阿育之外無堪受者然此等贈與彼一八天愛帝須與正法阿育此等二人之王久來未見之友一九是故彼王以甥之大阿利達大臣為首婆羅門大臣會計師等四人二為使節附夥軍力差遣此等高價之寶珠三種之摩尼珠似車之棒三根之竹右旋之硨磲貝及攜彼八種之真珠二一二二彼等於獎普庫羅乘船七日安穩至港由此再七日二三彼等到波吒梨子城贈物以呈正法阿育王見此彼喜二四正法阿育王以如斯寶珠此處余之前無思甚滿悅與阿利達軍帥之地位二五婆羅門以王師之位而彼大臣以裁判長之位會計師授長者之位二六巨額之財物與住宅給與彼等與大臣等協議見答禮之贈物二七犛尾之拂子頭被劍傘履頭飾耳環帶水瓶赤旃檀二八不要洗濯一領之衣服成為高價之手巾龍持來之眼藥淡紅色之粘土二九阿耨達池之水恆河之水右旋之硨磲貝成育之處女三金鉢等之器具貴價之駕籠訶梨勒果阿摩勒果高價之不死藥三一鸚鵡運來六千車量之米並即位式有用之特別隨行三二正法阿育王於適宜之時機授與此等之贈物此等妙法之贈物以使者送友王之前三三余歸命佛法僧團於釋迦子之教告白為信士三四人間中之優者汝亦澄心於此等勝妙之三寶歸命而信仰三五為余之友王行再度之即位式如斯云正法阿育友王厚遇此等諸大臣後送出三六此等之諸大臣等停留五個月間大受厚遇吠舍佉月白分之第一日使節出發三七彼等由達摩利提乘船於奘普庫羅下船第十二日達到都城謁王三八彼等使節獻此贈物與楞伽王楞伽主與彼等大厚遇三九忠誠此主君喜主君益之大臣等傳正法阿育王之語於末伽始羅月之新月升之日行即位式喜楞伽人之利益安樂為楞伽王再行即位式四四一其名冠天愛之語與人人安樂彼人王於吠舍佉月滿月之日於楞伽島盛行祭時自上於王位四二為善人之信心與感激而起作大王統史名天愛帝須之即位第十一章畢

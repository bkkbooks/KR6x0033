body:
  text: 第三十章舍利室裝置大王敬拜所有之比丘招待供養塔之建造完畢山悉受余之供食但比丘衆不受諾次第請及七日由半數之比丘等得受七日間之承諾彼王喜得此於建塔地之周圍十八箇所二三構置假舍如是七日間對僧伽行大施由此遣還僧伽四由此巡回打擊大鼓速集甎工其數有五百人五王問如何作此事業一人答彼余得百人從僕撒一車量之土而過一日王斥彼六七上由此半車量之土與二安摩那量之土撒而申述王對訓斥此等四人之甎工彼時有一人賢才有知能之甎工向王申訴七下八余於臼搗土以箕而簸一安摩那量之土以碾磨於臼過一日九如斯云耶似帝釋天努力家大地之主許諾如是於大塔不生草及其他一汝以如何之形作此塔王問彼瓦工於此之剎那毗首羯磨憑此瓦工一一瓦工滿水於金鉢用掌受水打水面一二生似玻璃球之大水泡言將似此作之塔王喜彼一三有一千金價之一套衣裳同付飾之履並施彼一萬二千伽哈波那一四無煩人人如何令來齎瓦如斯王於夜分思惟而知此天人等一五日日只得積瓦工之瓦夜夜運來置於塔之四門一六聞此王開心始建造塔業知此非金錢而不作事業一七每門一供百八十萬之伽哈波那貨更許多衣服一八種種飾具軟硬之食物飲料香華鬘糖等並五種之薰口料一九隨意而作業隨意而取此等之物見王命如斯事王臣等取之而施彼等二希望加入建造塔之羣衆有一人比丘自揑攜一塊之土二一赴大塔之處欺騙王之從業者等以此與彼之瓦工彼受取而知此二二見彼之疑樣其所集人人之間湧起感興王次第傳聞來問此瓦工二三答王比丘等一手攜華一手握土塊與余然余二四此外來之比丘此知是常住之比丘聞此語王為發見獻土塊行者比丘彼王查問一使官彼使官指示其比丘使官以此報王二五二六彼王令備蕾入素馨花三大花瓶於菩提樹園使官呈於比丘二七不知而獻彼花於站立之彼比丘經使臣明白此彼行者比丘其時始知慚愧二八於啓利瓦陀地方之美央迦羅精舍住有彼瓦工之親族希望入支提建造之羣中長老來此處知此所用瓦之大小以造一瓦二九三欺騙從事者等之甎工交出其瓦彼命用之又在此立風聲三一王聞之而問彼甎工可得知其瓦耶甎工雖知但對王言不能知三二又問汝知彼長老耶彼答然知彼長老王查問一使官三三使官由彼而知長老為得王之承認而往於陀哈羅之僧房會見長老而談話三四知長老出行日與前往處言與汝共旅汝村三五一切報告王王對彼使臣施一千金價一對衣服及高價之赤毛布三六布施沙門用之多資具糖一那利量之善香油而遣彼三七彼使臣與長老共同旅行示毗耶伽羅迦精舍令長老坐於有流水而清涼之樹蔭三八供養糖水塗油於足使穿履施與種種之資具三九此等往來余之家為長老乃余素所準備者而彼一對之衣服余兒之物此等悉布施長老四如斯言而施取此欲離去之長老以王之語禮拜傳王之命言四一大塔之建造依賃銀從事此業之無數人人得淨信心趣於善處四二只對善逝佛有淨信心知得趣於勝處有智慧人應供養大塔四三此處依賃銀從事此業有二婦人大塔之建造畢上生三十三天四四有現世之福業之果兩者回顧前世之福業攜香鬘來獻於大塔獻香鬘禮拜支提於其瞬時名摩訶西哈住於巴提萬伽之長老四六夜入而禮拜大塔見來其處彼天女等贈添大七葉樹四七不現己身而目擊未曾有之榮幸彼女等之禮拜畢起立向二人問四八由汝等之身光輝耀此處全島作如何事汝等由此處得往天上界四九對大塔所作業天人等語彼長老對如來如斯淨信有大果報五以瓦積上塔每至三段之花供養臺有通力之人人使沈下等同大地五一九度積纍彼等斯皆如是彼等由令沈王已催比丘衆之集會五二集於此處比丘之數有八萬人於王近於僧伽禮拜供養五三問瓦沈下之原因比丘衆說明曰有通力之比丘等將來不使塔沈下而為此大王今將勿為此不移往他處汝築大塔畢五四五五聞此王心神愈快行造塔之業十箇花供養臺需要一億瓦五六比丘衆等鬱陀羅沙彌與蘇摩那沙彌為設塔之舍利室而持來雲色之石言遣者彼等赴北俱盧洲持來長幅共八十肘量如太陽之光輝厚八指量而美似甘提花雲色之牢石五七五八五九於花供養臺上於其中之處據下一石四石於四方覆為箱形六一石閉彼箱此大神通家等據於東方下令不見之六一王於舍利室之中央點所有殊妙寶玉製之菩提樹六二其幹長為十八肘五根之枝亦相同根為珊瑚製立於青玉之上六三有極純銀之幹有摩尼珠葉之光黃色之葉及果物是黃金所造蕾是珊瑚所造六四其幹之果物蔓亦有八種之吉相四足獸並又美麗之白鳥六五上而以美麗覆蓋之下有真珠鈴之網處處列金水瓶亦列寶珠之華鬘六六覆蓋之四隅懸真珠之絲其價一一成為九十萬金六七以寶玉造日月星之形與種種之蓮華同懸覆蓋六八高價而染種種色達一千八枚之多種類衣服又懸而覆蓋六九回繞菩提樹有用種種之寶玉所造之欄杆其間敷阿摩勒果大之大形真珠七於苦提樹之下並列種種之寶玉花並列四種之香水滿瓶七一於菩提樹之東方設置價貴之座席放光明安置黃金之佛像七二其像之肢體適宜以種種之寶玉所造而美妙七三於此大梵天取銀傘而立帝釋天給灌頂水又取名為伊奢優陀羅之螺貝而立七四樂神般奢西伽以手彈琵琶龍王伽羅與舞踊者共千手之魔羅伴象與從僕而立七五似東方之座席一一有萬金價之座席其他三方亦備之七六以種種之珠而飾值一千金財之臥牀頭部設向菩提樹七七佛成道後七日過七日於七高處於其各處起示適宜之事梵天之勸請七八於波羅捺斯轉法輪及耶舍之出家跋陀羅之羣衆出家結鬘外道等之懷柔七九頻畏沙羅王之來訪佛入王舍城得受竹林園之奉施同八十人之弟子等事八佛赴迦毗羅衛城同寶珠經行處之經行羅睺羅難陀之出家受祇陀林之奉施八一於菴摩羅樹下顯示神通於三十三天為母說法為降天人而行之神通與舍利弗長老問答時之集八二大會經羅睺羅誡經大吉祥經佛會過醉象達那波羅八三曠野鬼阿羅瓦伽凶賊安具利摩羅以手懷怪龍阿波羅羅婆羅耶那伽婆羅門之集會同佛捨壽命事告魔王八四受旃檀樹耳之供養受一對辛義金色之衣服飲澄水已般涅槃八五人天悲嘆迦葉大長老禮敬佛足火葬火消有人天之恭敬八六多那婆羅門佛舍利之配分善生睹多伽摩尼王常生喜悅心造本生談八七衛桑咀囉本生談特別詳造由兜率天宮至菩提道場皆同八八四大王立彼四方三十三天子三十二童女八九有二十八人夜叉軍將於其上合掌之天人由此持花天人持滿瓶水天人九亦有歌舞天人取樂器天人歌唱天人取鏡天人同持花枝天人九一手持蓮華天人亦有其他種種之天人成貴重寶珠之一列法輪之一列九二持刀天人之列同持鉢天人之列彼等之頭上以香油滿鉢大有五肘九三其常點一列之麻絲之燈心於舍利舍之四隅嵌貴重之玻璃於其上嵌陷一一大摩尼珠九四於四方之隅堆積黃金摩尼真珠並金剛石堆積四箇所放光輝九五雲色輝電火懸於石墻壁之上是舍利室之裝飾九六此處美麗舍利室所裝飾一切像王以磨碎純金之所作九七音多具陀大長老是六神通之大智者為事業之監督者按排一切事業九八此依王之神通力依天人之通力依聖者之通力無障魔一切安定九九世間最上者無迷之黑闍以供養人人最長者在世之善逝尊之供養所分之舍利由心冀望世之利益而供養知其功德同一如供養生存之善逝尊以飾淨信之德之智者賢者應善供養舍利一善人之信心與感激起作大王統史名舍利室裝置第三十章畢

body:
  text: 第二十三章戰士獲得軀體巨大彼象之康多羅以力量相貌容姿及威光敏捷之德為最勝一蘭提密陀蘇羅尼密羅摩訶蘇那寇多陰婆羅提羅普脫阿婆耶波羅那同又衛魯須摩那二更又康奢提婆普薩提婆羅比耶偉沙婆此等十大戰士是為彼伽摩尼阿波耶之大威力三於耶羅羅王有名將軍蜜陀彼領有村之東部於康多羅之奢達山近處妹子外甥因於伯父名密陀具陰藏相四五遠處奔此之幼童以革紐纏腰結於挽臼六彼引臼摺此於地上越閾時彼革紐切斷故由此七知為難提革紐密陀有十象之力長後彼來都事伯父八彼時達彌羅人行不敬塔波及其他彼以足踏一人之腿以手今捉一人九剛力者引裂此投棄城外天神則消失彼投之尸骸一人人見達彌羅人之消滅告耶羅羅王王雖謂掠奪物及彼一同捉然此無能為者一一彼蘭捉密陀思我雖如此振作唯人之損傷而已不揚教之光輝一二今有信心三寶王族士之魯哈那於彼處事王達彌羅人不餘捉捕一三於王族士等與王國佛之教有光輝如斯彼赴魯哈那處以此言伽摩尼王子一四彼伽摩尼謀之於母對彼表敬意恭敬彼戰士蘭提密陀住於其處一五伽伽灣那提沙王為防達彌羅人常於摩訶康迦河之所有渡場築塞堡一六提康波耶之名伽伽灣那王之他妃之子彼於康迦河之渡處築造塞堡一七彼為防禦令二旬四方之大家伴各一人之男子來彼處一八寇提瓦羅郡康多伽義提伽村有七人子息名桑伽居士長者一九求男子之王子亦遣使於彼第七子名尼密羅息子有十象之力二怒彼六人兄等懶惰之性喜彼之去但父母不喜二一尼密羅憤對他之兄弟等早晨行三由旬日出時彼見王子二二王子為試彼令遠地之用近於支提耶山多瓦羅曼多羅村二三余朋友婆羅門名昆多魯彼處有海彼方之品物者二四汝往攜彼給之品還來如是言使取食事與書狀而遣去二五由此彼於午前中來九由旬此阿䨲羅陀城會彼婆羅門二六婆羅門言年青者入池水浴而來尼密羅未曾來至此處於提莎池水浴二七入都欲見全都供養大菩提樹並塔波園靈祠二八由市場攜香而來由北門而出都又由蓮華田取青蓮華二九行至彼婆羅門處尼密羅問彼及語此道理彼婆羅門聞彼先來後又來此處之事三如斯驚思彼是人中之尊貴者若耶羅羅知此彼必置其配下三一然此者近住於達彌羅人乃不適宜彼居住王子之父處較得當三二如此認定書狀而彼與滿增衣並多數之贈物三三使彼食事更又送還友王子之處彼於日暮往王子之處三四書狀與贈物交於王子彼喜而言此者應以千金慰勞三五彼王子其他奴僕等對彼懷嫉妒心而王子以一萬金使慰勞此兒三六於河中洗浴梳彼頭髮與一重滿增衣著香鬘三七於頭上卷多庫羅布來者王子以己相等禮薦彼食物三八王族士以值一萬金己美麗臥榻令彼之戰士橫臥三九彼從所有一切運來父母之處與母親一萬金與父親臥榻四其夜來現於塞堡之場所於明方王子聞此心滿足四一王子與彼家具又同與隨從者給一萬金遣父之處四二戰士尼密羅以一萬金攜往父母之處與彼等往伽伽萬那提莎王之處四三彼王以彼附於伽摩尼王子與榮譽之戰士蘇羅尼密羅彼住於彼伽摩尼之處四四庫倫巴利郡芬多利瓦毗村有提莎之第八子名蘇那者四五彼七歲時拔起多羅樹之幼樹大力者十歲之時拔起多羅樹四六經時彼摩訶蘇那有十象之力王聞彼之如是由父親之處承受之四七與伽摩尼王子為擁護者由此得榮譽彼戰士住於王子之處四八名吉利郡之尼闍羅基提伽村摩訶那伽之子有十象之力者四九因體軀矮少故名寇達伽六人之兄等嘲笑彼五彼等兄等為造豆田開懇大林餘留彼分往告彼五一彼往其剎那拔蔭芭蘿樹木土地平坦往報彼等五二兄弟等往見彼不思議之業往彼之處讚彼之作業五三由此名彼為寇達蔭芭蘿彼亦王使住伽摩尼王子之處五四名魯哈那之家主為近寇多山之基提村之村長出生己男子五五令與寇多伽阿婆耶王同名此男兒十歲十二歲而有大力五六其時四五人不能舉起之石戲如投付手鞠五七十六歲之時父為彼作周圍三十八指長十六肘之棍棒五八彼以此擊打多羅樹並椰子樹之幹若其等倒者是故彼博知為戰士五九王亦以彼同令住於伽摩尼王子之處而父又奉仕摩訶舜摩長老六彼家主聞摩訶舜摩長老之説法於寇多山精舍達預流果六一彼感激此而申述王家事讓與息子長老之處出家六二專修靜慮達阿羅漢果此故彼子知為提羅普陀長老子阿婆耶六三為伽婆康多羅村之庫摩羅之子命名婆羅那彼十歲十二歲之時六四與兒等共往森林追多數之兔以足蹴裂為二投付地上六五於十六歲時與村人共同往森林同速倒鹿大鹿豬六六是故彼婆羅那博知為大戰士王亦同令彼住於伽摩尼王子之處六七名吉利郡之庫提因毗楊伽那村名越莎婆家主於彼村受尊崇六八彼村人衛羅與吉利郡之長須摩那友之子誕生時先呈贈物六九而行兩人以己之名與兒吉利郡之長令此兒住於己家七彼一頭辛達瓦馬任何人均不許乘騎唯見耶魯須摩那嘶喜思此乃我適宜之騎手七一七二知此彼郡之長語彼請乘此馬彼乘馬於彼馬場內疾驅彼馬於全馬場內見為唯一續者七三疾驅於彼背上如同坐柱雖緩外衣亦無緊結之關心七四所有群衆見此齊發喚聲彼吉利郡之長與彼一萬金七五彼耶魯須摩那為適仕王者喜彼棒王王以彼耶魯須摩那住己之處對彼表尊崇恭敬之意七六七七下那庫羅那伽羅郡之瑪喜沙多尼伽村七七下阿婆耶之末子名提婆為強力者然少為跛足人知彼為康奢跛提婆七八其時彼青年與村人共出狩獵突然發現追逐一大水牛以手捉腳周振於頭上打於地上粉粹彼等之骨七九八王聞此意外事令伴來康奢提婆住於伽摩尼王子之處八一質多羅山之近處稱伽毗陀村有鬱婆羅之子名普沙提婆瓦者八二彼童子與村童共赴精舍奉納菩提樹取法螺具任力吹之八三其聲大如落雷之音其他兒童等皆恐慌如亂心者八四由此彼博知為狂人普沙提婆彼令習彼家傳之弓術八五彼由音而射射如電光為射毛髮者滿沙之車相同束百枚獸皮八六阿莎那材宇頓婆羅材所造厚八指乃至十六指之板同樣鐵製銅裝之厚二指乃至四指板八七以矢貫之彼所放之矢行地上八宇沙巴水中潛一宇沙巴八八大王由彼父之處聞此異事亦迎彼令住於伽摩尼王子之處八九睹羅達羅山近處之義哈羅越毗村於家主摩陀有名越沙婆子九彼身體端直故人知其為羅美耶越沙婆彼二十歲時為大兵剛力漢九一彼大力者欲得田地伴數人之男著手掘大池九二十人或二十人之男搬運應搬運之土塊彼速堀池終了九三此故彼彼博知大地之護者伴彼授彼以榮譽以彼伽摩尼九四彼土地博知為越沙婆之堰堤如斯羅美耶越沙婆住於伽摩尼王子之處九五王其時對彼子伽摩尼王子之優遇亦與此等十人大戰士等同等之優遇九六領土之王者命令十大戰士等謂一人一人應各索十人之戰士九七彼等如命伴戰士來大地之王者命令云此一百戰士亦同樣可再索九八彼等亦同戰士等伴來大地之王者更向此一千之戰士告同索之九九彼等伴來亦戰士等所有集合彼戰士等為一萬一千百十人一彼等一切常得大地之守護者之厚遇且住彼伽摩尼王子之周圍一一如斯欣求安樂之賢者生善行聞不可思議由不善之道背面常可樂善道一二善人之信心與感激起作大王統史名戰士護得第二十三章畢

body:
  text: 第十三章摩哂陀來島彼大賢者大摩哂陀長老此時法臘十二年受和尚並僧團之命一待時機行教化楞伽島如斯思惟無達西瓦王已老耄彼子仍為王二其間決意訪親族一統禮拜和尚與僧團向父王告暇三四人長老並僧伽蜜多尼之實子有六通有大威力伴須末那沙彌四為垂恩顧親族者而已赴達奇那吉利由此向此處遊行過六箇月五彼幾無住母提奇之都到衛提沙吉利謁訪母親而提奇見可愛之子六與彼隨伴者共招待彼而自造美麗招待衛提沙吉利精舍長老七然彼阿育王子父王己與領有阿槃提國來至鬱禪尼八住於衛提沙城於其處得提奇長者美麗之少女九營同棲彼女因王子而身重於鬱禪尼生下可愛摩哂陀王子一過二年後王女僧伽蜜多亦出生其時彼女提奇曾住此衛提沙城一一敏知時機之長老坐其處如斯思惟彼天愛帝須大王與我父同舉即位式可行大祝祭由使節聞知三物佛法僧之德一二一三於逝瑟吒月布薩會之日登眉沙迦山吾等於其日將渡至勝之楞伽島一四大因陀羅帝釋天近於殊勝長老摩哂陀言為往楞伽島之教化此是等正覺者所豫言一五吾等亦應支援於彼處名般多伽提奇之姪子一六聽長老為母妃提奇之說法達於不還果住長老之處一七長老住其處一個月於逝瑟吒月之布薩會之日四人之長老須末那由此彼在家人般多伽以伴親族故彼大神力者由其精舍升入空中一八一九一行共降落此快樂之眉沙迦山立於優勝之西魯峰上美麗安巴陀羅二眠楞伽中之牟尼尊豫言有起楞伽信心之德於此因楞伽之利益等大師世尊彼摩哂陀長老當為楞伽諸天所奉敬而坐二一為善人之信心與感激而起作大王統史名摩哂陀來島第十三章畢

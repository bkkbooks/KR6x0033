body:
  text: 第三十七章摩訶闍那闍達提沙之歿後彼弟摩訶闍那王行政二十七年一彼為此即位式之舉行彼僧伽密多長老知好時機由對岸來此處二行王之即位式其他之事完成後此無自制之士長老欲破碎大精舍三言住此等大精舍之比丘等說非律者王我等是說律者以詐騙王四王定處罰謂若人對住大精舍之比丘施食物值罰一百金五為彼等之纍住大精舍之比丘等棄大精舍赴瑪羅耶及魯哈那六為此此大精舍被廢棄九年大精舍之比丘等悉成空七謂無主之物則為王所有彼邪智之長老說伏王八大精舍之滅得王之承認惡意之長老為滅大精舍而捧一身九僧伽密多長老之從者及王之嬖臣暴惡蘇那大臣與無恥比丘等一毀棄優秀之七層樓青銅殿種種建物由此處移立於阿巴耶吉利一一如斯為移多之層樓此阿巴耶吉利精舍成具多層之樓一二惡友僧伽密多長老與彼從者蘇那之近彼王行極多之惡事一三彼王以巨大之石像由波奇那提沙山運往安立於阿巴耶吉利精舍一四造石像堂菩提樹堂殊勝之舍利堂四室堂修理稱為屈屈吒之房舍一五由此暴惡行之僧伽密多長老此時見此阿巴耶吉利精舍之美麗者一六呼為梅伽萬那波耶為王完成一切利益者此友之大臣亦怒王毀大精舍一七叛逆而去往瑪羅那地方得大兵野營於多羅提沙伽池之畔一八王聞彼來其所為與此友戰迎彼於同野營一九得由瑪羅耶持來甘味之飲料與肉片彼思若無友之王不用此二自攜此於夜分唯一人出往王之處語彼之由二一彼持來之物與彼打開而食王問彼何故汝對余叛逆耶二二彼答汝為毀大精舍住之大精舍比丘等余恕此之過二三王如斯言彼恕王王從彼之勸告來都二四彼梅伽萬那波耶續勸告於王為搜集要品之理由不與王同來二五而為書記士之一女子得王寵愛之婦人大精舍廢滅之不快使此等廢滅二六憤怒之餘而殺長老更捉毀塔波園而來之惡心瓦工二七殺之使僧伽密多長老為暴惡而暴惡無自制之蘇那大臣亦殺之二八彼梅伽萬那波耶集合持來之要品營造大精舍中種種房舍二九為阿巴耶鎮定彼不祥事比丘等由處處來住大精舍三王當大菩提寺中西方造立二體之青銅像三一王而住達基那園心逆無自制心瞞著漢之惡友信仰提沙長老三二接大精舍之結界於苑中名光明彼不拘反對創設祗陀林精舍三三由此彼向比丘衆要求撤結界而比丘等不許而退出精舍三四於此處其他之使嗾有撤消結界者為妨害此或比丘等隱於諸處三五如斯大精舍不住比丘為九箇月間其他比丘等思我等果真撤去大精舍之結界三六由此撤去成就結界業之時比丘等可來此處住大精舍中三七此精舍之占據者對提沙長老訴事應視為極重之罪過為十分理義持出於僧團中三八被認為正義之士裁判大臣不但王之不同意令彼還俗三九彼王創建瑪尼喜羅伽精舍毀天祠而建立三精舍四彼婆羅門村之構康那耶伽伽毗羅伽蘭達彼亦建立彌伽伽瑪精舍與康伽闍那伽山精舍四一由此王當西方達闍那山精舍亦建寇伽瓦陀地方之大精舍四二魯巴蘭瑪精舍秋羅乞提精舍名鬱陀羅巴耶場所為比丘尼建二箇之房室四三於伽羅威羅伽夜叉之處建塔修理島中古住院多所四四對僧團之長老一千名各各施以一千金價之物總之對比丘行年年衣服之長老施四五不限飲食之布施彼又為豐作而使堀十六之儲水池四六彼瑪尼喜羅大池名伽魯羅伽努池摩訶摩尼寇伽瓦陀毛羅伽波羅伽池四七昆巴羅伽瓦哈陀羅陀瑪羅康達伽愛蘭伽威提伽四八摩訶伽羅奇羅池摩訶達羅伽羅伽伽羅波沙那池此等十六池四九彼王亦設名波波陀大運河如斯彼積善業惡業之夥五大王統史終本章於二四八終即此以下尚有一九八偈此作者相異故純粹意味之大王統史以上以五偈止

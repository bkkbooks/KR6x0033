body:
  text: 第十二章各地方之信心顯揚勝者佛教彼目犍連子長老成就結集後觀察將來一豫見應樹立邊境地之教於迦剌底迦月派遣彼諸長老於各處二伽濕彌羅犍馱羅國派遣末田地長老摩醯沙慢陀羅國派遣摩訶提婆長老三瓦那瓦沙國派遣羅吉陀長老同阿波蘭陀伽國是臾那人名達摩羅奇陀四摩訶羅陀國名摩訶曇無勒棄多長老於臾那世界則差遣摩訶曇無勒棄多五於雪山地方則派遣摩吉摩長老在金地國則派遣須那鬱陀羅之兩長老六告知大摩哂陀長老並目犍連子自身之弟子伊提雅鬱提耶桑婆羅巴達沙羅之諸長老七謂御身等於美麗之楞伽島可樹立美麗楞伽島之教如斯派遣五長老八於彼之時伽濕彌羅犍馱羅國具有大神力之阿羅瓦羅龍王以名雹之雨降於熟穀物上九伏此無慈悲者使一切流海中末田地長老飛入虛空速赴彼處一行於阿羅瓦羅池之水面為初行以行住坐臥諸龍見此而怒報與龍王一一彼龍王怒行種種之威吹大風雲鳴雷降雨一二由處處雷音響雷光閃閃生於地上之樹木倒山峰崩落一三又醜惡形貌之諸龍由諸方面威脅彼龍王自為種種之罵發煙揚焰一四長老以神通力總排此之威嚇以最勝之力示彼龍王云一五雖以人天世界俱來威吾亦無力示吾恐怖一六大龍汝若與山海共昂全大地雖將吾擲上一七亦無力可示吾於恐腹行者之主此正汝自行成為破滅一八聞此彼龍王頓挫其慢心長老為彼説法彼龍王受三歸五戒一九如斯八萬四千之諸龍多數雪山之乾闥婆夜叉鳩槃荼鬼二名潘陀伽夜叉或哈利陀夜叉尼其兒五百皆達初果預流果二一彼由今之後如前不生瞋恚不害於穀稻此衆生冀安樂者二二對有情應行慈悲人人應住於安穩如斯彼受長老之教彼等隨行此二三由此彼腹行者之王使長老坐於寶座彼則轉扇立於彼之傍二四其時伽濕彌羅犍馱羅國所住之人人為供養龍王而來認為長老是大神通力者二五敬禮長老坐於一方長老為彼等説名蛇喻經法二六八萬人人了解此法十萬人人於長老之處出家二七由此以來伽濕彌羅犍馱羅國之民歸依三物佛法僧國以纏袈裟衣者為光輝二八摩訶提婆長老赴摩醯沙慢陀羅國入於人中説天使經二九四萬人淨法眼四萬人於彼之處出家三羅吉陀長老赴瓦那瓦沙國留於空中於人中説相應尼柯耶無始終經三一六萬人人了解此法三萬七千人人於彼之處出家三二於其地建立五百精舍彼長老於彼處使樹立勝者之教三三臾那人達摩羅奇陀長老赴阿波蘭陀伽國於人中説火聚喻經三四熟知法與非法之彼於其處集合三萬七千生類使飲正法之甘露三五一千人男子並依此多數之女子等由士族之家出而出家三六彼摩訶曇無勒棄多仙士赴摩訶羅陀國於彼處説摩訶那羅陀伽沙婆名本生物語本生經第五四四三七八萬四千人達向果一萬三千人至彼之處出家三八彼摩訶曇無勒棄多仙士赴臾那世界於人中説伽羅伽羅摩經三九十七萬生類達於向果一萬人出家四摩吉摩仙士與四人長老共赴雪山之邊説轉法輪經四一八億之有生達向果彼等五長老各別使歸依五箇國四二於此等長老一一之處對十萬人人等正覺者由信心而出家四三具有大神通力之須那長老與鬱陀羅長老共赴金地國而於其時四四於此國之王家每當男兒之出生恐羅剎女由海中出來喰彼男兒而去四五恰於其時王家誕生王子人人見長老等思羅剎鬼之友四六欲殺之攜武具靠近而至問此何事耶彼等長老對如此人人作如斯語四七吾等持戒之沙門非羅剎女之友偶偶於其時彼羅剎女攜伴由海中出來四八大衆見此大聲立叫長老化現為物凄二倍之羅剎鬼四九將其羅剎女及其部下由四方包圍彼女思之此地為此等所占領畏怖而遁去五長老於此地方由四面立守護於其會中説梵網經五一多數人人受三歸五戒六萬人人了解此法五二三千五百人之良家男子出家尚有一千五百人良家女子亦出家五三由此以來彼王家所生王子代代王命名為索努陀羅五四為大慈悲勝者之斥已拾得甘露之樂彼等於其處此處為世間行利益誰於利益世間事放逸乎耶五五為善人之信心與感激而起作大王統史名各地方之信心第十二章畢

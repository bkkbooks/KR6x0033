body:
  text: 大王統史歸命彼世尊應供正覺者第一章如來來降歸命於出生清族極淨之正覺者豫説多數鞞益之一而無缺之大王統史一此大王統史原由昔人所作其或部過詳或部過簡約又多反覆之箇所二豫此大王統史此等無瑕疵易學易記憶起信心與感激亦繼承傳統三於應起信心之處而起信心同應起感激之處而起感激聽此大王統史四吾等之勝者釋尊昔會燃燈正覺尊為濟度煩惱之世人發成佛之誓願五由此彼正覺者憍陳如聖者曼伽羅須摩那離婆多佛大聖蘇毗多六正覺者阿奴摩達西波頭摩勝者那羅陀正覺者蓮華上善慧如來七善生喜見與導師義見法見悉達多帝沙同勝者弗沙八毗婆尸正覺者尸棄遍知之正覺者毗舍浮拘留孫正覺者拘那含牟尼又九善逝迦葉此二十四正覺者奉待大雄士釋尊由此等之諸佛得成菩提之豫言一果行諸波羅蜜達最上之菩提最上尊瞿曇佛濟度生類之惱一一彼大牟尼座於摩竭陀國優樓頻羅村之菩提樹下於吠舍佉月滿月之日達無上菩提一二彼自在者享最高解脫之樂於他之人人亦示其甘味七七日間住於彼所一三由此赴波羅捺斯城之外鹿野苑轉法輪於其處過雨安居期度六十人為阿羅漢一四為説法四方遣此等之比丘又導入跋陀羅群之友人三十名一五導師釋尊以迦葉為始度一千之結鬘行者待彼等之機熟於雪間住優樓頻羅一六優樓頻羅迦葉之近大祭時彼迦葉知佛自不願向其處來一七伏敵者佛由北俱盧洲得來食物於阿耨達池畔食此後夕暮時自一八勝者由正覺第九個月報沙月滿月之日為淨楞伽島而來至此楞伽島一九此楞伽島為教光輝之地為勝者所知又由充滿夜叉之楞伽島已知追拂二又楞伽島中央可愛之河畔長三由旬廣一由旬之樂二一於大龍林園即夜叉之集會地知有棲於楞伽島所有夜叉之大會二二善逝尊親赴彼夜叉之大會於其處集會中央部於彼等之頭上二三即後立於空中摩虛央伽那塔處由雨風黑暗等使激動於彼等二四惱怯怖畏彼之夜叉等向無畏勝者請示無畏施無畏之勝者宣告極度怯惱彼夜叉等二五汝夜叉等豫除汝等此之怖畏與苦惱汝等於此處相和睦與豫以座處二六彼等夜叉答覆善逝尊尊者我等總此之全島雖與汝汝與吾等無畏二七為退治彼等之怖畏寒冷黑暗而與彼場所擴展一片之皮革而坐其處之勝者由此更二八擴張皮革由其周圍發出火炎而以火熱所至之輩怖畏而立於周端二九世尊由此為彼等所愛之吉利島引發至此方於彼等移彼之時又恢復至舊位三世尊收彼皮革時天人等群集大師即於其席為彼等説法三一聽此領會正法之有情不知有幾千萬安立於三歸與五戒者不可測其數三三達須陀洹果須摩那為峰石山之天神王大須摩那恭敬人釋尊尋求可恭敬之物三三有青色無垢之頭髮撫摩饒益有情勝者之頭施捨一握之髮於彼三四彼天王受取大師彼髮納入美之黃金筐安置設積種種寶玉一切七寶之座所彼以青玉之塔封此且對此禮拜三五三六當正覺者入圓寂耶長老舍利弗之弟子名沙羅浮長老由火葬堆以神通力受取勝者之頸骨伴比丘等捧來安置於彼塔中大通力者以雲色石覆之去令作十二肘高之塔三七三九天愛帝須王弟之子而名鬱達秋羅波耶王子拜其不思議之靈祠覆其更高建三十肘之靈祠四四一上於其處起立之王睹達伽摩尼征服達米羅族民而建作八十肘高之掩被塔此之摩喜揚伽那塔實為如斯所建造四一下四二此島為適如斯人間之住居者法主大勇猛精進之智者令去優樓頻羅四三摩喜揚伽那來降畢大慈悲者喜利所有世間之大師勝者由菩提第五年在祇陀林雨安居四四見大腹龍與同小腹龍舅父與甥之間因摩尼珠之座牀四五組徒黨起鬥爭正覺者於制多月黑分之布薩日四六朝早持尊貴之鉢衣對龍族憐愍而來龍島四七彼大通力龍王大腹當時於海中有一百五由旬之龍界四八彼妹與康那瓦達摩那山之龍王而其子小腹四九彼母方之祖父龍王殊勝良摩尼珠之座牀讓與其母而死因此而舅父與甥之間起了爭執雖然山部之龍彼等有大通力五五一名沙彌提須曼那天子攜彼良棲家之祇陀林所在之羅奢耶達那樹五二得佛之許於勝者之頭上如傘之翳曾有棲事而來其所五三此天子直於前生龍在島時是人彼今之羅奢耶達那樹所立之處見辟支佛等之取食而起信心向彼等施以淨鉢之樹枝由此而彼心地善良生於祇陀園之樹上彼樹存於後樓門之傍外側五四五六超越諸天天子釋尊見彼天子之繁榮且又以此楞伽島之利益與共伴樹彼五七於戰中為攘除黑暗之導師坐於上空其處為此等事物起恐怖之黑暗五八為慰勉彼等之怖惱現露佛之光明彼等見善逝而歡喜禮拜大師之兩足五九勝者為彼等説和親之法彼等雙方共歡喜而以座牀奉於牟尼尊六大師降於地上就其處於座牀攝取此龍王等所奉天上之飲食六一導師是此等水住陸住繞行之有情八億令安立於三歸與五戒六二大腹龍之舅父伽魯利耶尼之摩尼眼龍王為作戰往彼處龍島六三於佛之初來時聽聞正法之説教住於三歸五戒於此處申請如來六四世之恃怙尊向吾等垂大慈愍尊若不來吾等總將歸於灰燼六五大慈愛者吾無我心之人尊再來豫之棲地更別示慈愍六六世尊已默諾於彼處建立羅伽耶達那之靈祠六七為了禮拜世之恃怙世尊彼羅伽耶達那祠及值得恭敬座牀宣示贈與龍王等六八汝龍王等禮敬豫之受用物祠諸子為汝等之利益安樂六九初善逝如斯與龍王等訓誡一切世間之慈愍者歸去祇陀林七龍降來島畢由此第三年彼摩尼眼龍王赴正覺者之前與比丘衆共同招致供養七一於成道之第八年住於祇陀林中之勝者世尊引五百比丘七二勝者牟尼主於第二日報至食時於樂吠舍佉月滿月之日於其所祇陀林纏僧伽梨衣持鉢而來至伽魯利耶尼地方摩尼眼龍王之棲所七三七四伽魯利耶尼祠之所被設置寶珠假堂之中於高價之座牀上與比丘衆俱就座七五以天人用之堅軟食物率群之龍王心喜飽供養率群勝者法王七六於其處世間之慈愍者大師説法後須摩那升峰為尊師印奉足迹七七而於彼山麓與比丘衆俱如意為日中之休息已赴提伽瓦比七八彼處為應立靈祠之所而世尊與比丘衆共坐為附立祠之箇所之重味入於禪定七九由彼所起知適所不適所之大牟尼來摩訶眉伽林園所立之箇所八與弟子等俱坐於大菩提樹之立處世尊入於禪定而大塔之立處亦同八一塔波園之塔所立亦同入定由彼定出而赴西羅靈祠之處佛踏一切智之道由此佛還於祇陀林八二八三如斯無量智之世尊待望楞伽島將來之利益得見彼楞伽島之阿修羅龍群其他物現在之福利慈悲之念廣大為世間燈世尊三度來此善島由此而此島為善人所蔽正法之燈明光輝八四伽里耶尼來降畢善人之信心感激而作大王統史名如來來降之第一章畢

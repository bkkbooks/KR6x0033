body:
  text: 第二十四兄弟交戰象馬劍術巧妙弓術精熟彼伽摩尼王子其時住於摩訶伽摩一王為警備地方附以提莎王子軍兵使駐畢於提伽瓦毘二某時王子伽摩尼檢閱自己之軍隊向父王進言應與達彌羅人一戰三王禁抑彼言只制河之此方則十分夠然彼三次向王進言四彼伽摩尼謂余父若是男子不可如是說然而父以此飾之以婦人之裝身具贈王五王對彼憤激而命令作黃金之鑽以縛彼彼以他術不監禁六伽摩尼對父之怒逃赴摩羅耶而含父意趣故彼被稱為多陀惡意伽摩尼七此特王正著手營造摩訶努伽羅靈祠靈祠之工事畢王集合比丘眾八由質多羅山一萬二千人之比丘由其處彼處來會一萬二千人九王於比丘眾之臨場下行祭靈祠其時集合一切之戰士而誓言一彼等皆誓我等不出至王子等之戰場果然後日不參加彼戰一一彼王營造六十四之精舍生存至同數之年此時歿於彼處一二王妃將王之遺骸載於覆付之車運往提莎大精舍發表此事於僧團一三提莎王子聞此由提伽瓦毘行來懇求自己行父之葬儀一四大威力者提莎母與率康多羅象怖兄由彼處速去提伽瓦毘一五此處集合一切家臣等遣使附書狀以變故報告多陀伽摩尼一六彼多陀伽摩尼來此具陀哈羅放斥而赴摩訶伽摩自上王位一七為得母及康睹羅象送出書狀於弟送至三度仍不得母與象以戰逼迫彼弟一八在秋蘭伽尼耶毘提兩者大交戰但彼處王方之眾倒者及數千一九王並家臣提莎與牝馬提伽陀尼伽之三者唯逃竄提莎王子追彼等之跡二比丘等於兩者之間化作山彼提莎王子見此知比丘眾所為而引返二一彼王來渡伽波康多羅河之加瓦瑪利語彼家臣提沙我等內飢如是說罷二二彼提沙為彼攜來用黃金器所盛食物王四分食物以供僧團後而食之習二三如是云報時者是提沙報時授王以戒住美映庫島之長老依天耳聞彼二四彼處家主之子令提沙長老彼由空中赴彼處二五家臣提沙由彼手受取鉢給於王王令僧團之分與已之分投於鉢二六提沙亦投已之分牝馬亦不欲取己之分提沙亦投彼女之分於鉢二七王滿食物於鉢與長老彼速飛往空中捧獻與瞿曇長老二八彼長老於偶偶取食之五百人之比丘等各各施一口量之食彼等之前得分滿鉢為王由空中投下提沙見其來受取示食於王二九三又自亦食牝馬亦食王以鎧為臺據鉢其上三一彼赴摩訶伽摩再集六萬之軍兵為與弟戰鬥而進三二其時王乘牝馬提沙乘康多羅象兄弟二人為戰相逢三三王以象為中心牝馬於外走圓形如斯不見出空隙決意示跳越三四王使牝馬跳越象由弟之上投槍傷象之背與鎧而止三五不唯數千王子眾於彼處鬥戰而斃大軍亦敗三六謂由於騎手之拙女性牝馬跳越於我怒眾打彼近於一樹三七王子攀樹而登眾近於主睹陀伽摩尼彼乘騎於彼追趕逃走之王子三八彼王子入於精舍赴大長老之庵因恐兄潛伏於彼臥榻下三九大長老於彼處之臥榻擴展法衣王追來問提沙於何處四長老向彼言大王彼不臥於臥榻然長老言彼大地之王者知臥榻之下由此而出四一願警備精舍長老令彼於臥榻上蓋法衣四二四人之年少行者擔負臥塌之四脚如死比丘之態運王子外出四三大地之王者覺彼被運出大地之主如是言提沙汝於家神之頭上運出四四以暴力由家神之手奪汝為余所不為汝亦應常憶念家神之德四五由此王赴摩訶伽摩敬母之人王於彼處使帶母來四六彼以王心樹立八法生存六十八年之間使營造六十八之精舍四七然為比丘等外致彼提沙王子由此徵服而赴提伽瓦毘四八彼王子語瞿達伽陀提莎長老大德余有罪應向兄懺悔四九彼長老以扮奴僕之狀提沙與五百人比丘為伴赴王之處五長老留王子於階段之上而與比丘眾共入其中信心篤實之大地護者示彼等坐五一雖運乳粥其他之物品而彼長老覆鉢王問何故言伴提沙而來五二王賊在何處彼長老不斷指提沙站立之處而王等之母義哈羅提義前來庇子而立五三如王對長老說御身等縱然七歲之沙彌雖已遣來我等之處處則我等不起戰爭亦無眾傷害王此僧團之過失僧團應懺悔五四五五彼王來訪之御身等有用務使攝取乳粥及其他此粥施比丘眾而呼其弟五六於其處僧團中王與弟共坐而食共同送遣僧團五七為推展農業送回提沙令推行農業自己亦叩大鼓進行農事五八如是善人已積種種大怨亦緩和則有智之誰如是思惟對他不得心和耶五九善人之信心與感激起作大王統史名二兄弟交戰第二十四章畢

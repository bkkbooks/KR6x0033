body:
  text: 第三十五章十二王章摩訶達提王之歿其子阿曼達伽摩尼阿巴耶即王位九年八個月間行王事一快為大塔於覆蓋上設覆蓋又於同所之礎部與頭部造欄杆二同青銅殿塔波園之布薩堂亦設置屋內中庭與屋內段階三於兩所又建美麗寶珠之假堂人間之主構建羅奢陀雷那精舍四施善業之人王於摩訶伽摩堀兩側之儲水池施與達吉那精舍五人間之主令全島為不殺生地所有種類之瓜果處處令附植六阿曼提耶國土主以名曼沙昆般陀肉瓜果滿比丘等之鉢作布輪上載鉢七以淨信心施所有之僧伽以施滿鉢彼示知為阿曼多伽摩尼八彼弟伽尼伽努達沙王殺兄而行政於都三年九彼於支提耶山精舍裁決布薩堂之訴事對王犯罪六十名之比丘等一王於支提耶山併捕其與黨此破戒之徒名投入伽林多窟中一一伽尼伽努王之沒後阿曼多伽摩尼王子秋羅巴耶王即位一年一二此國土之主於構那伽河畔於阿䨲羅陀都之南方建立秋羅伽羅伽精舍一三秋羅巴耶歿去其妹即阿曼達王之女西瓦利坐四箇月間之王位一四然阿曼達王之甥名為伊羅那伽退此西瓦利於都翳傘一五即位之初年王往達沙池時衆多之蘭巴康那垂耳族民棄王而還都一六王不見彼等而怒於儲水池之傍踐踏彼等造大塔堆一七據旃陀羅族民為監督彼等蘭巴康那人怒總結為一園一八捕此王王拘禁於自己之宮彼等自行王事時王之妃飾裝其兒月面西瓦王子託乳母等之手於王乘用之象處告送妃之傳言乳母等伴行王子於彼處傳妃言無餘語王象一九二一此汝主公之兒汝主公今為監視之身為敵取此兒殺之不如由汝殺之為善二二謂汝殺此此為妃言斯言已臥兒於象腳下二三惱著之彼象泣而破其小舍入大境地以強力倒門二四於王之坐所破窗背王乘來大渡海場二五於是王乘船象自西海岸傳赴瑪拉耶地方二六彼王棲於對岸三年後率軍勢乘船來羅哈那二七王於沙伽羅蘇巴港下彼於羅哈那行召集大軍兵二八彼王乘之象為達成彼務由彼南部瑪羅耶地方來羅哈那二九於是名摩訶波多摩有談本生談住陀羅達羅山精舍之大長老王於其處三聞猿猴本生談對菩薩起信心擴展那伽大精舍不張弦之弓為一百挺量三一立古塔而擴大與達沙儲水池同名杜羅儲水池之設立三二此率王軍為戰而出來蘭巴康那族民亦聞此為戰之準備三三於伽巴羅康達之入口阿漢伽羅毗陀之田野兩者間互相損傷之戰開始三四王之部下於船身體疲勞已退卻彼王舉名乘自入戰場三五蘭巴康那民等為彼所討腹伏而爬王切彼等之首積於車軸之下三六如斯事及三度大地之主憐之謂不為殺事而捕捉之三七由此克戰王入於都使翳王傘赴提沙儲水池之祭禮三八由水中遊戲而升善飾裝見己之榮達想起其障害蘭巴康那民王怒調車過車之頸木彼等蘭巴康那民先入都三九四彼立大境地之門國王發令言汝等於此敷居斷彼等之首四一答覆車乘之主此等繫王之車牛使斷其角與蹄時此事王母知之止於斷首王切斷彼等之鼻與拇指四三王於象所棲地方施於象此地方其名為知象之受用四四如斯國土之主伊羅那伽王於阿䨲羅陀城即王位正六年四五伊羅那伽之歿後彼兒月面王西瓦執王事八年七箇月四六王於摩尼伽拉村令造儲水池彼以此施與名伊沙羅沙摩那精舍四七知達彌羅妃此王之第一妃於此村同所得施精舍四八此月面王西瓦其弟之耶沙羅羅伽提沙為所知者於提沙池之水戲時殺之四九楞伽國之快美顏容於阿䨲羅陀都司王事為七年八箇月五門衛達多之兒己亦為門衛者其名為須巴顏貌似王五一耶沙羅羅伽王戲以此須巴將軍箸國王之裝束使坐於王座五二以頭被卷將軍之頭自攜手杖立於門傍五三使坐彼王座見諸大臣之敬禮而王笑彼如斯再三五四然一日將軍對王之歡笑説此將軍何故於余之前而歡笑耶五五令殺王於此須巴將軍行王事六年所知須巴王五六須巴王於二大精舍冠以須巴王之名令設以善品質列房舍五七同烏魯衛羅城之傍建瓦利精舍於都之東建耶伽多瓦羅精舍於伽奢河畔建立難提伽瑪精舍五八一人蘭巴康那族之子名瓦沙巴住鬱陀羅波沙者來都仕軍帥之叔父時王由流言瓦沙巴現稱王國中凡名為瓦沙巴者皆殺之五九六此瓦沙巴奉王語彼軍帥之妻早赴王宮六一彼與瓦沙巴軍帥共出行時為堅護彼彼女不給瓦沙巴手煉石灰而給蒟醬六二至王宮之門軍帥見出持來蒟醬無石灰而送彼返六三軍帥夫人為石灰而來言由瓦沙巴所竊與一千金使逃去六四然後彼瓦沙巴赴大精舍之處於此由長老等受牛乳食物衣服之有惠施六五由此後又由患者聞己決為王而喜決意為盜賊六六得有能之人而後行掠奪村里由伽波羅普瓦地方向羅哈那前進六七次第取國彼王從所有種之軍力而二年來近都六八彼大力之瓦沙巴殺須巴王於王庭上使翳傘於都然由叔父戰斃六九曩圖利益於彼叔父之妻瓦沙巴王名未陀為第一妃七彼問占星者己之壽量彼祕密答王由言十二年七一為祕密之圍護王令與彼一千金集比丘衆禮拜而問彼等七二諸大德壽命增加有因與否比丘衆答謂有須排除障礙七三行漉水布之布施住宅之布施病人扶助之布施王七四同為舊住院之修理受五戒法而善守七五於布薩日持布薩禁戒王曰可行如彼之言而行七六三年三年之終了王對國中之僧衆施三衣七七對自不來送長老等此施於三十二處施蜜粥七八於六十四處行混合大施於四處使點千燈心七九所謂四箇所支提耶山精舍塔波精舍之塔大塔大菩提樹堂是此等之處處八於質多羅峰建立十箇之塔波修理全島之古住院八一彼信仰瓦利耶羅精舍長老建立名摩訶瓦利陀精舍八二建立近於摩訶伽摩之阿努羅多精舍一千八伽利沙廣之黑利伽摩施彼精舍八三於提沙瓦達摩那伽建摩智羅精舍以施捨阿利湖水之一部八四伽蘭巴提陀塔設瓦掩被塔建立布薩堂為彼燈時燈油八五施捨堀一千伽利沙之儲水池於昆比伽羅伽精舍施建布薩堂八六彼大地主又於此處伊沙拉沙摩那伽精舍建布薩堂於塔波園精舍建塔波之家八七於大精舍沿西門建一列房舍修理古朽之四室堂八八過去四佛之美像與同像之堂宇使王建立彼美麗大菩提園八九此王之彼首妃名鬱陀喜塔與美麗之塔舍建立此處九大地主於塔波園精舍令建築塔波之家其落成之祝又行大施九一通佛言詞之比丘等以四種要品談法比丘等施酥油粗糖九二於都之四門救助貧民對病比丘等行病人之救助九三瑪野提羅秋波羅瓦哈池庫蘭波村之池摩訶尼伽瓦提池摩訶伽瑪之二池開哈羅開利瓦沙恙普提瓦達曼伽那阿比瓦達瑪那伽此等十一之儲水池是此王之堀九四九五於第十二為餘分設為豐作為護都城障壁如斯高九六於四門設望樓為己築大殿使造遊園放白鳥於其處九七於都處處堀蓮池由墜道而王落水其處九八大地主瓦沙巴行如斯種種之善業彼對善業有敬意除障礙九九四十四年間於都執政行吠舍佉之祭及四十四回一彼須巴王唯有己之王女一人疑瓦沙巴有難託彼女於瓦工一一自身之毛布衣及附國王之要具須巴王之為瓦沙巴而被殺耶瓦工引取彼女一二為養女而育於己家其少女彼從事業務時運食一三此有智慧之女於伽丹巴華叢中彼第七日施食物見出入滅盡定長老一四已再調理食物運父之處問遲延之理由以此事由語父一五彼父喜令再送食物與長老親善之長老見通彼女之未來語少女云一六少女汝得權勢憶起此地而其日長老入般涅槃一七彼瓦沙巴王其子萬伽那西伽提沙達成年時彼適求處女一八見婦女之相人人巧瓦工村見此少女一九上報於王王令伴彼女來此時瓦工語彼女之為王女一一由毛布衣其他之物證明是須巴王之王女王喜無止行彼女與彼子之式一一一瓦沙巴王歿後彼萬伽那西伽提沙伽於阿䨲羅陀都行政事三年一一二此萬伽那西伽提沙伽王於庫那河畔建稱摩訶曼伽羅精舍彼王妃摩訶瑪陀憶起長老之言為建立精舍而蓄財一一四萬伽那西伽提沙歿後彼子伽奢巴府加伽摩尼二十二年間行政一一五彼聞母之語為母營造伽丹巴華林王母精舍一一六彼賢明之母妃為購入土地施千萬金大精舍之彼精舍亦為營造一一七自於其處建石造之舍塔由處處購施比丘衆之受用物一一八擴大阿波郵達羅大塔之積於彼四方之門令造弓形門一一九此大地主堀伽瑪尼提沙儲水地施與為維持阿巴耶吉利精舍一二於瑪利洽瓦提伽塔設掩被塔以購十萬金施比丘衆之受用物一二一於最後之年建名羅瑪伽之精舍都中亦構大王座堂一二二伽奢巴府之歿後此王之義父老那伽見政事六年一二三於東方波伽羅伽精舍於南方庫提泡巴達於西方達伽泡沙那於那伽島沙利泡巴達精舍一二四於比奢村洽那衛羅於羅哈那地方睹巴羅那伽山精舍而內部地方吉利衛哈羅精舍一二五此老那伽王雖甚短年月但令造營此七箇寺一二六如斯知者以可滅之財多行善業得不滅者然昧者愚癡以欲之故多行惡業一二七善人之信心與感激而起作大王統史名十二王章第三十五章畢

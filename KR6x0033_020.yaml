body:
  text: 第二十章長老入滅正法阿育王之第十八年於摩訶眉伽林精舍植大菩提樹一由此第十二年此王所愛正妃為敬慕正覺者之阿桑第米陀歿去二其後第四年大地之王者正法阿育使心柔之提莎羅伽即正妃之位三由此第三年此愚者誇容色之妃思此王較妾愛慕大菩提樹四為忿怒之情所壓不知果己之不利利用曼多之荊使大菩提樹雕枯五其後四年名聲甚大正法阿育王已為無常之力所捉此等合計為三十七年六悅法之德天愛帝須王於大精舍同支提耶山七塔波園於適宜之新築竣工後光輝楞伽島向問答巧妙之長老問曰八大德全於此島令建立多數之精舍然應安置之舍利如何而可得耶九大王須末那沙彌持來滿正覺者之鉢安置於支提耶山舍利一此舍利是象背所載運來此處長老作如斯言彼如言持來舍利一一由旬至由旬之場處營造精舍於其處之塔中適當安置舍利一二王安置正覺者所用鉢於王廷內美麗堂中常以供養多數之供養物一三五百人王等於大長老之前出家而住之場所伊莎拉莎摩那伽精舍一四五百人之吠舍種於大長老之前出家住同一場所有吠舍山精舍一五於山之精舍大摩哂陀長老所住之石窟皆稱為摩哂陀窟一六第一大稱精舍第二稱支提耶第三美塔先建之塔波園一七第四大菩提樹栽植而第五適於後日建立塔之善處事一八即於大支提之處為正覺者之頸骨此是建美麗石柱事一九第六伊莎羅莎羅曼那精舍第七提莎池第八第一祠第九稱為吠舍山塔二名優婆夷美麗之比丘尼房同名為哈塔魯哈伽之比丘尼房此等之二為比丘尼之安樂所建二一王赴哈達魯哈伽比丘尼等之房為與此等之比丘衆共所攝食二二食物甚善一切器物調滿使用之人靈便建立名為摩訶波利伽食堂二三同樣一千比丘施與上等之資具共逐年自恣日之施物二四於那伽島於彼之恙普寇羅港有恙普寇羅精舍提莎大精舍東精舍二五此等之工事為願楞伽島人人之利益具有善根與智慧愛德彼楞伽王天愛帝須即位之第一年令營造至死積多數之善業二六二七此王統治之間此島富榮此王位為四十年二八彼雖無子其歿後而王第鬱提耶知王子善行王事二九有大羣衆楞伽島之燈明大摩哂陀長老勝者最上之教學習修行證得善於楞伽島之光輝於楞伽等於世尊之彼長老為楞伽島行多數之利益三三一彼之鬱提耶王即位八年住於支提耶山兩安居三二光明增加彼之摩哂陀長老於阿濕縛庾闍月之白分第八日法臘六十歲而入滅三三而摩哂陀長老之第八日入滅故此日第八日定為布薩日三四聞此如悲憂之箭所刺之鬱提耶王往拜長老樣樣頻為悲嘆三五納長老之遺體於灌香油之金棺善封彼棺三六三七上安置莊嚴金色棺架之上扛棺架使行聖祭三七下三八上由處處來之夥大衆及夥軍兵施行供養之儀式三八下三九上令樣樣莊飾道路引來莊嚴之都城三九下巡回城中之街路引來大精舍彼王七日間於此處菴羅樹問答道場據棺架四四一上穹門幢幡以瓶充滿諸華及香令飾精舍並四方三由旬之地依全島由王之威力又同由天神之威力令莊嚴四一下四三上彼王者七日間行種種之供養於東部地方之提羅那般多摩羅伽四三下四四上造香木之火葬堆對大塔波行右繞禮於其處引來彼可愛之棺架據於葬堆上表最後之敬意於此處又營造葬舍利之靈祠四四下四六上舍利半分葬於支提耶山王族士一切於精舍造塔波四六下四七上行此聖人遺身之埋葬地以最大之尊敬稱為聖人庭由此以來此四方三由旬之地住貴人之遺身持來此處焚燒四七下四九上大通力之大賢者僧伽蜜多大長老尼行教之務同行多數世間之利益而於鬱提耶王之第九年彼女五十九歲住於安樂哈達魯哈伽比丘尼房中入滅王與長老同為彼女七日間行最上之供養恭敬四九下五二上又楞伽島與長老入滅之時同令一切莊嚴載棺架之長老尼遺體過七日後由都出經塔波園之前面大菩提樹百步處近於畫堂曾為尼已住之處施行火葬五二下五四彼鬱提耶王又於其處建立塔波又阿利陀長老開始彼五大長老同數千漏盡比丘僧伽蜜多開始十二長老尼並幾多千之漏盡比丘尼等五五五六此等多聞大智之人人令律與其他勝者之教有光輝經時隨無常之力所壓五七五八上彼鬱提耶王司王事不及十年如斯此無常性為所有世界之破壞者五八人知此之極暴極強難以抵抗之無常性亦無厭生存之事厭無惡不好之邪業福業此無好惡極癡之強網彼知迷卻者五九善人之信心與感激而起作大王統史名長老入滅第二十章畢

body:
  text: 第十五章受納大精舍因象舍亦無餘地集其處彼虔敬之衆於都之南門外名快樂難陀園為長老設座席令蔭涼濃清涼而翠緑深之王苑一二又長老由南門出而坐於彼處只埋於王苑多數之名門婦女等亦來其所坐於長老之近側長老為彼女等説賢愚經三四其內千人之婦女得達初果如是在其苑已黃昏時侯五由此長老等謂我等可赴彼眉沙迦山出去若此報告王王立即來六來向長老謂已夜深山又甚遠可樂住此難陀園七如是答此言過近於都不適王云摩訶眉伽林苑不過遠亦不過近八樹蔭水具備而快可樂居住彼處大德等可還來長老返還彼處九彼返還之處所於伽丹巴河之畔造名返還之塔而建立靈祠一車駕之王者由其難陀苑之南方向東方門之摩訶眉伽苑自為長老之帶路一一於此處愈快王舍中之調良臥牀與座榻謂此處寬請住一二王禮拜長老等伴家臣而入都彼長老等其夜宿於其處一三大地之王者翌日早持華近長老等禮拜供養華一四更問住於安穩耶愈快王苑耶住於安樂大王行者愈快王苑一五彼王問曰遊園適於僧團耶否耶大德謂適當熟知適不適一六長老語佛陀受納竹林精舍事聞此彼王大悅大衆亦踴躍歡喜一七為拜長老而來之阿䨲羅妃與五百婦女共得第二果一八彼阿䨲羅妃與五百之婦等共向大地之王者言我等應出家大王彼王以此語長老一九請令此者等出家長老答王言我不適令此等婦女出家二有我妹於波吒梨子城為尼知名謂僧伽蜜多見聞廣大二一大王由沙門王佛之大菩提樹王取南枝同伴優秀比丘尼等二二來遣使者於我父王之處彼長老尼來此令婦女等出家二三曰善哉王取最上之水瓶此摩訶眉伽林園布施與僧團二四注奉施水於摩哂陀長老之手水落於地上時大地震動二五大地之守護者王問彼長老何故大地震動耶彼答樹立教於楞伽島故二六貴人王向長老獻素馨之花長老赴王宮向立於彼南方之棉樹撒八摑之華於其處又大地震動長老受彼王問語彼因由二七二八過去三佛之時亦於此處有道場大王今又有僧團行事之箇所二九長老赴王宮之北方美麗蓮池於其處又散同量之華三大地於彼處亦又震動而又問於語彼王其理由言大王此為浴室之蓮池三一上人赴彼王宮之樓門於其場所供養同量之華三二彼時大地亦震動身毛甚良之彼王問此理由而長老以此語彼云三三此劫中由過去三佛取來菩提樹南枝植於此處大地之護者三四我等如來之菩提樹南枝亦植此處大地之主三五由此大長老往摩訶姆奢羅之道場以散同量之華於其處三六然問此處又起大地震動語彼其理由言僧團之布薩堂可設於此處大王三七大賢由此赴菴羅樹問答之道場處王園之守衛甚熟以色香味最上之大菴羅果捧獻於王王以美妙之果實獻與長老三八三九民衆慈念之長老示將坐之樣子王則於其處使敷以上妙之毛氈四長老坐於其處大地之王者獻菴羅果長老味彼後為蒔彼菴羅果種子與王而王自播其處長老為其成長洗手於其上四一四二於其剎那彼種子發芽不久則著葉與實成巨大之樹木四三王含彼群衆見彼神通身毛彌立敬禮諸長老而止立四四此時長老撒八摑華於其處其當場又大震動而王問而語彼理由四五人間之主此處獻種種施物於僧團為配分場所四六由此長老赴四寶堂之處於彼處散同量之華其處亦大地震動四七王問震動之原因長老回答過去三佛之受納王苑時四八島民由諸方齎來施物積於此處同供養三善逝佛僧團四九然今此處有四室堂此可為僧園之食堂五由此辨適處不適處楞伽島之燈明摩哂陀大長老赴立大塔之場所五一其時王苑之構內名伽庫多之小池於彼高明之水邊五二有適於建塔之陸地長老赴彼處為王齎八籠之簷葡華五三王以彼等簷葡華獻於長老長老以簷葡華供養彼土地五四於彼處又大地震動王問彼震動之原因長老次第語彼理由五五大王此為生類之利益安樂過去四佛之常訪處適於建塔五六於此劫最初勝利者拘留孫佛出世通一切法之師為一切世間之慈愍者五七此摩訶眉伽林稱為摩訶提陀都名阿婆耶無畏在伽丹波河之對岸在彼處有阿婆耶王彼時此島名為摳闍洲五八五九為羅剎鬼此處之人民起惡疫頭熱病十力拘留孫佛見此災害六為撲滅此於此島化導衆生果為教流通押慈悲之力六一伴此等四萬之人人由虛空而來立於提婆鳩吒天峰山六二於此依正覺者之神力大王此時滅全島之頭熱病六三立於其處人王牟尼王之大牟尼使誓願摳闍洲所有之民今日可見於我六四又願來余處之人人皆安穩而且迅速而來六五放光此牟尼王與浴其光見為山王及都民速行近之六六捧供物於天神來此處人人思伴僧團世間之導師佛為天神六七彼王大歡喜會釋彼聖王佛伴來近都招待食事六八與僧團共適於聖王之坐思此美麗優良座席是無邪障之場所六九大地之王者華麗之假堂設上妙之牀此處彼僧團共令坐正覺者七見世間之導師在此處與僧團共著座島民由四方持來贈物七一彼王以己之硬軟食物並於彼等由手至手持來之物令世間導師與僧團共滿足七二彼王食後向坐此處之勝者為絶妙之布施以獻摩訶提陀伽王苑七三此時摩訶提陀王苑不時飾華請佛之受納大地發生震動七四彼導師坐於此處説法四萬之人人達於向果七五勝者於摩訶提陀林為日中休息黃昏之時赴適植菩提樹之土地七六坐彼處入於三昧由彼起正覺者為楞迦島之住民之利益而思惟七七魯波蘭多尼與他尼等同持來由我菩提樹尸利沙樹之南枝七八彼長老尼覺此心立即伴王近於彼處之樹七九大通力者長老尼以瑪諾西羅石附印南枝切彼插入黃金之花瓶八大王彼女依神力與五百人之比丘尼等共攜菩提樹伴天神等來此處八一伸出正覺者之右手連同載黃金之花瓶如來受取其菩提樹八二令植此與阿婆耶王王以此植於摩訶提陀王苑八三正覺者由此再赴北如來坐於美麗尸利沙樹之圍中八四為衆説法大王於彼處領解法之衆生有兩萬八五勝者佛由此又赴北方坐彼處塔波園之地入於三昧由此而起八六正覺者為群衆而説法其處又一萬生類達向果八七己水瓶為人人崇拜而與彼比丘尼與其從者共留停此處八八又弟子摩訶提婆與千人之比丘共留停此地正覺者東方八九立於羅陀那道場教化人人勝者伴僧團升於虛空而赴閻浮洲九於此劫第二名拘那含牟尼金智之師為一切世間之慈愍者九一此之摩訶眉伽林名為摩訶那摩名為跋闍摩之都在南方九二此時於此名沙滅地之王時名此楞伽島為婆羅洲九三此時於此婆羅洲有旱魃之災害彼勝者拘那含牟尼佛見彼災害九四滅此於此島為果衆生之化導與教之流通壓於慈悲之力九五伴此等三萬之比丘由虛空而來立於須摩那峰山九六由正覺者之威神力終止旱魃由拘那含牟尼佛之教消滅時為豐作九七立於彼處人王聖王之大聖佛誓願婆羅洲之民衆今日總可見我九八又願來我處之人人皆安穩且速來九九王及都人見放光牟尼王及浴光之山速近之一又彼處來之人人呈獻供物天神思伴比丘衆之世間導師佛是天神一一彼王大歡喜會釋彼聖王佛招待食事伴來近都一二思與僧團共適於聖王之坐美麗殊勝此座席此無邪障場所一三大地之王者設華麗之假堂與上妙之牀於此處請其比丘衆與共正覺者就座一四島民見世間之導師於此處與比丘衆共就座由四方持來贈物一五此王以為自己所作之硬軟之食物及以彼等持來之食物供養世間之導師與比丘衆充分至飽一六彼王食後向坐此處勝者呈獻彼絶妙施物摩訶那摩伽王苑一七彼時摩訶那摩林莊嚴非時之華請佛受納大地震動一八彼導師坐此處説法三萬之衆達向果一九勝者於摩訶那摩林為日中休息日暮赴昔立菩提樹之地一一坐彼處住三昧由此而起正覺者為楞伽島民之利益如是思惟一一一伽那伽達陀比丘尼與諸比丘尼共持來由我菩提樹之烏曇跋羅樹南枝一一二彼長老尼知彼之此心立即伴王近彼處之樹一一三大通力者長老尼用瑪諾西羅石附印南枝自斷而插入黃金之花瓶一一四彼女依神力持來菩提樹五百人之比丘尼同伴天神大王來此所一一五正覺者伸出右手載彼黃金之花瓶如來受取一一六令植彼若與沙滅地王大地之王者令植彼處之摩訶那摩王苑一一七正覺者由其處赴北尸利沙道場坐那伽道場為衆説法一一八大王於彼處聞其説法領解法之生類其數二萬一一九更赴都之北過去佛所坐之場所坐於其處入三昧由此而起一二正覺者為衆而説法又於其處一萬之生類達向果一二一彼為人人之崇敬與腰帶遺品伴隨從者比丘尼留停此處一二二留停佛弟子摩訶孫摩與一千比丘正覺者由羅陀那道場此方一二三而立於蘇多莎那道場教衆勝者與比丘衆共升虛空赴閻浮洲一二四於此劫第三名迦葉姓勝者金智之師為一切世間之慈愍者一二五摩訶眉伽林稱為摩訶沙伽羅名毗沙羅都位於其西方一二六其時於彼處有自稱支衍多王其時此島名為慢陀洲一二七此時支衍多王與王弟起淒慘而傷害人之戰鬥一二八彼大悲之聖者十力之迦葉佛由其戰而見失生類之夥一二九滅彼爭為此島化導衆生果為教之流通壓慈悲之力一三伴此等二萬人人由虛空而來立於須巴庫陀清淨峰山一三一立於彼處人王聖主大牟尼已誓願慢陀洲之人人今日皆見我一三二又願來我處者皆安穩速來一三三王及都人見放光之牟尼王與浴光之山速來附近一三四多數之衆各各為自獲勝利呈獻供物於天神近於彼山一三五思伴比丘衆世間之導師是天神彼王與王子王弟亦驚而中止戰爭一三六彼王大歡喜會釋彼聖王招待食事伴來近都一三七適於聖王之比丘衆共坐思此最上美麗座席為無邪障之場所一三八大地之王者令設華麗之假堂與上妙之牀於此處伴彼僧團之正覺者就座一三九見世間導師於此處與比丘衆共就座島民由四方持來贈物一四彼王以己所作之硬軟食物與彼等持來之食物供養世間導師與衆共飽食一四一彼王食後向坐此處勝者呈獻絶妙之布施物摩訶沙伽羅王苑一四二摩訶薩伽羅林莊嚴不時之華請佛受納大地震動一四三彼導師座於此處説法二萬之人人達向果一四四善逝佛於摩訶沙伽羅林為日中之休息夕時赴昔菩提樹所立之地一四五坐於彼處住入三昧由此而起正覺者思惟為楞伽島民利益一四六須丹摩比丘尼攜余菩提樹之尼拘律南枝今伴諸比丘尼來此一四七彼長老尼知彼之此心立即伴王於彼處近彼樹一四八大通力者長老尼用摩那西羅石附印南枝自斷插入黃金之花瓶一四九彼女以神力運菩提樹與五百人比丘尼共為天神所圍繞來至此處交大地之王者一五正覺者伸出右手如來受取載黃金之花瓶一五一令植彼與支衍多王王令植彼處摩訶沙伽羅王苑大王一五二由此正覺者赴北方之那伽道場坐於阿索伽道場為衆説法一五三聞其説法於彼處領解法之生類為四千人人之王者一五四更赴都之北方彼過去佛所坐之場所坐其處住三昧由此而起一五五正覺者為衆於此説法達向果生類其數有一萬一五六為人人之崇敬以洗浴衣為遺物而與伴隨從者比丘尼留此處一五七佛弟子薩婆難陀與一千比丘共停留由河之北方蘇達沙那道場一五八往蘇瑪那沙道場教誡衆之勝者伴僧團升虛空往閻浮洲而去一五九於此劫第四通一切法之師一切世間之慈愍者勝者瞿曇一六最初彼來此處追除夜叉第二再來壞諸龍一六一更於伽魯耶尼河為摩尼眼龍所招請三度來島與比丘衆共取食於彼處一六二昔日立菩提樹之場所此塔婆之地寬坐受用物舍利塔之處一六三世間之燈明大聖赴過去佛所立地之此方於其時楞伽島無有人之住居一六四教化住島之天人衆及諸龍與僧團共升於虛空返還閻浮洲一六五如斯王四佛常訪此場所此場所將來當有塔婆一六六安置一多納量之佛舍利高有百二十羅陀那量知為海摩摩利祠一六七我建立其塔大地之王者如斯言御身有他多數之務大地之王一六八彼等當實行又汝子孫造營此御身之令弟副王摩訶那伽之子一六九彼為耶陀羅耶伽提沙將來之王名寇陀波耶王彼子一七彼子名伽伽灣那提沙王彼王子當為大王一七一多陀伽摩尼之名為世所知此大威光神通精進之阿婆耶於此處建立塔婆一七二長老如斯語由長老之語王於此處立石柱記下此之事一七三彼大賢大通力者大摩哂陀長老由摩訶眉伽林受納快樂提沙遊園一七四無震動長老於八箇所使震大地為行乞如海入於都一七五於王宮食後由宮殿出坐於難陀林於此處為衆説火聚喻經於其處一千之人人達向果住於摩訶眉伽林一七六一七七於第三日長老於王宮攝食坐於難陀林説蛇喻經一七八令千人之衆達領解由此大長老赴提沙遊園彼王欲聞説法一七九坐於長老之側問勝者之教樹立否大德大長老答未然人人之王者一八為布薩等之作法從勝者之教回人王若於此處設定結界則可樹立教一八一大長老所言王則對彼説我住正覺者於教令之內持光者一八二為速建都內設定結界大王如此申述長老告彼一八三如是者大地之主汝自量達結界之處我等決定此一八四言善哉大地之主出難陀園如天王由樂摩訶眉伽林而入自己之宮殿一八五第四日長老於王宮食事後坐於難陀林説無始終經一八六於彼處千人之衆令服甘露之水大長老赴摩訶眉伽林園一八七晨早打大鼓巡回宏大之都向精舍之道路並遍莊嚴精舍一八八車駕之王者駕車施身所有裝飾與家臣後宮荷車象馬俱一八九與多數之隨從者共近己遊園於彼處近會釋值得尊敬之諸長老一九克服伽丹波河之對岸而造溝緣達於河終止結界決定事一九一由王依溝標明記號亦明標三十二之道場與塔波園一九二明標耶大賢大長老隨法亦明瞭結界內之標一九三聖者其同日定所有之結界決定此結界事畢大地震動一九四第五日目長老於王宮中攝事坐於難陀林為大衆説應噉經於此處一千之人人令服甘露之水住於摩訶眉伽林一九五一九六第六日長老亦於王宮內食事坐於難陀林通於説法之人説牛糞塊經令一千之人人達於領解住於摩訶眉伽林一九七一九八第七日長老於王宮中食事坐於難陀林説轉法輪經令千人之衆達於領解住於摩訶眉伽林一九九二如斯持光之人長老七日間令八千五百之人人得領解二一彼大難陀林為如是之人而成教光輝之場所而稱為光明林二二王先為長老速以炬火乾粘土於提沙遊園令營造塔樓二三其塔樓黑色而有光是故此於彼處得黑重閣寮之名二四由此令巧造大菩提寺青銅殿及籌食堂食堂二五多數之寮舍設殊勝之蓮池晝間處夜間處等二六彼洗惡業人長老之浴池畔寮舍稱為善浴庵二七島之善燈明長老之經行處彼寮室稱為長經行二八彼長老之頂果阿羅漢果達等至定之處以其故稱此為頂果寮二九彼長老於其處據脅息而坐之箇所是故稱為長老所憑之寮舍二一多數之諸天群神近彼側坐之箇所為此稱為群神寮二一一彼王之將軍提伽桑達伽為長老由八根之大柱建塔樓二一二於此此殊勝之優勝者源泉之寮舍稱為提伽桑達將軍寮二一三提婆蘭毗耶天愛之語冠以其名彼善意之王者帝須為無垢意大摩哂陀長老於楞伽島此處建立此第一大精舍二一四善人之信心與感激而起作大王統史名大精舍受納第十五章畢

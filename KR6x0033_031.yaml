body:
  text: 第三十一章舍利奉安令舍利室之事業完畢行伏敵者比丘衆之集會告此而言一余令完畢舍利室之事業明白奉安舍利大德等得舍利二大王言此由此入都比丘衆思料舍利將來之比丘三名蘇努陀羅住於普伽僧院而有六通之行者已託舍利之將來事四世間之所依佛為利益世間處處遊行時於恆河畔有其名稱為難達陀羅青年五與正覺者共請比丘衆行食供養大師於波耶迦港與比丘衆共乘船六其處之巴達質長老具六神通大威力者見水渦卷之箇所言比丘等七我住摩訶鉢那達時所住二十五由旬廣之黃金造宮殿於此沈沒八恆河之水到此處彼生渦卷之流比丘等不信此而申述佛九佛排比丘等之疑惑而宣説由此彼梵天世界亦隨己意得示事一依神通而升空中立高等於七多羅樹之處梵天世界以佛之衣裳塔置自己擴展之手上一一特來此處示顯人人再據置彼處於元來之所依通力來恆河一二彼以足大指捕捉宮之頂取示於人人再投此於河中一三難達陀羅青年見此神變往他人手之舍利我亦能自行取來一四如斯若欲祈願前世比丘衆於此業用齡唯十六歲之蘇努陀羅行者一五舍利由何處取來耶彼問比丘衆衆語此舍利事於長老一六世間導師臥於般涅槃牀雖由舍利為世間利益而語帝釋天王曰一七天王余之遺身舍利八多那中一多那在於羅摩村受拘利那人之恭敬一八由此向龍之世界持來彼受龍之恭敬奉安於楞伽島之大塔中一九大行者有遠見之眼摩訶迦葉長老亦由法阿育大王依佛舍利廣配分之理由二於王舍城之附近以阿闍世王設壯麗善美之大舍利藏二一佛舍利之中七多那持來其處奉安而為羅摩村之一多那彼知師之御心而不取二二大地之主法阿育亦見彼大舍利藏思惟命造第八之多那藏二三於大塔藏此此亦為勝者佛豫定之處此處漏盡行者等制止法阿育王二四羅摩村塔設於恆河之畔由此之後此舍利篋為恆河大水所毀二五入於海中於是水分二方之處彼立其種種寶珠所造椅子上而交光二六龍見此篋到曼求利伽龍宮以報告龍王二七彼龍王與一億之龍共到彼處彼舍利奉來供養於己宮二八其上所有以寶造塔同造之屋舍與龍群共常行恭敬供養二九於彼處守衛嚴往持舍利來此大地之護者睹多伽摩尼王明日應行舍利奉安之式故三如斯聞比丘衆之語彼蘇那長老云諾計量可行之時刻自赴僧院三一謂明日將行舍利奉安之式王於都中叩回大鼓調整一切事務三二都中全部與通過此之僧院之路準備令莊嚴都人等亦著飾三三帝釋天王呼毗首羯磨來楞伽島無餘飾付種種三四都四方之門人民之主為大衆之受用衣服飲食物樣樣皆須配置三五十五日布薩會日之日暮賢於王務彼睹多伽摩尼王以所有飾具飾身精神愈快三六所有舞妓與取武具之兵士與如大水之兵士伴象馬車三七裝飾種種樣樣等取圍四方乘坐純白之四辛馱馬之牽善美車三八飾付美麗象康多羅而為先導白傘下攜一金篋三九一千八名之美麗男女持飾滿水之瓶圍繞王之彼車四種種之花籠同炬火婦人等攜以同數四一一千八名之善著飾童子等攜種種色之美幢而從王四二處處有種種之音樂響有象馬車之音而大地之面恰如被裂四三大名聲之彼伽摩尼王以王者之尊嚴到摩訶眉伽園到難陀園美如天王四四出王都立而耶蘇努陀羅行者坐於僧院而聞得大音樂之響四五大地潛赴龍宮速其處出現於龍王之前四六禮拜起座請彼蘇努陀羅入座龍王表示恭敬之意問彼所來方土四七受此回答耶龍王次問長老所來之理由彼長老語一切事情傳達僧伽之命令四八為令大塔之奉安配置佛之事舍利在汝手邊請與余彼等言四九聞此龍王甚有憂色彼思惟此沙門用力能取五然舍利可持運他處於是與站立之甥合謀知彼事五一名甥之瓦斯羅多陀由彼身振可知赴彼塔之家吞下其篋五二彼大龍往須彌山麓蜷局而臥長三百由旬胴周一由旬五三彼大神通力化造鎌首數千一面臥而發煙以揭煙焰五四化造等己之蛇數千回己臥於四方五五曰欲見吾等兩那伽之戰衆多之天人與龍於其時下來此處五六知叔父以其等之舍利為甥所持去語長老云舍利不在余之手五七長老由開始語此等舍利之由來彼向龍王言授與舍利五八彼腹行類之主由他之手段令彼領悟伴彼赴塔之家向彼説明五九以種種之寶善造樣樣之塔請見巧構之塔屋舍比丘六於全楞伽島所有之寶亦不值段楷端半月石何況他處耶六一由大尊敬之處遷向小尊敬之處比丘此非汝所適之事六二大龍汝不領會真理然舍利向有領會真理之處遷移而適宜六三為令脫輪回之苦惱如來出世此佛之意志然則去奉舍利六四彼王唯今日行舍利奉安式然則不可猶豫速授余舍利六五龍王言大德汝若欲見舍利請去受取長老向彼返覆三次六六彼長老化造細腕立於彼所而即時以手插入甥龍之腹六七攜舍利之篋而云汝止龍王潛入大地現於僧院六八龍王思比丘已欺我等而去為令持來舍利遣人至甥龍之處六九時甥於彼腹中不見舍利篋悲歎而來報告叔父七其時龍王亦感我等被欺出言悲歎集合龍等總皆歎悲七一集來諸天喜優者比丘之勝利奉舍利於彼等彼蘇努多羅與共來七二龍等悲歎來至比丘衆之處而大悲歎感傷舍利已被取七三比丘衆憐彼等施與少舍利依此彼等歡喜行運來供養之品七四帝釋攜寶珠之座席與黃金之篋與諸天共到彼處七五長老由地中出現之處據置座席於毗首羯磨所建善美之寶珠假堂中七六由彼長老之手取舍利篋受於金龕之中安置於優秀座席上七七大梵天揭傘知足天手持拂子善時分天手持摩尼珠之扇帝釋天手持入水之硨磲七八四大天王子持刀而立有威神力之三十三天子手攜籠七九以波利奢陀伽華供養其所而立三十二人之童女等又手取炬火而立八由二十八人組成夜叉軍追拂惡性之夜叉為守護而立八一般闍西迦於其處化造音樂堂合提巴魯樂之音而彈琵琶而立八二巧妙音樂之無數天子等摩訶迦羅龍王樣樣讚嘆共秦天樂起天之合誦諸天子又以雨降天香八三八四彼印達具陀長老為排卻摩羅建造等鐵圍山之青銅傘八五於舍利之前處處於五箇所集合比丘等謂行尼柯耶之讀誦八六於其處大歡喜之睹多伽摩尼大王已持來黃金製之龕載於頭上來八七措舍利龕使安置舍利於座上供養禮拜而合掌立於彼處八八於此見天傘及其他天香者聞天樂其他之音王八九雖不見大梵天以下喜不思議未曾有之思以傘供養舍利而即楞伽王之位九天傘人傘並解脫傘有此三傘為世間依怙之大師九一三度供獻我王國心喜彼睹多伽摩尼王向楞伽王國供獻舍利及於三度九二天人人間同供養此等舍利王以金龕安舍利置於頭上九三伴比丘衆等向塔右繞行禮下東方運來之舍利室九四九億六千萬之阿羅漢等善勝圍繞此塔之周圍合掌而立九五人間之主王降下貴重之舍利室安於最佳臥臺之上思惟喜滿耶九六舍利龕舍利同由王之頭上升由此立於空中七多羅樹高九七舍利篋自開舍利由此而上升具相好隨好現佛陀之相九八如瘤多菴羅樹下之佛陀彼等行善逝在世時之二神通九九見其神通歡喜且得唯一念達阿羅漢果人天合一億二千萬一其他達三果者超計數之道由此棄佛之相彼舍利已落篋之中一一由此篋由空中降止於王之頭上王又與印多具多長老舞妓等同一二持佛陀之光榮持於身之王回巡舍利之安息所之舍利室入於其中置龕於寶珠之台上一三次以香水洗手以四種之香摩擦身體而恭敬一四開篋取出舍利願大衆之利益大地主如次思惟一五舍利若存在則無何之阻礙舍利若住者則為人人之依怙一六如臥師之般涅槃牀善調臥於大價之臥牀一七如斯思惟彼王安舍利於勝牀之上舍利如師臥於般涅槃牀乃臥於勝牀之上一八於阿沙荼月之白分滿月布薩會之日鬱陀羅阿沙荼星宿之時如斯奉安舍利一九舍利之奉安同時大地震動樣樣生起多種之神變一一王以淨信心飾白傘而供養舍利七日間奉獻楞伽之全王國一一一著己身所有飾具亦捧獻舍利室舞妓大臣羣集諸天子亦俲此一一二王向僧團施衣裳糖丸乳酪等以比丘等令終夜集園讀誦一一三翌日人民之利益者王於都中叩回大鼓謂人民無餘於此七日間應禮舍利一一四有大威力之印多具陀大長老凡楞伽島人欲禮舍利者一一五其剎那來此處禮拜舍利各還其家而祈誓此如祈誓一一六彼大名聲之大王此七日間常行大施於大比丘衆一一七謂舍利室之業余令完成舍利室之閉鎮僧伽應知此一一八僧伽託此事於彼二人沙門彼等以不污之石閉舍利室一一九此處華鬘不枯此等之香不失燈火無消滅亦無何等之障礙一二脂肉色六枚之石常連而不離如此漏盡之士等皆祈誓此一二一思民之利益大王下令云大衆能在此為舍利之奉安一二二大舍利奉安後大衆應力不管如何行幾千舍利之奉安一二三王悉令閉建大塔其處又支提之上於四隅令積小塔一二四如斯獲運中最幸運之本有樣樣殊勝之人人伴連之本自行無污穢之福業無障礙以清淨心亦行於其他一二五善人之信心與感激起作大王統史名舍利奉安第三十一章畢

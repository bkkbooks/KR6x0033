body:
  text: 第七章毗闍耶之即位所有為利益世界之世間導師達最上安靜之剎那臥於大般涅槃牀一多數之諸天集時説者中之最勝大牟尼尊向近侍於其處帝釋天宣示二西哈巴夫之兒毗闍耶伴七百人之家臣由羅羅國來至楞伽島三天王彼為樹立我教於楞伽島然彼與彼之侍臣善護楞伽島四天王承如來之教回託蓮華色天守護楞伽島五由帝釋天受命彼急遽趣楞伽島為遊行者之姿而入於一樹下六所有者以毗闍耶為開始接近於彼而來問吾友此為何島耶彼答言為楞伽島此處無人又汝等無起危難之事如斯語而由水瓶向彼等注水七八彼等手結咒絲由虛空而去有夜叉女之侍女現為牝犬之姿九一人之侍臣不單為王子所制而曰有村犬亦可居從牝犬而行一彼之侍女之主名庫味尼夜叉女於彼處樹下紡絲如女行者之坐一一彼見坐於蓮池彼女行者於其處沐浴飲水取蓮莖向蓮之葉汲水上來彼女呼彼且止汝為妾之餌食如彼言彼男洽如被縛而立止一二一三由護絲之威力彼女不能喰彼請絲之男不與彼夜叉女一四夜叉女喚捉彼投入坑中如斯為一人一人之七百人亦均投入一五所有者不能還來毗闍耶疑起災難事五武具著身而行見美麗之蓮池一六入於池而見足迹又見彼女行者實則余之侍臣等為此物之所捉耶如斯思考一七問彼女云婦人御身已未見余之侍臣等耶王子對侍臣等有何用為飲水耶使沐欲耶彼女已言一八如此成夜叉女耶余已知所生確信速而告己之名以矢詰寄於番弓一九以鐵鉤索捉彼夜叉女之首左手摑住頭髮右手以劍振上言婢女還與余侍臣等不然將殺汝恐悶而彼夜叉女請求生命二二一我主妾請助生命妾御身可讓王位可奉女之勤勞又他何事亦均如所求而言已二二言辭為無偽彼以彼女而為誓言侍臣等伴來之謂耶彼女立即伴來二三此者等尚為飢餓之謂耶彼女已自喰商人等之船載奪來之米及其他種種多數選別物二四彼侍臣等調了米飯與副食物以饗王子一切物亦食此二五由毗闍耶喜取上食夜叉女食後變為十六歲之美麗少女姿二六所有裝飾纏身接近於王子於樹下已設高價之臥牀二七於彼周回惟帳上莊嚴天蓋王子見此思未來之利益二八與彼女行交快寢於臥牀侍臣等悉橫圍於帷帳之外二九於深更彼聞音樂與歌聲問共臥之夜叉女云此何音耶三捧主王位彼將伐所有夜叉等島為人間所棲之家故以夜叉等將殺妾三一彼夜叉女如斯思考向王子言主此處為西利沙瓦多名夜叉之都三二住於彼處為楞伽之都兄夜叉之女兒伴來此處彼母亦來三三為婚禮於此處亦成饗宴之盛此音響起於其處此此集和為大者三四只有今日可討伐此等之夜叉今以後不能討伐彼言為未見之事如何討伐彼等耶三五於彼處妾可發聲由彼聲而可殺由妾之威力武具可落於彼等之身三六如由彼女所聞而行屠一切夜叉毗闍耶得己國土身著夜叉王之飾以他之飾飾於一一侍臣住其處數日而趣向銅掌國三七三八毗闍耶於其處築銅掌城為侍臣等所繞圍與夜叉女共住三九由船下於此地下毗闍耶開始為大家疲勞之餘附掌坐於地時四觸及銅色之土塵由於為銅色彼地方亦彼島亦共名為銅掌四一彼西哈巴夫人王為執獅子者呼為西哈羅執獅子彼有緣故者此等一切又為西哈羅四二此等彼諸侍臣於此處彼處建築村落阿䨲羅陀村為彼名近於加旦波河之附近建此四三補臣烏波提沙於阿䨲羅陀村之北為甘比羅河之岸建設烏波提沙村四四他彼等三人之侍臣亦各同設鬱節尼烏魯衛羅維吉達城四五決定國土一切之侍臣等來集告彼之王子言吾主請即王位四六雖如斯言而王子不以剎帝利種之處女為第一妃不肯即位四七由此此等諸侍臣就主君即位謁力其難務為除去其即位之危懼四八遣使者持極高價之聘物摩尼珠真珠其他往摩多羅都四九忠誠於主君之侍臣等為主君得般多羅王之王女為侍臣與人民而得其他人人之女兒五此等之使者用船速到摩多羅都聘物與書狀呈於彼王五一由此王與諸大臣協議以己王女遣於毗闍耶欲諸大臣他之人人亦遣其息女五二得不足百名之處女由此而打大鼓巡回於此處願息女向往楞伽島之人人五三於息女著二件衣服令立於己家之門前由此標記受取彼女五四如斯得多處女遣彼處女之家亦與滿足調整所有嚴身具及被身具以己王女遣往毗闍耶五五一切對彼等處女隨宜表敬意並適於王者之象馬車並從僕五六送於十八軍帥彼又以一千家族附以書面送交伏敵者毗闍耶五七一切之大衆下船登上大渡海場由此此港則名大渡海場五八於毗闍耶由彼夜叉女已有一男一女彼聞摩多羅王女之來乞奢耶語彼夜叉女云五九婦今汝置二人之子女而去此人間之常畏怖非人六聞此畏怖夜叉族來之危難語於彼夜叉女汝無憂事送汝千金供食六一再三請示毗闍耶持二人之子女向未曾赴之彼處雖懷怖離去楞伽城六二兒等使坐於外彼女已都卓自入都知彼是夜叉女而怖想是為間諜六三全都之夜叉動轉然有一人之粗暴者與掌唯一打使彼女命絶六四彼女叔父夜叉出都城之外見此童兒等而問汝等是誰人之兒耶六五言聞為庫味尼之兒汝等之母於此處已被殺害汝等若被見者亦受殺速逃去六六由此疾逃來須摩那峰之中而彼兄長大與妹同棲六七亦共繁殖兒女等彼等得國王之許可彼處成為住於摩羅耶地方此實為普林達族之元祖六八般多王此使臣等向毗闍耶王子貢獻聘物並此等王女其他之物六九而毗闍耶對使臣等表示恭敬尊重之意處女等隨宜與大臣並人民七集一切大臣等以法則令上毗闍耶王位行大祀祭七一於是乎彼毗闍耶王以般多王之王女具大威儀為第一妃之地位七二施財於大臣等向義父般多王每年贈與二十萬金價格之硨磲真珠七三彼毗闍耶王捨棄前非行之迹正治金楞伽島於銅掌之都行三十八年間之王事七四善人之信心與感激而起作大王統史名毗闍耶之即位第七章畢
